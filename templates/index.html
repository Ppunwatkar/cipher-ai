<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
*{box-sizing:border-box}
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}
body{user-select:none}
input,textarea,button,select{font-family:inherit}

.glass{
background:rgba(8,12,35,.72);
backdrop-filter:blur(18px);
}

.scrollbar::-webkit-scrollbar{width:5px;height:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:20px;
}

.inputbox,.authInput,.toolInput{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
outline:none;
}

.inputbox:focus,.authInput:focus,.toolInput:focus{
border-color:#8b5cf6;
box-shadow:0 0 0 1px #8b5cf6;
}

.modeBtn{
border:1px solid rgba(255,255,255,.08);
transition:.2s;
}
.modeBtn:hover{border-color:#8b5cf6}
.modeActive{
background:rgba(124,58,237,.18);
border-color:#8b5cf6!important;
}

.userBubble{
background:#101844;
padding:14px 16px;
border-radius:18px;
display:inline-block;
max-width:75%;
word-break:break-word;
}

.msgbox{
background:rgba(72,55,170,.12);
border-left:2px solid #8b5cf6;
padding:16px;
border-radius:18px;
}

.toolCard{
padding:12px 14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.06);
background:rgba(255,255,255,.02);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:.2s;
}
.toolCard:hover{
border-color:#8b5cf6;
background:rgba(124,58,237,.08);
}

#menu{
display:none;
position:absolute;
left:0;
bottom:72px;
width:290px;
background:#11162f;
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:8px;
z-index:99999;
}

.menuItem{
padding:12px 14px;
border-radius:14px;
cursor:pointer;
transition:.2s;
}
.menuItem:hover{
background:rgba(255,255,255,.08);
}

.sep{
height:1px;
background:rgba(255,255,255,.08);
margin:8px 0;
}

#chatBox pre{
margin:0;
white-space:pre-wrap;
overflow:auto;
}

#authModal,#panelModal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.55);
z-index:999999;
}

.modalCard{
width:420px;
max-width:92%;
background:#070d2c;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:24px;
}

.btn{
padding:12px;
border-radius:14px;
background:#7c3aed;
width:100%;
}

@media(max-width:900px){
#layout{
flex-direction:column;
height:auto;
}
#sidebar{
display:none;
position:fixed;
left:0;
top:0;
bottom:0;
width:290px;
z-index:99999;
border-radius:0;
}
#sidebar.show{display:flex}
#chatBox{height:58vh}
}
</style>
</head>

<body>

<!-- AUTH MODAL -->
<div id="authModal">
<div class="modalCard">

<div class="flex justify-between items-center mb-4">
<div id="authTitle" class="text-3xl text-violet-300">Login</div>
<button onclick="closeAuth()">✕</button>
</div>

<input id="authName" class="authInput w-full px-4 py-3 rounded-xl mb-3 hidden" placeholder="Full Name">
<input id="authEmail" class="authInput w-full px-4 py-3 rounded-xl mb-3" placeholder="Email">
<input id="authPass" type="password" class="authInput w-full px-4 py-3 rounded-xl mb-3" placeholder="Password">

<button onclick="submitAuth()" id="authBtn" class="btn">Login</button>

<div class="text-center mt-4 text-sm text-white/60">
<span id="switchText">Don't have an account?</span>
<button onclick="switchAuth()" id="switchBtn" class="text-violet-300 ml-1">Sign Up</button>
</div>

<div id="authMsg" class="text-red-300 text-sm mt-3"></div>

</div>
</div>

<!-- SETTINGS PANEL -->
<div id="panelModal">
<div class="modalCard" id="panelContent"></div>
</div>

<div id="layout" class="h-screen flex gap-3 p-3">

<!-- SIDEBAR -->
<div id="sidebar" class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<div class="flex gap-3 items-center mb-4">
<img src="/static/logo.png" class="w-12 h-12 rounded-xl">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()" class="w-full py-3 rounded-2xl border border-violet-500 mb-4">
+ NEW CHAT
</button>

<div id="historyBox" class="flex-1 overflow-y-auto scrollbar space-y-2 mb-3"></div>

<div class="mb-2 flex justify-between items-center px-1">
<div class="text-[11px] tracking-[4px] text-white/40">SECURITY TOOLS</div>
<button onclick="toggleTools()" id="toolBtn" class="text-xs text-violet-300">HIDE</button>
</div>

<div id="toolsPanel" class="space-y-2 overflow-y-auto scrollbar h-[250px]">

<div class="toolCard" onclick="openTool('hash')"><span>🔐 Hash Tool</span><span>i</span></div>
<div class="toolCard" onclick="openTool('base64')"><span>📦 Base64 Tool</span><span>i</span></div>
<div class="toolCard" onclick="openTool('password')"><span>🔑 Password Check</span><span>i</span></div>
<div class="toolCard" onclick="openTool('jwt')"><span>🪪 JWT Decoder</span><span>i</span></div>
<div class="toolCard" onclick="openTool('headers')"><span>🛡 Header Scan</span><span>i</span></div>
<div class="toolCard" onclick="openTool('logs')"><span>📜 Log Analyzer</span><span>i</span></div>

</div>

<!-- ACCOUNT -->
<div class="relative mt-3">

<div onclick="toggleMenu()" class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer">
<div class="flex gap-3 items-center">

<div id="avatar" class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold">GU</div>

<div class="flex-1">
<div id="username">Guest User</div>
<div id="memberType" class="text-xs text-white/45">Guest</div>
</div>

<div>›</div>

</div>
</div>

<div id="menu"></div>

</div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col gap-3 min-w-0">

<!-- TOP -->
<div class="glass rounded-3xl border border-white/10 px-6 py-5 flex justify-between items-center">

<div class="text-violet-300 tracking-widest text-lg">⚡ AI SECURITY CORE</div>

<div class="flex gap-2">
<button id="thinkingBtn" onclick="setMode('thinking')" class="modeBtn px-5 py-3 rounded-full">THINK</button>
<button id="fastBtn" onclick="setMode('fast')" class="modeBtn modeActive px-5 py-3 rounded-full">FAST</button>
<button id="codeBtn" onclick="setMode('code')" class="modeBtn px-5 py-3 rounded-full">CODE</button>
</div>

</div>

<!-- CHAT -->
<div id="chatBox" class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<!-- INPUT -->
<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3 relative z-50">

<textarea
id="prompt"
rows="2"
placeholder="Ask anything..."
autocomplete="off"
spellcheck="false"
class="inputbox flex-1 rounded-2xl px-5 py-4 resize-none"
style="min-height:60px;max-height:160px;overflow-y:auto;"></textarea>

<button type="button" onclick="sendMsg()" class="w-24 rounded-2xl bg-violet-500 text-xl shrink-0">
➤
</button>

</div>

</div>
</div>

<script>
let mode="fast";
let chats=[];
let currentChat=null;

let authMode="login";
let loggedUser=null;

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{

const box=document.getElementById("prompt");

box.addEventListener("keydown",function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendMsg();
}
setTimeout(autoGrow,0);
});

box.addEventListener("input",autoGrow);

loadChats();
updateUserUI();
});

function autoGrow(){
const box=document.getElementById("prompt");
box.style.height="auto";
box.style.height=box.scrollHeight+"px";
}

/* MODE */
function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(x=>x.classList.remove("modeActive"));
document.getElementById(m+"Btn").classList.add("modeActive");
}

function modelLabel(){
if(mode==="thinking") return "🧠 GPT";
if(mode==="code") return "💻 Claude";
return "⚡ Groq";
}

/* ACCOUNT */
function toggleMenu(){

menu.style.display = menu.style.display==="block" ? "none":"block";

if(loggedUser){

menu.innerHTML=`
<div class="px-3 py-2">
<div class="font-semibold">${loggedUser.name}</div>
<div class="text-xs text-white/45">${loggedUser.email}</div>
</div>

<div class="sep"></div>

<div class="menuItem" onclick="openPanel('profile')">Profile</div>
<div class="menuItem" onclick="openPanel('settings')">Settings</div>
<div class="menuItem" onclick="openPanel('personal')">Personalization</div>

<div class="sep"></div>

<div class="menuItem" onclick="openPanel('help')">Help</div>

<div class="sep"></div>

<div class="menuItem text-red-300" onclick="logoutUser()">Log out</div>
`;

}else{

menu.innerHTML=`
<div class="menuItem" onclick="openAuth('login')">Login</div>
<div class="menuItem" onclick="openAuth('signup')">Sign Up</div>
`;
}
}

function openAuth(type){
authMode=type;
authModal.style.display="flex";
menu.style.display="none";
authMsg.innerText="";

if(type==="login"){
authTitle.innerText="Login";
authBtn.innerText="Login";
authName.classList.add("hidden");
switchText.innerText="Don't have an account?";
switchBtn.innerText="Sign Up";
}else{
authTitle.innerText="Sign Up";
authBtn.innerText="Create Account";
authName.classList.remove("hidden");
switchText.innerText="Already have an account?";
switchBtn.innerText="Log In";
}
}

function closeAuth(){
authModal.style.display="none";
}

function switchAuth(){
openAuth(authMode==="login"?"signup":"login");
}

async function submitAuth(){

let payload={
email:authEmail.value,
password:authPass.value
};

if(authMode==="signup"){
payload.name=authName.value;
}

let url=authMode==="login" ? "/login" : "/signup";

try{
let res=await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.ok){

loggedUser=data.user || {
name:payload.name || payload.email.split("@")[0],
email:payload.email
};

updateUserUI();
closeAuth();

}else{
authMsg.innerText=data.message || "Failed";
}

}catch{
authMsg.innerText="Server Error";
}
}

function logoutUser(){
loggedUser=null;
updateUserUI();
menu.style.display="none";
}

function updateUserUI(){

if(loggedUser){
avatar.innerText=loggedUser.name.slice(0,2).toUpperCase();
username.innerText=loggedUser.name;
memberType.innerText="Member";
}else{
avatar.innerText="GU";
username.innerText="Guest User";
memberType.innerText="Guest";
}
}

function openPanel(type){

panelModal.style.display="flex";

if(type==="profile"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Profile</div>
<input class="authInput w-full px-4 py-3 rounded-xl mb-3" value="${loggedUser.name}">
<input class="authInput w-full px-4 py-3 rounded-xl mb-3" value="${loggedUser.email}">
<button class="btn">Save</button>`;
}

if(type==="settings"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Settings</div>
<div class="menuItem">Appearance</div>
<div class="menuItem">Language</div>
<div class="menuItem">Security</div>`;
}

if(type==="personal"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Personalization</div>
<div class="menuItem">Memory</div>
<div class="menuItem">Response Style</div>`;
}

if(type==="help"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Help</div>
<div class="menuItem">FAQ</div>
<div class="menuItem">Support</div>
<div class="menuItem">About CIPHER</div>`;
}
}

panelModal.onclick=(e)=>{
if(e.target===panelModal) panelModal.style.display="none";
};

/* TOOLS */
function toggleTools(){
if(toolsPanel.style.display==="none"){
toolsPanel.style.display="block";
toolBtn.innerText="HIDE";
}else{
toolsPanel.style.display="none";
toolBtn.innerText="SHOW";
}
}

function openTool(type){

let html="";

if(type==="hash"){
html=`
<input id="toolInput" class="toolInput w-full px-4 py-3 rounded-xl mb-3" placeholder="Enter text">
<select id="toolMode" class="toolInput w-full px-4 py-3 rounded-xl mb-3">
<option value="md5">MD5</option>
<option value="sha256">SHA256</option>
</select>
<button onclick="runTool('hash')" class="btn">Run</button>`;
}

if(type==="base64"){
html=`
<input id="toolInput" class="toolInput w-full px-4 py-3 rounded-xl mb-3" placeholder="Enter text">
<select id="toolMode" class="toolInput w-full px-4 py-3 rounded-xl mb-3">
<option value="encode">Encode</option>
<option value="decode">Decode</option>
</select>
<button onclick="runTool('base64')" class="btn">Run</button>`;
}

if(type==="password"){
html=`
<input id="toolInput" class="toolInput w-full px-4 py-3 rounded-xl mb-3" placeholder="Enter password">
<button onclick="runTool('password')" class="btn">Check</button>`;
}

if(type==="jwt"){
html=`
<textarea id="toolInput" class="toolInput w-full px-4 py-3 rounded-xl mb-3" placeholder="Paste JWT"></textarea>
<button onclick="runTool('jwt')" class="btn">Decode</button>`;
}

if(type==="headers"){
html=`
<input id="toolInput" class="toolInput w-full px-4 py-3 rounded-xl mb-3" placeholder="Enter URL">
<button onclick="runTool('headers')" class="btn">Scan</button>`;
}

if(type==="logs"){
html=`
<textarea id="toolInput" class="toolInput w-full px-4 py-3 rounded-xl mb-3" placeholder="Paste logs"></textarea>
<button onclick="runTool('logs')" class="btn">Analyze</button>`;
}

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-violet-300 mb-3">TOOL PANEL • ${type.toUpperCase()}</div>
${html}
<div id="toolResult" class="mt-4"></div>
</div>`;

chatBox.scrollTop=chatBox.scrollHeight;
}

async function runTool(type){

let text=document.getElementById("toolInput").value;
let mode=document.getElementById("toolMode")?.value || "";

toolResult.innerHTML="Running...";

try{
let res=await fetch("/tool/"+type,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
text:text,
mode:mode
})
});

let data=await res.json();

toolResult.innerHTML=`<pre>${JSON.stringify(data,null,2)}</pre>`;

}catch{
toolResult.innerHTML="Tool Error";
}
}

/* HISTORY */
function newChat(){
currentChat={
id:Date.now(),
title:"New Chat",
messages:[]
};
chats.unshift(currentChat);
renderHistory();
chatBox.innerHTML="";
saveChats();
prompt.focus();
}

function renderHistory(){
historyBox.innerHTML="";

chats.forEach(chat=>{
let div=document.createElement("div");
div.className="bg-[#101844] rounded-xl px-3 py-2 text-sm cursor-pointer";
div.textContent=chat.title;
div.onclick=()=>loadChat(chat.id);
historyBox.appendChild(div);
});
}

function loadChat(id){
currentChat=chats.find(x=>x.id===id);
chatBox.innerHTML="";

currentChat.messages.forEach(m=>{
if(m.role==="user"){
chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${m.text}</div>
</div>`;
}else{
chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-xs text-violet-300 mb-2">${m.model}</div>
${m.text}
</div>`;
}
});

chatBox.scrollTop=chatBox.scrollHeight;
}

function saveChats(){
localStorage.setItem("cipher_chats",JSON.stringify(chats));
}

function loadChats(){
let d=localStorage.getItem("cipher_chats");
if(d){
chats=JSON.parse(d);
renderHistory();
}
}

/* CODE FORMAT */
function copyCode(id){
navigator.clipboard.writeText(document.getElementById(id).innerText);
}

function formatReply(text){

const regex=/```([\s\S]*?)```/g;

if(!regex.test(text)){
return text.replace(/\n/g,"<br>");
}

regex.lastIndex=0;

return text.replace(regex,(match,code)=>{

let clean=code.trim()
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

let id="code_"+Date.now()+Math.floor(Math.random()*9999);

return `
<div class="mt-4 border border-white/10 rounded-2xl overflow-hidden bg-[#05091f]">
<div class="flex justify-between items-center px-4 py-2 bg-[#0c1438] text-sm text-violet-300">
<span>Code</span>
<button onclick="copyCode('${id}')" class="text-xs px-3 py-1 rounded-lg bg-violet-600">Copy</button>
</div>
<pre id="${id}" class="p-4 scrollbar">${clean}</pre>
</div>
`;
}).replace(/\n/g,"<br>");
}

/* SEND CHAT */
async function sendMsg(){

const box=document.getElementById("prompt");
let text=box.value.trim();

if(!text)return;

if(!currentChat)newChat();

chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${text}</div>
</div>`;

currentChat.messages.push({
role:"user",
text:text
});

if(currentChat.title==="New Chat"){
currentChat.title=text.slice(0,30);
renderHistory();
}

box.value="";
box.style.height="60px";
box.focus();

chatBox.innerHTML+=`
<div id="typingBox" class="msgbox">
<div class="text-xs text-violet-300 mb-2">${modelLabel()}</div>
Thinking...
</div>`;

chatBox.scrollTop=chatBox.scrollHeight;

try{

const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
mode:mode
})
});

const data=await res.json();

document.getElementById("typingBox")?.remove();

let reply=formatReply(data.response || "No response");

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-xs text-violet-300 mb-2">${modelLabel()}</div>
${reply}
</div>`;

currentChat.messages.push({
role:"ai",
text:reply,
model:modelLabel()
});

saveChats();

}catch(err){

document.getElementById("typingBox")?.remove();

chatBox.innerHTML+=`
<div class="msgbox text-red-300">
Backend /chat route not responding
</div>`;
}

chatBox.scrollTop=chatBox.scrollHeight;
}
</script>

</body>
</html>
