<!-- Production Ready CIPHER -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
padding:0;
overflow:hidden;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}

.glass{
background:rgba(8,12,35,.72);
backdrop-filter:blur(18px);
}

.scrollbar::-webkit-scrollbar{width:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:20px;
}

.inputbox,.toolInput{
background:#020617;
border:1px solid rgba(255,255,255,.08);
outline:none;
color:#fff;
}

.inputbox:focus,.toolInput:focus{
border-color:#8b5cf6;
}

.modeBtn{
transition:.2s;
border:1px solid rgba(255,255,255,.08);
}

.modeActive{
background:rgba(124,58,237,.16);
border-color:#8b5cf6;
}

.msgbox{
background:rgba(72,55,170,.12);
border-left:2px solid #8b5cf6;
border-radius:18px;
padding:16px;
}

.userBubble{
background:#101844;
border-radius:18px;
padding:14px 16px;
display:inline-block;
max-width:75%;
}

#menu{
display:none;
position:absolute;
left:0;
bottom:65px;
width:250px;
background:#1b1b1b;
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:8px;
z-index:9999;
box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.menuItem{
padding:11px 14px;
border-radius:14px;
cursor:pointer;
transition:.2s;
}

.menuItem:hover{
background:rgba(255,255,255,.08);
}

.sep{
height:1px;
background:rgba(255,255,255,.08);
margin:8px 0;
}

#toolsPanel{
max-height:230px;
overflow-y:auto;
padding-right:4px;
}

.toolCard{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.06);
background:rgba(255,255,255,.02);
transition:.2s;
cursor:pointer;
}

.toolCard:hover{
border-color:#8b5cf6;
background:rgba(124,58,237,.08);
}

#toolPopup{
position:fixed;
width:280px;
display:none;
z-index:99999;
background:#090f25;
border:1px solid rgba(139,92,246,.55);
border-radius:18px;
padding:14px;
box-shadow:0 20px 45px rgba(0,0,0,.55);
}

#authModal,#panelModal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.55);
z-index:99999;
}

.modalCard{
width:390px;
background:#070d2c;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:24px;
}

.modalInput{
width:100%;
padding:12px;
border-radius:14px;
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
margin-bottom:10px;
}

.btn{
padding:11px 16px;
border-radius:14px;
background:#7c3aed;
width:100%;
}

.typing span{
animation:blink 1.1s infinite;
font-size:22px;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}
</style>
</head>

<body>

<div id="toolPopup"></div>

<!-- AUTH MODAL -->
<div id="authModal">
<div class="modalCard">

<div class="flex justify-between items-center mb-4">
<div id="authTitle" class="text-2xl text-violet-300">Login</div>
<button onclick="closeAuth()">✕</button>
</div>

<input id="authName" class="modalInput hidden" placeholder="Full Name">
<input id="authEmail" class="modalInput" placeholder="Email">
<input id="authPass" class="modalInput" type="password" placeholder="Password">

<button onclick="submitAuth()" class="btn" id="authBtn">Login</button>

<div class="text-center mt-4 text-sm text-white/60">
<span id="switchText">Don't have an account?</span>
<button onclick="switchAuth()" class="text-violet-300 ml-1">Sign Up</button>
</div>

<div id="authMsg" class="text-red-300 text-sm mt-3"></div>

</div>
</div>

<!-- PANEL MODAL -->
<div id="panelModal">
<div class="modalCard" id="panelContent"></div>
</div>

<div class="h-screen flex gap-3 p-3">

<!-- LEFT -->
<div class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<div class="flex gap-3 items-center mb-4">
<img src="/static/logo.png" class="w-12 h-12 rounded-xl object-contain">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()" class="w-full py-3 rounded-2xl border border-violet-500 mb-4">
+ NEW CHAT
</button>

<div id="historyBox" class="flex-1 overflow-y-auto scrollbar space-y-2 mb-4"></div>

<div class="mb-4">
<div class="flex justify-between mb-2 px-1">
<div class="text-[11px] tracking-[4px] text-white/40">SECURITY TOOLS</div>
<div class="text-xs text-violet-300">Hide</div>
</div>

<div id="toolsPanel" class="space-y-2 scrollbar">

<div class="toolCard" onclick="openTool('hash')">
<div>🔐 Hash Tool</div>
<div onclick="showInfo(event,'Hash Tool','Creates MD5 / SHA256 hashes','cipher123')">i</div>
</div>

<div class="toolCard" onclick="openTool('base64')">
<div>📦 Base64 Tool</div>
<div onclick="showInfo(event,'Base64 Tool','Encode / Decode text','hello')">i</div>
</div>

<div class="toolCard" onclick="openTool('password')">
<div>🔑 Password Check</div>
<div onclick="showInfo(event,'Password Tool','Checks password strength','Cipher@2026')">i</div>
</div>

<div class="toolCard" onclick="openTool('jwt')">
<div>🪪 JWT Decoder</div>
<div onclick="showInfo(event,'JWT Decoder','Decode JWT token','paste token')">i</div>
</div>

</div>
</div>

<!-- USER -->
<div class="relative mt-auto">

<div onclick="toggleMenu()" class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer">
<div class="flex gap-3 items-center">

<div id="avatar" class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold">GU</div>

<div class="flex-1">
<div id="username">Guest User</div>
<div id="memberType" class="text-xs text-white/45">Guest</div>
</div>

<div>›</div>

</div>
</div>

<div id="menu"></div>

</div>

</div>

<!-- RIGHT -->
<div class="flex-1 flex flex-col gap-3">

<div class="glass rounded-3xl border border-white/10 px-8 py-5 flex justify-between items-center">

<div class="text-violet-300 tracking-widest text-lg">⚡ AI SECURITY CORE</div>

<div class="flex gap-2">
<button id="thinkingBtn" onclick="setMode('thinking')" class="modeBtn px-5 py-3 rounded-full">THINK</button>
<button id="fastBtn" onclick="setMode('fast')" class="modeBtn modeActive px-5 py-3 rounded-full">FAST</button>
<button id="codeBtn" onclick="setMode('code')" class="modeBtn px-5 py-3 rounded-full">CODE</button>
</div>

</div>

<div id="chatBox" class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3">

<textarea id="prompt" rows="2" placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl px-5 py-4 resize-none"></textarea>

<button onclick="sendMsg()" class="w-24 rounded-2xl bg-violet-500 text-xl">➤</button>

</div>

</div>
</div>

<script>
let mode="fast";
let authMode="login";
let loggedUser=null;
let currentChatId=null;

/* MODE */
function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(x=>x.classList.remove("modeActive"));
document.getElementById(m+"Btn").classList.add("modeActive");
}

/* ENTER SEND */
prompt.addEventListener("keydown",e=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendMsg();
}
});

/* CHAT */
async function sendMsg(){

let text=prompt.value.trim();
if(!text)return;

chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${text}</div>
</div>`;

prompt.value="";

chatBox.innerHTML+=`
<div id="typingBox" class="msgbox">
<div class="typing"><span>.</span><span>.</span><span>.</span></div>
</div>`;

chatBox.scrollTop=chatBox.scrollHeight;

try{
let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
mode:mode,
chat_id:currentChatId
})
});

let data=await res.json();
typingBox.remove();

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-xs text-white/50 mb-2">${data.label || mode.toUpperCase()}</div>
${(data.response || "No response").replace(/\n/g,"<br>")}
</div>`;

if(data.chat_id) currentChatId=data.chat_id;

}catch(err){
typingBox.remove();
chatBox.innerHTML+=`<div class="msgbox text-red-300">Server Error</div>`;
}

chatBox.scrollTop=chatBox.scrollHeight;
}

/* ACCOUNT MENU */
function toggleMenu(){

menu.style.display = menu.style.display==="block" ? "none":"block";

if(loggedUser){

menu.innerHTML=`
<div class="px-3 py-2">
<div class="font-semibold">${loggedUser.name}</div>
<div class="text-xs text-white/45">${loggedUser.email}</div>
</div>

<div class="sep"></div>

<div class="menuItem" onclick="openPanel('personal')">Personalization</div>
<div class="menuItem" onclick="openPanel('profile')">Profile</div>
<div class="menuItem" onclick="openPanel('settings')">Settings</div>

<div class="sep"></div>

<div class="menuItem" onclick="openPanel('help')">Help</div>

<div class="sep"></div>

<div class="menuItem text-red-300" onclick="logoutUser()">Log out</div>
`;

}else{

menu.innerHTML=`
<div class="menuItem" onclick="openAuth('login')">Login</div>
<div class="menuItem" onclick="openAuth('signup')">Sign Up</div>
`;
}
}

/* AUTH */
function openAuth(type){
authMode=type;
authModal.style.display="flex";
menu.style.display="none";

if(type==="login"){
authTitle.innerText="Login";
authBtn.innerText="Login";
authName.classList.add("hidden");
switchText.innerText="Don't have an account?";
}else{
authTitle.innerText="Sign Up";
authBtn.innerText="Create Account";
authName.classList.remove("hidden");
switchText.innerText="Already have an account?";
}
}

function closeAuth(){
authModal.style.display="none";
}

function switchAuth(){
openAuth(authMode==="login"?"signup":"login");
}

async function submitAuth(){

let payload={
email:authEmail.value,
password:authPass.value
};

if(authMode==="signup") payload.name=authName.value;

let url=authMode==="login"?"/login":"/signup";

try{
let res=await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});
let data=await res.json();

if(data.ok){
loggedUser=data.user || {
name:payload.name || payload.email.split("@")[0],
email:payload.email
};
updateUserUI();
closeAuth();
}else{
authMsg.innerText=data.message || "Failed";
}
}catch{
authMsg.innerText="Server Error";
}
}

function logoutUser(){
loggedUser=null;
updateUserUI();
menu.style.display="none";
}

function updateUserUI(){

if(loggedUser){
avatar.innerText=loggedUser.name.slice(0,2).toUpperCase();
username.innerText=loggedUser.name;
memberType.innerText="Member";
}else{
avatar.innerText="GU";
username.innerText="Guest User";
memberType.innerText="Guest";
}
}

/* PANELS */
function openPanel(type){

panelModal.style.display="flex";
menu.style.display="none";

if(type==="profile"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Profile</div>
<input class="modalInput" value="${loggedUser.name}">
<input class="modalInput" value="${loggedUser.email}">
<input class="modalInput" value="${loggedUser.email.split('@')[0]}">
<button class="btn">Save</button>
`;
}

if(type==="settings"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Settings</div>
<div class="menuItem">Appearance</div>
<div class="menuItem">Language</div>
<div class="menuItem">Notifications</div>
<div class="menuItem">Security</div>
`;
}

if(type==="personal"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Personalization</div>
<div class="menuItem">Response Style</div>
<div class="menuItem">Memory</div>
<div class="menuItem">Theme Behavior</div>
`;
}

if(type==="help"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Help</div>
<div class="menuItem">FAQ</div>
<div class="menuItem">Support</div>
<div class="menuItem">About CIPHER</div>
`;
}
}

panelModal.onclick=(e)=>{
if(e.target===panelModal) panelModal.style.display="none";
};

/* TOOLS */
function openTool(name){
chatBox.innerHTML+=`
<div class="msgbox">TOOL PANEL • ${name.toUpperCase()}</div>`;
chatBox.scrollTop=chatBox.scrollHeight;
}

function showInfo(e,t,d,x){
e.stopPropagation();
toolPopup.style.display="block";
toolPopup.innerHTML=`
<div class="text-violet-300 font-bold mb-2">${t}</div>
<div>${d}</div>
<div class="mt-3 text-cyan-300 text-sm">${x}</div>
`;
toolPopup.style.left=(e.clientX+10)+"px";
toolPopup.style.top=(e.clientY+10)+"px";

setTimeout(()=>toolPopup.style.display="none",10000);
}

document.addEventListener("click",()=>{
menu.style.display="none";
toolPopup.style.display="none";
});

/* INIT */
updateUserUI();
</script>

</body>
</html>
