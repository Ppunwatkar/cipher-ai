<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<link rel="icon" href="/static/logo.png">

<script src="https://cdn.tailwindcss.com"></script>

<!-- MARKDOWN + CODE -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body {
    margin:0;
    color:#e5e7eb;
    font-family:'Inter', monospace;
    background:#020617;
}

.glass {
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
}

.sidebar { width:260px; }

.logo {
    filter: drop-shadow(0 0 8px rgba(139,92,246,0.5));
}

.btn {
    border:1px solid #8b5cf6;
    padding:10px;
    border-radius:12px;
    color:#8b5cf6;
    transition:0.2s;
}
.btn:hover {
    background:#8b5cf6;
    color:white;
}

.input-box {
    background:#020617;
    border:1px solid rgba(255,255,255,0.1);
    padding:12px;
    border-radius:12px;
    width:100%;
    color:white;
}

.bot {
    background: rgba(139,92,246,0.1);
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

.user {
    text-align:right;
    padding:12px;
    color:#c4b5fd;
}

.badge {
    padding:6px 14px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.12);
    cursor:pointer;
}

.badge.active {
    background: rgba(139,92,246,0.2);
    border-color:#8b5cf6;
}
</style>
</head>

<body class="flex flex-col h-screen">

<div class="flex flex-1 overflow-hidden">

<!-- SIDEBAR -->
<div class="sidebar glass p-4 flex flex-col justify-between hidden md:flex">
    <div>
        <div class="flex items-center gap-3">
            <img src="/static/logo.png" class="w-10 h-10 logo rounded-lg">
            <span class="text-purple-300 text-lg font-bold">CIPHER</span>
        </div>

        <p class="text-xs opacity-60 mt-1">AI Cyber Assistant</p>

        <button onclick="createNewChat()" class="btn mt-4 w-full">+ NEW CHAT</button>
    </div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col p-3 gap-3">

<div class="glass p-4 flex justify-between">
    <span>⚡ AI SECURITY CORE</span>

    <!-- MULTI MODE BUTTONS -->
    <div class="flex gap-2">
        <span class="badge active" data-mode="thinking">THINK</span>
        <span class="badge" data-mode="fast">FAST</span>
        <span class="badge" data-mode="code">CODE</span>
    </div>
</div>

<div id="chat" class="flex-1 glass p-4 overflow-y-auto"></div>

<div class="glass p-3 flex gap-2">
    <textarea id="msg" class="input-box flex-1"></textarea>
    <button onclick="send()" class="btn px-6">➤</button>
</div>

</div>
</div>

<script>
let chats = {};
let currentChat = null;
let currentMode = "thinking";

function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = {messages:[]};
    render();
}

function render(){
    const chatBox = document.getElementById("chat");
    chatBox.innerHTML="";

    chats[currentChat].messages.forEach(m=>{
        const div=document.createElement("div");
        div.className = m.role==="user" ? "user" : "bot";

        div.innerHTML = marked.parse(m.content);

        div.querySelectorAll('pre code').forEach(block => {
            hljs.highlightElement(block);
        });

        chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

async function send(){
    const msgBox = document.getElementById("msg");
    const text = msgBox.value;

    if(!text) return;

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    msgBox.value="";

    try {
        const res = await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                message:text,
                chat_id:currentChat,
                mode:currentMode
            })
        });

        const data = await res.json();

        chats[currentChat].messages.push({
            role:"assistant",
            content:data.response || "⚠️ No response"
        });

    } catch (err) {
        chats[currentChat].messages.push({
            role:"assistant",
            content:"⚠️ Backend not responding"
        });
    }

    render();
}

// MODE SWITCHING
document.querySelectorAll('.badge').forEach(b=>{
    b.onclick=()=>{
        currentMode = b.dataset.mode;

        document.querySelectorAll('.badge').forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
    }
});

createNewChat();
</script>

</body>
</html>
