<!-- PATCH ONLY : replace USER CARD + MENU + AUTH MODAL + JS -->

<!-- ================= USER CARD ================= -->
<div class="mt-3 relative">

<div onclick="toggleMenu()"
class="bg-[#0b1238] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer hover:border-violet-500 transition">

<div class="flex items-center gap-3">

<div id="avatar"
class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center text-sm font-bold">
GU
</div>

<div class="flex-1 min-w-0">
<div id="username" class="truncate text-[14px]">Guest User</div>
<div id="memberType" class="text-[11px] text-white/45">Guest</div>
</div>

<div class="text-sm">›</div>

</div>
</div>

<!-- MENU -->
<div id="menu"
class="hidden absolute bottom-16 left-0 w-64 bg-[#161616] rounded-2xl border border-white/10 p-2 z-50 shadow-2xl">

<!-- guest menu -->
<div id="guestMenu">

<button onclick="openAuth('login')"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">
Login
</button>

<button onclick="openAuth('signup')"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">
Sign Up
</button>

</div>

<!-- user menu -->
<div id="userMenu" class="hidden">

<button onclick="openProfile()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">
Profile
</button>

<button onclick="openSettings()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">
Settings
</button>

<button onclick="logoutUser()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-red-500/10 text-red-300">
Logout
</button>

</div>

</div>
</div>



<!-- ================= LOGIN / SIGNUP MODAL ================= -->
<div id="authModal"
class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center">

<div class="w-[420px] max-w-[94%] rounded-2xl glass border border-white/10 p-7 relative">

<button onclick="closeAuth()"
class="absolute right-4 top-3 text-2xl text-white/60 hover:text-white">
✕
</button>

<div class="text-4xl text-violet-300 tracking-widest mb-2">
CIPHER
</div>

<div class="text-sm text-white/55 mb-6">
Secure AI Access
</div>

<input id="authEmail"
placeholder="Email"
class="inputbox w-full rounded-xl px-4 py-3 mb-3 text-sm">

<div class="relative mb-4">

<input id="authPass"
type="password"
placeholder="Password"
class="inputbox w-full rounded-xl px-4 py-3 pr-12 text-sm">

<button onclick="togglePassword()"
class="absolute right-3 top-3 text-sm text-white/60">
👁
</button>

</div>

<button id="authBtn"
onclick="submitAuth()"
class="w-full rounded-xl bg-violet-500 hover:bg-violet-600 py-3 text-sm mb-4">
Login
</button>

<div class="text-center text-sm">

<span id="switchText">Don't have an account?</span>

<button onclick="switchAuthMode()"
class="text-violet-300 ml-1">
Sign Up
</button>

</div>

<div id="authMsg" class="text-red-300 text-sm mt-4"></div>

</div>
</div>



<script>
/* ================= GLOBAL ================= */
let loggedIn=false;
let authMode="login";

/* ================= MENU ================= */
function toggleMenu(){
document.getElementById("menu").classList.toggle("hidden");
}

/* ================= AUTH OPEN ================= */
function openAuth(mode="login"){

authMode=mode;

document.getElementById("menu").classList.add("hidden");
document.getElementById("authModal").classList.remove("hidden");

updateAuthUI();
}

function closeAuth(){
document.getElementById("authModal").classList.add("hidden");
document.getElementById("authMsg").innerText="";
}

/* ================= SWITCH ================= */
function switchAuthMode(){

authMode = authMode==="login" ? "signup" : "login";
updateAuthUI();
}

function updateAuthUI(){

if(authMode==="login"){

document.getElementById("authBtn").innerText="Login";
document.getElementById("switchText").innerText="Don't have an account?";
document.querySelector("#switchText + button").innerText="Sign Up";

}else{

document.getElementById("authBtn").innerText="Sign Up";
document.getElementById("switchText").innerText="Already have account?";
document.querySelector("#switchText + button").innerText="Login";
}
}

/* ================= SUBMIT ================= */
async function submitAuth(){

let email=document.getElementById("authEmail").value.trim();
let password=document.getElementById("authPass").value.trim();

if(!email || !password){
document.getElementById("authMsg").innerText="Fill all fields.";
return;
}

let endpoint = authMode==="login" ? "/login" : "/signup";

let res=await fetch(endpoint,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

let data=await res.json();

if(data.ok){

closeAuth();
await loadUser();
await loadHistory();

}else{
document.getElementById("authMsg").innerText=data.msg || "Failed.";
}
}

/* ================= PASSWORD ================= */
function togglePassword(){

let p=document.getElementById("authPass");
p.type = p.type==="password" ? "text" : "password";
}

/* ================= LOAD USER ================= */
async function loadUser(){

try{

let res=await fetch("/me");
let data=await res.json();

if(data.logged_in){

loggedIn=true;

let email=data.email || "";
let name=email.split("@")[0];

document.getElementById("username").innerText=name;
document.getElementById("memberType").innerText="Member";

let initials=name.substring(0,2).toUpperCase();
document.getElementById("avatar").innerText=initials;

document.getElementById("guestMenu").classList.add("hidden");
document.getElementById("userMenu").classList.remove("hidden");

}else{

loggedIn=false;

document.getElementById("username").innerText="Guest User";
document.getElementById("memberType").innerText="Guest";
document.getElementById("avatar").innerText="GU";

document.getElementById("guestMenu").classList.remove("hidden");
document.getElementById("userMenu").classList.add("hidden");
}

}catch(e){}
}

/* ================= LOGOUT ================= */
async function logoutUser(){

await fetch("/logout");

loggedIn=false;

document.getElementById("menu").classList.add("hidden");

document.getElementById("chatBox").innerHTML="";
document.getElementById("historyBox").innerHTML="";

await loadUser();
}

/* ================= START ================= */
window.onload=async()=>{
await loadUser();
await loadHistory();
}
</script>
