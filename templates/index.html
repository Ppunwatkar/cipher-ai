<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<!-- FAVICON -->

<script src="https://cdn.tailwindcss.com"></script>

<!-- MARKDOWN + CODE -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
:root{
    --primary:#8b5cf6;
    --accent:#6366f1;
}

/* BASE */
body {
    margin:0;
    color:#e5e7eb;
    font-family:'Inter', monospace;
    background:
        radial-gradient(circle at 20% 20%, rgba(139,92,246,0.15), transparent 40%),
        radial-gradient(circle at 80% 10%, rgba(99,102,241,0.12), transparent 40%),

        linear-gradient(rgba(139,92,246,0.05) 1px, transparent 1px),

/* LOGO GLOW */

}

.input-box {
    background: rgba(2,6,23,0.8);

    width:100%;

}

}

    text-align:right;

<body class="flex flex-col h-screen">

<div class="flex flex-1 overflow-hidden">

<!-- SIDEBAR -->
<div class="sidebar glass p-4 flex flex-col justify-between hidden md:flex">
    <div>
        <!-- LOGO + NAME -->
        <div class="flex items-center gap-3">
            <img src="{{ url_for('static', filename='logo.png') }}" 
                 class="w-10 h-10 logo rounded-lg">
            <span class="text-purple-300 text-lg font-bold">CIPHER</span>
        </div>

        <p class="text-xs opacity-60 mt-1">AI Cyber Assistant</p>

        <button onclick="createNewChat()" class="btn mt-4 w-full">+ NEW CHAT</button>
    </div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col p-3 gap-3">

<div class="glass p-4 flex justify-between">
    <span>⚡ AI SECURITY CORE</span>
    <div class="flex gap-2">
        <span class="badge active" data-mode="thinking">THINK</span>
        <span class="badge" data-mode="fast">FAST</span>
        <span class="badge" data-mode="programming">CODE</span>
    </div>
</div>

<div id="chat" class="flex-1 glass p-4 overflow-y-auto"></div>

<div class="glass p-3 flex gap-2">
    <textarea id="msg" class="input-box flex-1"></textarea>
    <button onclick="send()" class="btn px-6">➤</button>
</div>

</div>
</div>

<script>
let chats = {};
let currentChat = null;
let currentMode = "thinking";

function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = {messages:[]};
    render();
}

function render(){
    chat.innerHTML="";

    chats[currentChat].messages.forEach(m=>{
        const div=document.createElement("div");
        div.className = m.role==="user"?"user":"bot";

        div.innerHTML = marked.parse(m.content);

        div.querySelectorAll('pre code').forEach(block => {
            hljs.highlightElement(block);

            const btn=document.createElement("button");
            btn.innerText="Copy";
            btn.className="copy-btn";

            btn.onclick=()=>{
                navigator.clipboard.writeText(block.innerText);
                btn.innerText="Copied!";
                setTimeout(()=>btn.innerText="Copy",1500);
            };

            block.parentElement.style.position="relative";
            block.parentElement.appendChild(btn);
        });

        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

async function send(){
    const text = msg.value;
    if(!text) return;

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    msg.value="";

    const res = await fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:new URLSearchParams({
            message:text,
            chat_id:currentChat,
            mode:currentMode
        })
    });

    const data = await res.json();

    chats[currentChat].messages.push({
        role:"bot",
        content:data.response || "⚠️ No response"
    });

    render();
}

document.querySelectorAll('.badge').forEach(b=>{
    b.onclick=()=>{
        currentMode=b.dataset.mode;
        document.querySelectorAll('.badge').forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
    }
});

createNewChat();
</script>

</body>
</html>
