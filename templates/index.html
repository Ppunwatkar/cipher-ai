<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    margin:0;
    padding:0;
    overflow:hidden;
    color:#fff;
    font-family:Consolas, monospace;
    background:linear-gradient(135deg,#020617,#07113b,#020617);
}

.glass{
    background:rgba(8,12,35,.68);
    backdrop-filter:blur(18px);
}

.scrollbar::-webkit-scrollbar{width:5px}
.scrollbar::-webkit-scrollbar-thumb{
    background:#7c3aed;
    border-radius:10px;
}

.inputbox{
    background:#020617;
    border:1px solid rgba(255,255,255,.08);
    color:white;
}
.inputbox:focus{
    outline:none;
    border-color:#8b5cf6;
}

.msgbox{
    background:rgba(72,55,170,.15);
    border-left:2px solid #8b5cf6;
    border-radius:16px;
    padding:14px;
}

pre{
    background:#020617;
    border:1px solid rgba(255,255,255,.06);
    border-radius:14px;
    padding:14px;
    overflow:auto;
    margin-top:10px;
    font-size:14px;
    line-height:1.6;
}

.typing span{
    animation:blink 1.1s infinite;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}
</style>
</head>

<body>

<div class="h-screen flex gap-3 p-3">

<!-- ================= SIDEBAR ================= -->
<div class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

    <!-- LOGO -->
    <div class="flex items-center gap-3 mb-4 shrink-0">

        <img src="/static/logo.png"
             class="w-12 h-12 object-contain rounded-xl">

        <div class="leading-tight min-w-0">
            <div class="text-3xl tracking-[6px] text-violet-300 truncate">
                CIPHER
            </div>
            <div class="text-xs text-white/55 mt-1">
                AI Cyber Assistant
            </div>
        </div>

    </div>

    <!-- NEW CHAT -->
    <button onclick="newChat()"
        class="w-full rounded-2xl border border-violet-500 py-3 mb-4 hover:bg-violet-500/10 transition shrink-0">
        + NEW CHAT
    </button>

    <!-- TOOLS -->
    <div class="shrink-0 mb-4">

        <div class="flex items-center justify-between px-1 mb-2">
            <div class="text-[11px] tracking-[4px] text-white/40">
                SECURITY TOOLS
            </div>

            <button onclick="toggleTools()"
                class="text-xs text-violet-300 hover:text-white">
                Hide
            </button>
        </div>

        <div id="toolsPanel"
            class="space-y-2 max-h-[240px] overflow-y-auto scrollbar pr-1">

            <!-- Tool Button -->
            <button onclick="openTool('hash')"
            class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 text-left transition">
                <div class="w-10 h-10 rounded-xl bg-violet-500/20 flex items-center justify-center">🔐</div>
                <div>
                    <div class="text-sm">Hash Tool</div>
                    <div class="text-[11px] text-white/40">MD5 / SHA256</div>
                </div>
            </button>

            <button onclick="openTool('jwt')"
            class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 text-left transition">
                <div class="w-10 h-10 rounded-xl bg-cyan-500/20 flex items-center justify-center">🪪</div>
                <div>
                    <div class="text-sm">JWT Decoder</div>
                    <div class="text-[11px] text-white/40">Decode Tokens</div>
                </div>
            </button>

            <button onclick="openTool('whois')"
            class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 text-left transition">
                <div class="w-10 h-10 rounded-xl bg-emerald-500/20 flex items-center justify-center">🌐</div>
                <div>
                    <div class="text-sm">WHOIS Lookup</div>
                    <div class="text-[11px] text-white/40">Domain Info</div>
                </div>
            </button>

            <button onclick="openTool('dns')"
            class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 text-left transition">
                <div class="w-10 h-10 rounded-xl bg-yellow-500/20 flex items-center justify-center">📡</div>
                <div>
                    <div class="text-sm">DNS Lookup</div>
                    <div class="text-[11px] text-white/40">A / MX / TXT</div>
                </div>
            </button>

            <button onclick="openTool('password')"
            class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 text-left transition">
                <div class="w-10 h-10 rounded-xl bg-red-500/20 flex items-center justify-center">🔑</div>
                <div>
                    <div class="text-sm">Password Check</div>
                    <div class="text-[11px] text-white/40">Strength Test</div>
                </div>
            </button>

            <button onclick="openTool('base64')"
            class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 text-left transition">
                <div class="w-10 h-10 rounded-xl bg-pink-500/20 flex items-center justify-center">📦</div>
                <div>
                    <div class="text-sm">Base64 Tool</div>
                    <div class="text-[11px] text-white/40">Encode / Decode</div>
                </div>
            </button>

        </div>
    </div>

    <!-- HISTORY -->
    <div id="historyBox"
        class="flex-1 overflow-y-auto scrollbar pr-1 space-y-2 min-h-0">
    </div>

    <!-- USER -->
    <div class="relative mt-4 shrink-0">

        <div onclick="toggleMenu()"
        class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer hover:border-violet-500">

            <div class="flex items-center gap-3">

                <div id="avatar"
                class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center text-sm font-bold">
                    GU
                </div>

                <div class="flex-1 min-w-0">
                    <div id="username" class="truncate text-sm">Guest User</div>
                    <div id="memberType" class="text-[11px] text-white/45">Guest</div>
                </div>

                <div>›</div>
            </div>
        </div>

        <!-- MENU -->
        <div id="menu"
        class="hidden absolute left-0 bottom-16 w-64 bg-[#171717] rounded-2xl border border-white/10 p-2 z-50">

            <div id="guestMenu">
                <button onclick="openAuth('login')" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Login</button>
                <button onclick="openAuth('signup')" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Sign Up</button>
            </div>

            <div id="userMenu" class="hidden">
                <button onclick="openProfile()" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Profile</button>
                <button onclick="openSettings()" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Settings</button>
                <button onclick="logoutUser()" class="w-full text-left px-3 py-2 rounded-xl hover:bg-red-500/10 text-red-300">Logout</button>
            </div>

        </div>
    </div>

</div>

<!-- ================= MAIN ================= -->
<div class="flex-1 flex flex-col gap-3">

<!-- TOP -->
<div class="glass rounded-3xl border border-white/10 px-8 py-5 flex justify-between items-center">

<div class="text-violet-300 tracking-widest text-lg">
⚡ AI SECURITY CORE
</div>

<div class="flex gap-2">

<button id="thinkingBtn" onclick="setMode('thinking')"
class="modeBtn px-5 py-3 rounded-full border border-white/10 text-sm">THINK</button>

<button id="fastBtn" onclick="setMode('fast')"
class="modeBtn px-5 py-3 rounded-full border border-violet-500 bg-violet-500/20 text-sm">FAST</button>

<button id="codeBtn" onclick="setMode('code')"
class="modeBtn px-5 py-3 rounded-full border border-white/10 text-sm">CODE</button>

</div>
</div>

<!-- CHAT -->
<div id="chatBox"
class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<!-- INPUT -->
<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3 items-end">

<textarea id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl resize-none px-5 py-4 text-base placeholder-white/25"></textarea>

<button onclick="sendMsg()"
class="w-24 h-16 rounded-2xl bg-violet-500 hover:bg-violet-600 text-xl">
➤
</button>

</div>

</div>
</div>

<!-- AUTH MODAL -->
<div id="authModal"
class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center">

<div class="w-[420px] max-w-[95%] glass rounded-2xl border border-white/10 p-7 relative">

<button onclick="closeAuth()"
class="absolute top-3 right-4 text-2xl text-white/60">✕</button>

<div class="text-4xl tracking-widest text-violet-300 mb-2">CIPHER</div>
<div class="text-sm text-white/55 mb-6">Secure AI Access</div>

<input id="authEmail"
placeholder="Email"
class="inputbox w-full rounded-xl px-4 py-3 mb-3 text-sm">

<div class="relative mb-4">
<input id="authPass"
type="password"
placeholder="Password"
class="inputbox w-full rounded-xl px-4 py-3 pr-12 text-sm">

<button onclick="togglePassword()"
class="absolute right-3 top-3 text-sm text-white/60">👁</button>
</div>

<button id="authBtn"
onclick="submitAuth()"
class="w-full rounded-xl bg-violet-500 hover:bg-violet-600 py-3 text-sm mb-4">
Login
</button>

<div class="text-center text-sm">
<span id="switchText">Don't have an account?</span>
<button onclick="switchAuthMode()" class="text-violet-300 ml-1">Sign Up</button>
</div>

<div id="authMsg" class="text-red-300 text-sm mt-4"></div>

</div>
</div>

<script>
let mode="fast";
let currentChatId=null;
let authMode="login";
let loaderId=null;

window.onload=async()=>{
await loadUser();
await loadHistory();
}

function toggleTools(){
let panel=document.getElementById("toolsPanel");
panel.style.display=panel.style.display==="none"?"block":"none";
}

function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(btn=>{
btn.classList.remove("bg-violet-500/20","border-violet-500");
btn.classList.add("border-white/10");
});
document.getElementById(m+"Btn").classList.add("bg-violet-500/20","border-violet-500");
}

async function sendMsg(){
let prompt=document.getElementById("prompt").value.trim();
if(!prompt)return;

appendUser(prompt);
document.getElementById("prompt").value="";
showLoader();

try{
let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:prompt,mode:mode,chat_id:currentChatId})
});

let data=await res.json();
hideLoader();

if(data.ok){
currentChatId=data.chat_id;
appendAI(data.label || "AI MODEL", data.response || "No response");
await loadHistory();
}else{
appendAI("SYSTEM",data.msg || "Failed");
}
}catch(e){
hideLoader();
appendAI("SYSTEM","Server Error");
}
}

function appendUser(txt){
chatBox.innerHTML+=`
<div class="text-right">
<div class="inline-block max-w-[75%] bg-[#101844] px-4 py-3 rounded-2xl text-left">
${escapeHtml(txt)}
</div>
</div>`;
scrollBottom();
}

function appendAI(label,txt){
chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-[11px] text-white/55 mb-2">${label}</div>
<div class="text-[15px] leading-8">${escapeHtml(txt).replace(/\n/g,"<br>")}</div>
</div>`;
scrollBottom();
}

function showLoader(){
loaderId="loader"+Date.now();
chatBox.innerHTML+=`
<div id="${loaderId}" class="msgbox">
<div class="text-[11px] text-white/55 mb-2">AI MODEL</div>
<div class="typing text-2xl text-violet-300">
<span>.</span><span>.</span><span>.</span>
</div>
</div>`;
scrollBottom();
}

function hideLoader(){
let el=document.getElementById(loaderId);
if(el)el.remove();
}

function newChat(){
currentChatId=null;
chatBox.innerHTML="";
}

async function loadHistory(){
try{
let res=await fetch("/history");
let data=await res.json();
historyBox.innerHTML="";

(data.items||[]).forEach(c=>{
historyBox.innerHTML+=`
<div onclick="loadChat('${c.id}')"
class="p-3 rounded-2xl border border-white/10 hover:border-violet-500 cursor-pointer text-sm">
${c.title}
</div>`;
});
}catch(e){}
}

async function loadChat(id){
currentChatId=id;
let res=await fetch("/chat/"+id);
let data=await res.json();

chatBox.innerHTML="";

(data.items||[]).forEach(m=>{
if(m.role==="user") appendUser(m.content);
else appendAI("AI MODEL",m.content);
});
}

async function loadUser(){
try{
let res=await fetch("/me");
let data=await res.json();

if(data.logged_in){
let email=data.email;
let usernamePart=email.split("@")[0];
let initials=usernamePart.substring(0,2).toUpperCase();

username.innerText=usernamePart;
memberType.innerText="Member";
avatar.innerText=initials;

guestMenu.classList.add("hidden");
userMenu.classList.remove("hidden");
}else{
username.innerText="Guest User";
memberType.innerText="Guest";
avatar.innerText="GU";

guestMenu.classList.remove("hidden");
userMenu.classList.add("hidden");
}
}catch(e){}
}

function toggleMenu(){
menu.classList.toggle("hidden");
}

function openAuth(type){
authMode=type;
updateAuth();
menu.classList.add("hidden");
authModal.classList.remove("hidden");
}

function closeAuth(){
authModal.classList.add("hidden");
authMsg.innerText="";
}

function switchAuthMode(){
authMode=authMode==="login"?"signup":"login";
updateAuth();
}

function updateAuth(){
if(authMode==="login"){
authBtn.innerText="Login";
switchText.innerText="Don't have an account?";
}else{
authBtn.innerText="Sign Up";
switchText.innerText="Already have an account?";
}
}

async function submitAuth(){
let email=authEmail.value.trim();
let password=authPass.value.trim();

if(!email || !password){
authMsg.innerText="Fill all fields";
return;
}

let url=authMode==="login"?"/login":"/signup";

let res=await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

let data=await res.json();

if(data.ok){
closeAuth();
await loadUser();
await loadHistory();
}else{
authMsg.innerText=data.msg || "Failed";
}
}

function togglePassword(){
authPass.type=authPass.type==="password"?"text":"password";
}

async function logoutUser(){
await fetch("/logout");
menu.classList.add("hidden");
chatBox.innerHTML="";
historyBox.innerHTML="";
await loadUser();
}

function openTool(tool){
const names={
hash:"Hash Tool",
jwt:"JWT Decoder",
whois:"WHOIS Lookup",
dns:"DNS Lookup",
password:"Password Checker",
base64:"Base64 Tool"
};

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-[11px] text-violet-300 mb-2">TOOL PANEL</div>
<div class="text-lg mb-1">${names[tool]}</div>
<div class="text-sm text-white/55">Backend integration pending. Tool UI ready.</div>
</div>`;
scrollBottom();
}

function scrollBottom(){
chatBox.scrollTop=chatBox.scrollHeight;
}

function escapeHtml(t){
return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function openProfile(){alert("Profile Soon");}
function openSettings(){alert("Settings Soon");}
</script>

</body>
</html>
