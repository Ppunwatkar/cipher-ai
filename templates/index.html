<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
padding:0;
overflow:hidden;
color:#fff;
font-family:Consolas,monospace;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}
.glass{
background:rgba(8,12,35,.68);
backdrop-filter:blur(18px);
}
.scrollbar::-webkit-scrollbar{width:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:10px;
}
.inputbox{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
}
.inputbox:focus{
outline:none;
border-color:#8b5cf6;
}
.msgbox{
background:rgba(72,55,170,.15);
border-left:2px solid #8b5cf6;
border-radius:16px;
padding:14px;
}
.typing span{animation:blink 1.1s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}
.toolInput{
width:100%;
padding:12px;
border-radius:14px;
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
margin-bottom:10px;
}
.toolBtn{
padding:10px 16px;
border-radius:14px;
background:#7c3aed;
}
pre{
white-space:pre-wrap;
word-wrap:break-word;
}
</style>
</head>

<body>

<div class="h-screen flex gap-3 p-3">

<!-- ================= LEFT SIDEBAR ================= -->
<div class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<!-- LOGO -->
<div class="flex items-center gap-3 mb-4 shrink-0">
<img src="/static/logo.png" class="w-12 h-12 object-contain rounded-xl">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55 mt-1">AI Cyber Assistant</div>
</div>
</div>

<!-- NEW CHAT -->
<button onclick="newChat()"
class="w-full rounded-2xl border border-violet-500 py-3 mb-4 hover:bg-violet-500/10 transition shrink-0">
+ NEW CHAT
</button>

<!-- HISTORY -->
<div id="historyBox"
class="flex-1 overflow-y-auto scrollbar pr-1 space-y-2 min-h-0 mb-4">
</div>

<!-- TOOLS -->
<div class="shrink-0 mb-4">

<div class="flex items-center justify-between mb-2 px-1">
<div class="text-[11px] tracking-[4px] text-white/40">SECURITY TOOLS</div>

<button onclick="toggleTools()"
class="text-xs text-violet-300 hover:text-white">Hide</button>
</div>

<div id="toolsPanel"
class="space-y-2 max-h-[220px] overflow-y-auto scrollbar pr-1">

<button onclick="openTool('hash')" class="toolRow">🔐 Hash Tool</button>
<button onclick="openTool('base64')" class="toolRow">📦 Base64 Tool</button>
<button onclick="openTool('password')" class="toolRow">🔑 Password Check</button>
<button onclick="openTool('jwt')" class="toolRow">🪪 JWT Decoder</button>
<button onclick="openTool('whois')" class="toolRow">🌐 WHOIS Lookup</button>
<button onclick="openTool('dns')" class="toolRow">📡 DNS Lookup</button>

</div>
</div>

<!-- USER -->
<div class="relative shrink-0">

<div onclick="toggleMenu()"
class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer hover:border-violet-500">

<div class="flex items-center gap-3">

<div id="avatar"
class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center text-sm font-bold">
GU
</div>

<div class="flex-1 min-w-0">
<div id="username" class="truncate text-sm">Guest User</div>
<div id="memberType" class="text-[11px] text-white/45">Guest</div>
</div>

<div>›</div>

</div>
</div>

<div id="menu"
class="hidden absolute left-0 bottom-16 w-64 bg-[#171717] rounded-2xl border border-white/10 p-2 z-50">

<div id="guestMenu">
<button onclick="openAuth('login')" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Login</button>
<button onclick="openAuth('signup')" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Sign Up</button>
</div>

<div id="userMenu" class="hidden">
<button onclick="logoutUser()" class="w-full text-left px-3 py-2 rounded-xl hover:bg-red-500/10 text-red-300">Logout</button>
</div>

</div>
</div>

</div>

<!-- ================= MAIN ================= -->
<div class="flex-1 flex flex-col gap-3">

<!-- TOP -->
<div class="glass rounded-3xl border border-white/10 px-8 py-5 flex justify-between items-center">

<div class="text-violet-300 tracking-widest text-lg">⚡ AI SECURITY CORE</div>

<div class="flex gap-2">
<button id="thinkingBtn" onclick="setMode('thinking')" class="modeBtn px-5 py-3 rounded-full border border-white/10 text-sm">THINK</button>
<button id="fastBtn" onclick="setMode('fast')" class="modeBtn px-5 py-3 rounded-full border border-violet-500 bg-violet-500/20 text-sm">FAST</button>
<button id="codeBtn" onclick="setMode('code')" class="modeBtn px-5 py-3 rounded-full border border-white/10 text-sm">CODE</button>
</div>

</div>

<!-- CHAT -->
<div id="chatBox"
class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4">
</div>

<!-- INPUT -->
<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3 items-end">

<textarea id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl resize-none px-5 py-4 text-base placeholder-white/25"></textarea>

<button onclick="sendMsg()"
class="w-24 h-16 rounded-2xl bg-violet-500 hover:bg-violet-600 text-xl">➤</button>

</div>

</div>
</div>

<script>
let mode="fast";
let currentChatId=null;

document.querySelectorAll(".toolRow").forEach(x=>{
x.className="w-full text-left px-4 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 transition";
});

function toggleTools(){
let box=document.getElementById("toolsPanel");
box.style.display=box.style.display==="none"?"block":"none";
}

function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(btn=>{
btn.classList.remove("bg-violet-500/20","border-violet-500");
btn.classList.add("border-white/10");
});
document.getElementById(m+"Btn").classList.add("bg-violet-500/20","border-violet-500");
}

function newChat(){
chatBox.innerHTML="";
currentChatId=null;
}

async function sendMsg(){

let prompt=document.getElementById("prompt").value.trim();
if(!prompt)return;

chatBox.innerHTML+=`
<div class="text-right">
<div class="inline-block bg-[#101844] px-4 py-3 rounded-2xl max-w-[75%]">
${prompt}
</div>
</div>`;

document.getElementById("prompt").value="";
scrollBottom();

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:prompt,
mode:mode,
chat_id:currentChatId
})
});

let data=await res.json();

if(data.ok){
currentChatId=data.chat_id;

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-[11px] text-white/55 mb-2">${data.label}</div>
<div>${data.response.replace(/\n/g,"<br>")}</div>
</div>`;
}

scrollBottom();
loadHistory();
}

async function loadHistory(){

let res=await fetch("/history");
let data=await res.json();

historyBox.innerHTML="";

(data.items||[]).forEach(c=>{
historyBox.innerHTML+=`
<div onclick="loadChat('${c.id}')"
class="p-3 rounded-2xl border border-white/10 hover:border-violet-500 cursor-pointer text-sm">
${c.title}
</div>`;
});
}

async function loadChat(id){

let res=await fetch("/chat/"+id);
let data=await res.json();

chatBox.innerHTML="";
currentChatId=id;

(data.items||[]).forEach(m=>{

if(m.role==="user"){
chatBox.innerHTML+=`
<div class="text-right">
<div class="inline-block bg-[#101844] px-4 py-3 rounded-2xl max-w-[75%]">
${m.content}
</div>
</div>`;
}else{
chatBox.innerHTML+=`
<div class="msgbox">
<div>${m.content.replace(/\n/g,"<br>")}</div>
</div>`;
}

});

scrollBottom();
}

async function openTool(tool){

let html="";

if(tool==="hash"){
html=`
<input id="toolText" class="toolInput" placeholder="Enter text">
<button class="toolBtn" onclick="runTool('hash')">Generate</button>`;
}

if(tool==="base64"){
html=`
<input id="toolText" class="toolInput" placeholder="Enter text">
<select id="toolMode" class="toolInput">
<option value="encode">Encode</option>
<option value="decode">Decode</option>
</select>
<button class="toolBtn" onclick="runTool('base64')">Run</button>`;
}

if(tool==="password" || tool==="jwt" || tool==="whois"){
html=`
<input id="toolText" class="toolInput" placeholder="Enter value">
<button class="toolBtn" onclick="runTool('${tool}')">Run</button>`;
}

if(tool==="dns"){
html=`
<input id="toolText" class="toolInput" placeholder="Domain">
<select id="toolMode" class="toolInput">
<option value="A">A</option>
<option value="MX">MX</option>
<option value="TXT">TXT</option>
<option value="NS">NS</option>
</select>
<button class="toolBtn" onclick="runTool('dns')">Lookup</button>`;
}

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-violet-300 mb-3">TOOL PANEL • ${tool.toUpperCase()}</div>
${html}
<div id="toolResult" class="mt-3 text-sm text-white/80"></div>
</div>`;

scrollBottom();
}

async function runTool(name){

let text=document.getElementById("toolText").value;
let mode=document.getElementById("toolMode")?.value || "";

let res=await fetch("/tool/"+name,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
text:text,
mode:mode,
rtype:mode
})
});

let data=await res.json();

document.getElementById("toolResult").innerHTML=
`<pre>${JSON.stringify(data,null,2)}</pre>`;
}

function scrollBottom(){
chatBox.scrollTop=chatBox.scrollHeight;
}

window.onload=loadHistory;
</script>

</body>
</html>
