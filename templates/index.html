<!-- Everything else preserved -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
padding:0;
overflow:hidden;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}
.glass{
background:rgba(8,12,35,.72);
backdrop-filter:blur(18px);
}
.scrollbar::-webkit-scrollbar{width:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;border-radius:20px;
}
#menu{
display:none;
position:absolute;
left:0;
bottom:65px;
width:290px;
background:#1c1c1c;
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:8px;
z-index:9999;
box-shadow:0 20px 45px rgba(0,0,0,.55);
}
.menuItem{
padding:12px 14px;
border-radius:14px;
cursor:pointer;
transition:.2s;
}
.menuItem:hover{
background:rgba(255,255,255,.08);
}
.sep{
height:1px;
background:rgba(255,255,255,.08);
margin:8px 0;
}
#authModal,#panelModal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.55);
z-index:99999;
}
.modalCard{
width:420px;
background:#070d2c;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:24px;
}
.modalInput{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:14px;
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
}
.btn{
padding:11px 16px;
border-radius:14px;
background:#7c3aed;
width:100%;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authModal">
<div class="modalCard">

<div class="flex justify-between items-center mb-4">
<div id="authTitle" class="text-3xl text-violet-300">Login</div>
<button onclick="closeAuth()">✕</button>
</div>

<input id="authName" class="modalInput hidden" placeholder="Full Name">
<input id="authEmail" class="modalInput" placeholder="Email">
<input id="authPass" type="password" class="modalInput" placeholder="Password">

<button class="btn" onclick="submitAuth()" id="authBtn">Login</button>

<div class="text-center mt-4 text-sm text-white/60">
<span id="switchText">Don't have an account?</span>
<button onclick="switchAuth()" id="switchBtn" class="text-violet-300 ml-1">
Sign Up
</button>
</div>

<div id="authMsg" class="text-red-300 text-sm mt-3"></div>

</div>
</div>

<!-- PANEL -->
<div id="panelModal">
<div class="modalCard" id="panelContent"></div>
</div>

<!-- USER CARD -->
<div class="relative">

<div onclick="toggleMenu()"
class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer">

<div class="flex items-center gap-3">

<div id="avatar"
class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold">
GU
</div>

<div class="flex-1">
<div id="username">Guest User</div>
<div id="memberType" class="text-xs text-white/45">Guest</div>
</div>

<div>›</div>

</div>
</div>

<div id="menu"></div>

</div>

<script>
let authMode="login";
let loggedUser=null;

/* MENU */
function toggleMenu(){

menu.style.display = menu.style.display==="block" ? "none":"block";

if(loggedUser){

menu.innerHTML=`
<div class="px-3 py-2 flex gap-3 items-center">
<div class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold">
${loggedUser.name.slice(0,2).toUpperCase()}
</div>

<div class="flex-1">
<div class="font-semibold">${loggedUser.name}</div>
<div class="text-xs text-white/45 truncate">${loggedUser.email}</div>
</div>
</div>

<div class="sep"></div>

<div class="menuItem" onclick="openPanel('personal')">⚙ Personalization</div>
<div class="menuItem" onclick="openPanel('profile')">👤 Profile</div>
<div class="menuItem" onclick="openPanel('settings')">🛠 Settings</div>

<div class="sep"></div>

<div class="menuItem" onclick="openPanel('help')">❓ Help</div>

<div class="sep"></div>

<div class="menuItem text-red-300" onclick="logoutUser()">↩ Log out</div>
`;

}else{

menu.innerHTML=`
<div class="menuItem" onclick="openAuth('login')">Login</div>
<div class="menuItem" onclick="openAuth('signup')">Sign Up</div>
`;
}
}

/* AUTH */
function openAuth(type){

authMode=type;
authModal.style.display="flex";
menu.style.display="none";
authMsg.innerText="";

if(type==="login"){
authTitle.innerText="Login";
authBtn.innerText="Login";
authName.classList.add("hidden");
switchText.innerText="Don't have an account?";
switchBtn.innerText="Sign Up";
}else{
authTitle.innerText="Sign Up";
authBtn.innerText="Create Account";
authName.classList.remove("hidden");
switchText.innerText="Already have an account?";
switchBtn.innerText="Log In";
}
}

function closeAuth(){
authModal.style.display="none";
}

function switchAuth(){
openAuth(authMode==="login"?"signup":"login");
}

async function submitAuth(){

let payload={
email:authEmail.value,
password:authPass.value
};

if(authMode==="signup"){
payload.name=authName.value;
}

let url=authMode==="login" ? "/login" : "/signup";

try{

let res=await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.ok){

loggedUser=data.user || {
name:payload.name || payload.email.split("@")[0],
email:payload.email
};

updateUserUI();
closeAuth();

}else{
authMsg.innerText=data.message || "Failed";
}

}catch{
authMsg.innerText="Server Error";
}
}

/* USER UI */
function updateUserUI(){

if(loggedUser){

avatar.innerText=loggedUser.name.slice(0,2).toUpperCase();
username.innerText=loggedUser.name;
memberType.innerText="Member";

}else{

avatar.innerText="GU";
username.innerText="Guest User";
memberType.innerText="Guest";
}
}

function logoutUser(){
loggedUser=null;
updateUserUI();
menu.style.display="none";
}

/* PANELS */
function openPanel(type){

panelModal.style.display="flex";
menu.style.display="none";

if(type==="profile"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Profile</div>

<input class="modalInput" value="${loggedUser.name}">
<input class="modalInput" value="${loggedUser.email}">
<input class="modalInput" value="${loggedUser.email.split('@')[0]}">

<button class="btn">Save Changes</button>
`;
}

if(type==="settings"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Settings</div>

<div class="menuItem">🌙 Appearance</div>
<div class="menuItem">🎨 Accent Color</div>
<div class="menuItem">🌐 Language</div>
<div class="menuItem">🔔 Notifications</div>
<div class="menuItem">🔒 Security</div>
`;
}

if(type==="personal"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Personalization</div>

<div class="menuItem">🧠 Memory</div>
<div class="menuItem">💬 Response Style</div>
<div class="menuItem">🎭 Theme Behavior</div>
`;
}

if(type==="help"){
panelContent.innerHTML=`
<div class="text-2xl text-violet-300 mb-4">Help</div>

<div class="menuItem">📘 FAQ</div>
<div class="menuItem">🛟 Support</div>
<div class="menuItem">ℹ About CIPHER</div>
<div class="menuItem">🚀 Version 1.0</div>
`;
}
}

panelModal.onclick=function(e){
if(e.target===panelModal){
panelModal.style.display="none";
}
};

document.addEventListener("click",function(e){
if(!menu.contains(e.target) && !e.target.closest(".relative")){
menu.style.display="none";
}
});

updateUserUI();
</script>

</body>
</html>
