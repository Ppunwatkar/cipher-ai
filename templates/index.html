<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
padding:0;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
overflow:hidden;
}

.glass{
background:rgba(8,12,35,.72);
backdrop-filter:blur(18px);
}

.scrollbar::-webkit-scrollbar{width:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;border-radius:20px;
}

.inputbox,.toolInput,.authInput{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
outline:none;
}

.inputbox:focus,.toolInput:focus{
border-color:#8b5cf6;
}

.modeBtn{
border:1px solid rgba(255,255,255,.08);
transition:.2s;
}
.modeActive{
background:rgba(124,58,237,.18);
border-color:#8b5cf6 !important;
}

.msgbox{
background:rgba(72,55,170,.12);
border-left:2px solid #8b5cf6;
border-radius:18px;
padding:16px;
}

.userBubble{
background:#101844;
border-radius:18px;
padding:14px 16px;
display:inline-block;
max-width:75%;
word-break:break-word;
}

.toolCard{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.06);
background:rgba(255,255,255,.02);
transition:.2s;
cursor:pointer;
}
.toolCard:hover{
border-color:#8b5cf6;
background:rgba(124,58,237,.08);
}

.btn{
padding:11px 16px;
border-radius:14px;
background:#7c3aed;
width:100%;
}

#toolsPanel{
max-height:240px;
overflow-y:auto;
}

#mobileSidebar{
display:none;
}

#imagePreview{
display:none;
max-height:70px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
}

@media (max-width:1024px){
#sidebar{
width:260px;
}
}

@media (max-width:768px){

body{
overflow:auto;
}

#desktopWrap{
flex-direction:column;
height:auto;
}

#sidebar{
display:none;
position:fixed;
left:0;
top:0;
bottom:0;
width:280px;
z-index:9999;
border-radius:0;
}

#sidebar.show{
display:flex;
}

#mobileSidebar{
display:block;
}

#chatSection{
width:100%;
}

#chatBox{
height:60vh;
}

.modeBtn{
padding:10px 14px;
font-size:14px;
}

.userBubble{
max-width:90%;
}
}
</style>
</head>

<body>

<div class="p-3 h-screen flex gap-3" id="desktopWrap">

<!-- SIDEBAR -->
<div id="sidebar" class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col overflow-hidden">

<div class="flex gap-3 items-center mb-4">
<img src="/static/logo.png" class="w-12 h-12 rounded-xl object-contain">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()" class="w-full py-3 rounded-2xl border border-violet-500 mb-4">
+ NEW CHAT
</button>

<div id="historyBox" class="flex-1 overflow-y-auto scrollbar space-y-2 mb-4"></div>

<!-- TOOLS HEADER -->
<div class="mb-2 flex justify-between items-center px-1">
<div class="text-[11px] tracking-[4px] text-white/40">SECURITY TOOLS</div>
<button onclick="toggleTools()" class="text-xs text-violet-300">HIDE</button>
</div>

<!-- TOOLS -->
<div id="toolsPanel" class="space-y-2 scrollbar mb-4">

<div class="toolCard" onclick="openTool('hash')"><div>🔐 Hash Tool</div><div>i</div></div>
<div class="toolCard" onclick="openTool('base64')"><div>📦 Base64 Tool</div><div>i</div></div>
<div class="toolCard" onclick="openTool('password')"><div>🔑 Password Check</div><div>i</div></div>
<div class="toolCard" onclick="openTool('jwt')"><div>🪪 JWT Decoder</div><div>i</div></div>
<div class="toolCard" onclick="openTool('headers')"><div>🛡 Header Scan</div><div>i</div></div>
<div class="toolCard" onclick="openTool('logs')"><div>📜 Log Analyzer</div><div>i</div></div>

</div>

</div>

<!-- MAIN -->
<div id="chatSection" class="flex-1 flex flex-col gap-3">

<!-- TOP -->
<div class="glass rounded-3xl border border-white/10 px-5 py-4 flex justify-between items-center">

<div class="flex items-center gap-3">
<button id="mobileSidebar" onclick="toggleSidebar()" class="text-xl">☰</button>
<div class="text-violet-300 tracking-widest text-lg">⚡ AI SECURITY CORE</div>
</div>

<div class="flex gap-2">
<button id="thinkingBtn" onclick="setMode('thinking')" class="modeBtn px-5 py-3 rounded-full">THINK</button>
<button id="fastBtn" onclick="setMode('fast')" class="modeBtn modeActive px-5 py-3 rounded-full">FAST</button>
<button id="codeBtn" onclick="setMode('code')" class="modeBtn px-5 py-3 rounded-full">CODE</button>
</div>

</div>

<!-- CHAT -->
<div id="chatBox" class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<!-- INPUT -->
<div class="glass rounded-3xl border border-white/10 p-3 flex flex-col gap-3">

<img id="imagePreview">

<div class="flex gap-3 items-end">

<label for="imageUpload" class="w-14 h-14 rounded-2xl bg-[#101844] flex items-center justify-center cursor-pointer text-xl">
📎
</label>
<input type="file" id="imageUpload" accept="image/*" hidden onchange="previewImage(event)">

<textarea
id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl px-5 py-4 resize-none"></textarea>

<button onclick="sendMsg()" class="w-20 h-14 rounded-2xl bg-violet-500 text-xl">
➤
</button>

</div>

</div>

</div>
</div>

<script>
let mode="fast";

function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(x=>x.classList.remove("modeActive"));
document.getElementById(m+"Btn").classList.add("modeActive");
}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("show");
}

function toggleTools(){
let panel=document.getElementById("toolsPanel");
if(panel.style.display==="none"){
panel.style.display="block";
event.target.innerText="HIDE";
}else{
panel.style.display="none";
event.target.innerText="SHOW";
}
}

function previewImage(e){
let file=e.target.files[0];
if(!file)return;

let reader=new FileReader();
reader.onload=function(x){
let img=document.getElementById("imagePreview");
img.src=x.target.result;
img.style.display="block";
}
reader.readAsDataURL(file);
}

async function sendMsg(){

let text=document.getElementById("prompt").value.trim();
if(!text)return;

chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${text}</div>
</div>`;

document.getElementById("prompt").value="";

chatBox.innerHTML+=`
<div class="msgbox">Thinking...</div>`;

chatBox.scrollTop=chatBox.scrollHeight;

try{

let payload={
message:text,
mode:mode
};

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

let data=await res.json();

chatBox.lastElementChild.remove();

chatBox.innerHTML+=`
<div class="msgbox">${(data.response || "No response").replace(/\n/g,"<br>")}</div>`;

}catch{
chatBox.lastElementChild.remove();
chatBox.innerHTML+=`<div class="msgbox text-red-300">Server Error</div>`;
}

chatBox.scrollTop=chatBox.scrollHeight;
}

function openTool(name){
chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-violet-300">Opened Tool: ${name.toUpperCase()}</div>
</div>`;
chatBox.scrollTop=chatBox.scrollHeight;
}

function newChat(){
chatBox.innerHTML="";
}
</script>

</body>
</html>
