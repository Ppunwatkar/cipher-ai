<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
padding:0;
overflow:hidden;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}
.glass{
background:rgba(8,12,35,.72);
backdrop-filter:blur(18px);
}
.scrollbar::-webkit-scrollbar{width:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:20px;
}
.inputbox,.authInput{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
outline:none;
}
.inputbox:focus,.authInput:focus{
border-color:#8b5cf6;
}
.modeBtn{
border:1px solid rgba(255,255,255,.08);
transition:.2s;
}
.modeActive{
background:rgba(124,58,237,.18);
border-color:#8b5cf6!important;
}
.userBubble{
background:#101844;
padding:14px 16px;
border-radius:18px;
display:inline-block;
max-width:75%;
word-break:break-word;
}
.msgbox{
background:rgba(72,55,170,.12);
border-left:2px solid #8b5cf6;
padding:16px;
border-radius:18px;
}
.toolCard{
padding:12px 14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.06);
background:rgba(255,255,255,.02);
display:flex;
justify-content:space-between;
cursor:pointer;
transition:.2s;
}
.toolCard:hover{
border-color:#8b5cf6;
background:rgba(124,58,237,.08);
}
#menu{
display:none;
position:absolute;
left:0;
bottom:70px;
width:290px;
background:#11162f;
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:8px;
z-index:9999;
}
.menuItem{
padding:12px 14px;
border-radius:14px;
cursor:pointer;
}
.menuItem:hover{
background:rgba(255,255,255,.08);
}
.sep{
height:1px;
background:rgba(255,255,255,.08);
margin:8px 0;
}
#authModal,#panelModal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.55);
z-index:99999;
}
.modalCard{
width:420px;
max-width:95%;
background:#070d2c;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:24px;
}
.authInput{
width:100%;
padding:12px;
border-radius:14px;
margin-bottom:10px;
}
.btn{
padding:11px 16px;
border-radius:14px;
background:#7c3aed;
width:100%;
}
pre{margin:0}
@media(max-width:900px){
body{overflow:auto}
#layout{flex-direction:column;height:auto}
#sidebar{
display:none;
position:fixed;
left:0;top:0;bottom:0;
width:290px;
z-index:9999;
border-radius:0;
}
#sidebar.show{display:flex}
#mobileSidebar{display:block}
#chatBox{height:58vh}
}
</style>
</head>

<body>

<div id="authModal"></div>
<div id="panelModal"></div>

<div id="layout" class="h-screen flex gap-3 p-3">

<!-- SIDEBAR -->
<div id="sidebar" class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<div class="flex gap-3 items-center mb-4">
<img src="/static/logo.png" class="w-12 h-12 rounded-xl">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()" class="w-full py-3 rounded-2xl border border-violet-500 mb-4">
+ NEW CHAT
</button>

<div id="historyBox" class="flex-1 overflow-y-auto scrollbar space-y-2 mb-3"></div>

<div class="mb-2 flex justify-between items-center px-1">
<div class="text-[11px] tracking-[4px] text-white/40">SECURITY TOOLS</div>
<button onclick="toggleTools()" id="toolBtn" class="text-xs text-violet-300">HIDE</button>
</div>

<div id="toolsPanel" class="space-y-2 overflow-y-auto scrollbar h-[250px]">
<div class="toolCard"><div>🔐 Hash Tool</div><div>i</div></div>
<div class="toolCard"><div>📦 Base64 Tool</div><div>i</div></div>
<div class="toolCard"><div>🔑 Password Check</div><div>i</div></div>
<div class="toolCard"><div>🪪 JWT Decoder</div><div>i</div></div>
<div class="toolCard"><div>🛡 Header Scan</div><div>i</div></div>
<div class="toolCard"><div>📜 Log Analyzer</div><div>i</div></div>
</div>

<div class="relative mt-3">
<div onclick="toggleMenu()" class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer">
<div class="flex gap-3 items-center">
<div id="avatar" class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold">GU</div>
<div class="flex-1">
<div id="username">Guest User</div>
<div id="memberType" class="text-xs text-white/45">Guest</div>
</div>
<div>›</div>
</div>
</div>
<div id="menu"></div>
</div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col gap-3">

<div class="glass rounded-3xl border border-white/10 px-6 py-5 flex justify-between items-center">

<div class="flex items-center gap-3">
<button id="mobileSidebar" onclick="toggleSidebar()" class="hidden text-xl">☰</button>
<div class="text-violet-300 tracking-widest text-lg">⚡ AI SECURITY CORE</div>
</div>

<div class="flex gap-2">
<button id="thinkingBtn" onclick="setMode('thinking')" class="modeBtn px-5 py-3 rounded-full">THINK</button>
<button id="fastBtn" onclick="setMode('fast')" class="modeBtn modeActive px-5 py-3 rounded-full">FAST</button>
<button id="codeBtn" onclick="setMode('code')" class="modeBtn px-5 py-3 rounded-full">CODE</button>
</div>

</div>

<div id="chatBox" class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3">

<textarea id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl px-5 py-4 resize-none"></textarea>

<button onclick="sendMsg()" class="w-24 rounded-2xl bg-violet-500 text-xl">
➤
</button>

</div>

</div>
</div>

<script>
let mode="fast";
let chats=[];
let currentChat=null;

/* ENTER SEND */
document.addEventListener("DOMContentLoaded",()=>{

prompt.focus();

prompt.addEventListener("keydown",(e)=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendMsg();
}
});

});

/* MODE FIXED
THINK = GPT
FAST = GROQ
CODE = CLAUDE
*/
function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(x=>x.classList.remove("modeActive"));
document.getElementById(m+"Btn").classList.add("modeActive");
}

function modelLabel(){
if(mode==="thinking") return "🧠 GPT";
if(mode==="code") return "💻 Claude";
return "⚡ Groq";
}

/* TOOLS */
function toggleTools(){
if(toolsPanel.style.display==="none"){
toolsPanel.style.display="block";
toolBtn.innerText="HIDE";
}else{
toolsPanel.style.display="none";
toolBtn.innerText="SHOW";
}
}

/* MENU */
function toggleMenu(){
menu.style.display=menu.style.display==="block"?"none":"block";

menu.innerHTML=`
<div class="menuItem">Profile</div>
<div class="menuItem">Settings</div>
<div class="menuItem">Personalization</div>
<div class="sep"></div>
<div class="menuItem text-red-300">Logout</div>
`;
}

/* HISTORY */
function newChat(){
currentChat={
id:Date.now(),
title:"New Chat",
messages:[]
};
chats.unshift(currentChat);
renderHistory();
chatBox.innerHTML="";
saveChats();
prompt.focus();
}

function renderHistory(){
historyBox.innerHTML="";
chats.forEach(chat=>{
let div=document.createElement("div");
div.className="bg-[#101844] rounded-xl px-3 py-2 text-sm cursor-pointer";
div.innerText=chat.title;
div.onclick=()=>loadChat(chat.id);
historyBox.appendChild(div);
});
}

function loadChat(id){
currentChat=chats.find(x=>x.id===id);
chatBox.innerHTML="";

currentChat.messages.forEach(m=>{
if(m.role==="user"){
chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${m.text}</div>
</div>`;
}else{
chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-xs text-violet-300 mb-2">${m.model}</div>
${m.text}
</div>`;
}
});
}

function saveChats(){
localStorage.setItem("cipher_chats",JSON.stringify(chats));
}

function loadChats(){
let d=localStorage.getItem("cipher_chats");
if(d){
chats=JSON.parse(d);
renderHistory();
}
}

/* CODE BLOCK */
function copyCode(id){
let text=document.getElementById(id).innerText;
navigator.clipboard.writeText(text);
}

function formatReply(text){

const regex=/```([\s\S]*?)```/g;

if(!regex.test(text)){
return text.replace(/\n/g,"<br>");
}

regex.lastIndex=0;

return text.replace(regex,function(match,code){

let clean=code
.replace(/^python/i,"")
.replace(/^javascript/i,"")
.replace(/^js/i,"")
.trim();

clean=clean.replace(/</g,"&lt;").replace(/>/g,"&gt;");

let id="code_"+Date.now()+Math.floor(Math.random()*9999);

return `
<div class="mt-4 border border-white/10 rounded-2xl overflow-hidden bg-[#05091f]">
<div class="flex justify-between items-center px-4 py-2 bg-[#0c1438] text-sm text-violet-300">
<span>Code</span>
<button onclick="copyCode('${id}')" class="text-xs px-3 py-1 rounded-lg bg-violet-600">
Copy
</button>
</div>
<pre id="${id}" class="p-4 overflow-x-auto whitespace-pre">${clean}</pre>
</div>
`;

}).replace(/\n/g,"<br>");
}

/* SEND */
async function sendMsg(){

let text=prompt.value.trim();
if(!text)return;

if(!currentChat)newChat();

chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${text}</div>
</div>`;

currentChat.messages.push({
role:"user",
text:text
});

if(currentChat.title==="New Chat"){
currentChat.title=text.slice(0,28);
renderHistory();
}

prompt.value="";
prompt.focus();

chatBox.innerHTML+=`
<div id="typingBox" class="msgbox">
<div class="text-xs text-violet-300 mb-2">${modelLabel()}</div>
Thinking...
</div>`;

chatBox.scrollTop=chatBox.scrollHeight;

try{

const res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
mode:mode
})
});

const data=await res.json();

document.getElementById("typingBox")?.remove();

let reply=formatReply(data.response || "No response");

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-xs text-violet-300 mb-2">${modelLabel()}</div>
${reply}
</div>`;

currentChat.messages.push({
role:"ai",
text:reply,
model:modelLabel()
});

saveChats();

}catch(err){

document.getElementById("typingBox")?.remove();

chatBox.innerHTML+=`
<div class="msgbox text-red-300">
Backend /chat route not responding
</div>`;
}

chatBox.scrollTop=chatBox.scrollHeight;
}

loadChats();
</script>

</body>
</html>
