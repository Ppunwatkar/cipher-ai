<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
padding:0;
overflow:hidden;
color:#fff;
font-family:Consolas,monospace;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}
.glass{
background:rgba(8,12,35,.68);
backdrop-filter:blur(18px);
}
.scrollbar::-webkit-scrollbar{width:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:10px;
}
.inputbox{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
}
.inputbox:focus{
outline:none;
border-color:#8b5cf6;
}
.msgbox{
background:rgba(72,55,170,.15);
border-left:2px solid #8b5cf6;
border-radius:16px;
padding:14px;
}
.typing span{animation:blink 1.1s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}
</style>
</head>

<body>

<div class="h-screen flex gap-3 p-3">

<!-- ================= LEFT SIDEBAR ================= -->
<div class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<!-- LOGO -->
<div class="flex items-center gap-3 mb-4 shrink-0">
<img src="/static/logo.png" class="w-12 h-12 object-contain rounded-xl">

<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55 mt-1">AI Cyber Assistant</div>
</div>
</div>

<!-- NEW CHAT -->
<button onclick="newChat()"
class="w-full rounded-2xl border border-violet-500 py-3 mb-4 hover:bg-violet-500/10 transition shrink-0">
+ NEW CHAT
</button>

<!-- HISTORY (NOW BIG SPACE) -->
<div id="historyBox"
class="flex-1 overflow-y-auto scrollbar pr-1 space-y-2 min-h-0 mb-4">
</div>

<!-- TOOLS NOW MOVED BELOW HISTORY -->
<div class="shrink-0 mb-4">

<div class="flex items-center justify-between mb-2 px-1">
<div class="text-[11px] tracking-[4px] text-white/40">
SECURITY TOOLS
</div>

<button onclick="toggleTools()"
class="text-xs text-violet-300 hover:text-white">
Hide
</button>
</div>

<div id="toolsPanel"
class="space-y-2 max-h-[220px] overflow-y-auto scrollbar pr-1">

<!-- HASH -->
<button onclick="openTool('hash')"
class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 transition text-left">
<div class="w-10 h-10 rounded-xl bg-violet-500/20 flex items-center justify-center">🔐</div>
<div>
<div class="text-sm">Hash Tool</div>
<div class="text-[11px] text-white/40">MD5 / SHA256</div>
</div>
</button>

<!-- JWT -->
<button onclick="openTool('jwt')"
class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 transition text-left">
<div class="w-10 h-10 rounded-xl bg-cyan-500/20 flex items-center justify-center">🪪</div>
<div>
<div class="text-sm">JWT Decoder</div>
<div class="text-[11px] text-white/40">Decode Tokens</div>
</div>
</button>

<!-- WHOIS -->
<button onclick="openTool('whois')"
class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 transition text-left">
<div class="w-10 h-10 rounded-xl bg-emerald-500/20 flex items-center justify-center">🌐</div>
<div>
<div class="text-sm">WHOIS Lookup</div>
<div class="text-[11px] text-white/40">Domain Info</div>
</div>
</button>

<!-- DNS -->
<button onclick="openTool('dns')"
class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 transition text-left">
<div class="w-10 h-10 rounded-xl bg-yellow-500/20 flex items-center justify-center">📡</div>
<div>
<div class="text-sm">DNS Lookup</div>
<div class="text-[11px] text-white/40">A / MX / TXT</div>
</div>
</button>

<!-- PASSWORD -->
<button onclick="openTool('password')"
class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 transition text-left">
<div class="w-10 h-10 rounded-xl bg-red-500/20 flex items-center justify-center">🔑</div>
<div>
<div class="text-sm">Password Check</div>
<div class="text-[11px] text-white/40">Strength Test</div>
</div>
</button>

<!-- BASE64 -->
<button onclick="openTool('base64')"
class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl border border-white/10 hover:border-violet-500 hover:bg-violet-500/10 transition text-left">
<div class="w-10 h-10 rounded-xl bg-pink-500/20 flex items-center justify-center">📦</div>
<div>
<div class="text-sm">Base64 Tool</div>
<div class="text-[11px] text-white/40">Encode / Decode</div>
</div>
</button>

</div>
</div>

<!-- USER CARD -->
<div class="relative shrink-0">

<div onclick="toggleMenu()"
class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer hover:border-violet-500">

<div class="flex items-center gap-3">

<div id="avatar"
class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center text-sm font-bold">
GU
</div>

<div class="flex-1 min-w-0">
<div id="username" class="truncate text-sm">Guest User</div>
<div id="memberType" class="text-[11px] text-white/45">Guest</div>
</div>

<div>›</div>
</div>
</div>

<!-- MENU -->
<div id="menu"
class="hidden absolute left-0 bottom-16 w-64 bg-[#171717] rounded-2xl border border-white/10 p-2 z-50">

<div id="guestMenu">
<button onclick="openAuth('login')" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Login</button>
<button onclick="openAuth('signup')" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Sign Up</button>
</div>

<div id="userMenu" class="hidden">
<button onclick="openProfile()" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Profile</button>
<button onclick="openSettings()" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Settings</button>
<button onclick="logoutUser()" class="w-full text-left px-3 py-2 rounded-xl hover:bg-red-500/10 text-red-300">Logout</button>
</div>

</div>
</div>

</div>

<!-- ================= MAIN ================= -->
<div class="flex-1 flex flex-col gap-3">

<!-- TOP BAR -->
<div class="glass rounded-3xl border border-white/10 px-8 py-5 flex justify-between items-center">

<div class="text-violet-300 tracking-widest text-lg">
⚡ AI SECURITY CORE
</div>

<div class="flex gap-2">
<button id="thinkingBtn" onclick="setMode('thinking')" class="modeBtn px-5 py-3 rounded-full border border-white/10 text-sm">THINK</button>
<button id="fastBtn" onclick="setMode('fast')" class="modeBtn px-5 py-3 rounded-full border border-violet-500 bg-violet-500/20 text-sm">FAST</button>
<button id="codeBtn" onclick="setMode('code')" class="modeBtn px-5 py-3 rounded-full border border-white/10 text-sm">CODE</button>
</div>

</div>

<!-- CHAT -->
<div id="chatBox"
class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4">
</div>

<!-- INPUT -->
<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3 items-end">

<textarea id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl resize-none px-5 py-4 text-base placeholder-white/25"></textarea>

<button onclick="sendMsg()"
class="w-24 h-16 rounded-2xl bg-violet-500 hover:bg-violet-600 text-xl">
➤
</button>

</div>

</div>
</div>

<script>
function toggleTools(){
let box=document.getElementById("toolsPanel");
box.style.display=box.style.display==="none"?"block":"none";
}
</script>

</body>
</html>
