<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
padding:0;
overflow:hidden;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}

.glass{
background:rgba(8,12,35,.72);
backdrop-filter:blur(18px);
}

.scrollbar::-webkit-scrollbar{width:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:20px;
}

.inputbox,.toolInput,.authInput{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
outline:none;
}

.inputbox:focus,.toolInput:focus,.authInput:focus{
border-color:#8b5cf6;
}

.modeBtn{
border:1px solid rgba(255,255,255,.08);
transition:.2s;
}

.modeActive{
background:rgba(124,58,237,.18);
border-color:#8b5cf6 !important;
}

.msgbox{
background:rgba(72,55,170,.12);
border-left:2px solid #8b5cf6;
border-radius:18px;
padding:16px;
}

.userBubble{
background:#101844;
border-radius:18px;
padding:14px 16px;
display:inline-block;
max-width:75%;
word-break:break-word;
}

.toolCard{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.06);
background:rgba(255,255,255,.02);
transition:.2s;
cursor:pointer;
}

.toolCard:hover{
border-color:#8b5cf6;
background:rgba(124,58,237,.08);
}

#menu{
display:none;
position:absolute;
left:0;
bottom:68px;
width:290px;
background:#11162f;
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:8px;
z-index:9999;
box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.menuItem{
padding:12px 14px;
border-radius:14px;
cursor:pointer;
transition:.2s;
}

.menuItem:hover{
background:rgba(255,255,255,.08);
}

.sep{
height:1px;
background:rgba(255,255,255,.08);
margin:8px 0;
}

.btn{
padding:11px 16px;
border-radius:14px;
background:#7c3aed;
width:100%;
}

#imagePreview{
display:none;
max-height:70px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
}

#mobileSidebar{
display:none;
}

@media (max-width:900px){

body{
overflow:auto;
}

#layout{
flex-direction:column;
height:auto;
}

#sidebar{
display:none;
position:fixed;
left:0;
top:0;
bottom:0;
width:290px;
z-index:99999;
border-radius:0;
}

#sidebar.show{
display:flex;
}

#mobileSidebar{
display:block;
}

#chatBox{
height:58vh;
}

.modeBtn{
padding:10px 14px;
font-size:14px;
}
}
</style>
</head>

<body>

<div id="layout" class="h-screen flex gap-3 p-3">

<!-- LEFT SIDEBAR -->
<div id="sidebar" class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<!-- LOGO -->
<div class="flex gap-3 items-center mb-4">
<img src="/static/logo.png" class="w-12 h-12 rounded-xl object-contain">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55">AI Cyber Assistant</div>
</div>
</div>

<!-- NEW CHAT -->
<button onclick="newChat()" class="w-full py-3 rounded-2xl border border-violet-500 mb-4">
+ NEW CHAT
</button>

<!-- CHAT HISTORY -->
<div id="historyWrap" class="flex-1 min-h-[160px] overflow-y-auto scrollbar space-y-2 mb-3 pr-1">
<div id="historyBox" class="space-y-2"></div>
</div>

<!-- TOOL HEADER -->
<div class="mb-2 flex justify-between items-center px-1">
<div class="text-[11px] tracking-[4px] text-white/40">
SECURITY TOOLS
</div>

<button id="toolsToggleBtn" onclick="toggleTools()" class="text-xs text-violet-300">
HIDE
</button>
</div>

<!-- TOOLS -->
<div id="toolsWrap" class="h-[290px] overflow-hidden transition-all duration-300">

<div id="toolsPanel" class="space-y-2 overflow-y-auto scrollbar h-full pr-1">

<div class="toolCard" onclick="openTool('hash')">
<div>🔐 Hash Tool</div><div>i</div>
</div>

<div class="toolCard" onclick="openTool('base64')">
<div>📦 Base64 Tool</div><div>i</div>
</div>

<div class="toolCard" onclick="openTool('password')">
<div>🔑 Password Check</div><div>i</div>
</div>

<div class="toolCard" onclick="openTool('jwt')">
<div>🪪 JWT Decoder</div><div>i</div>
</div>

<div class="toolCard" onclick="openTool('headers')">
<div>🛡 Header Scan</div><div>i</div>
</div>

<div class="toolCard" onclick="openTool('logs')">
<div>📜 Log Analyzer</div><div>i</div>
</div>

</div>
</div>

<!-- ACCOUNT -->
<div class="relative mt-3">

<div onclick="toggleMenu()"
class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer">

<div class="flex gap-3 items-center">

<div id="avatar"
class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold">
GU
</div>

<div class="flex-1">
<div id="username">Guest User</div>
<div id="memberType" class="text-xs text-white/45">Guest</div>
</div>

<div>›</div>

</div>
</div>

<div id="menu"></div>

</div>

</div>

<!-- RIGHT SIDE -->
<div class="flex-1 flex flex-col gap-3">

<!-- TOP -->
<div class="glass rounded-3xl border border-white/10 px-6 py-5 flex justify-between items-center">

<div class="flex items-center gap-3">
<button id="mobileSidebar" onclick="toggleSidebar()" class="text-xl">☰</button>
<div class="text-violet-300 tracking-widest text-lg">⚡ AI SECURITY CORE</div>
</div>

<div class="flex gap-2">
<button id="thinkingBtn" onclick="setMode('thinking')" class="modeBtn px-5 py-3 rounded-full">THINK</button>
<button id="fastBtn" onclick="setMode('fast')" class="modeBtn modeActive px-5 py-3 rounded-full">FAST</button>
<button id="codeBtn" onclick="setMode('code')" class="modeBtn px-5 py-3 rounded-full">CODE</button>
</div>

</div>

<!-- CHAT -->
<div id="chatBox" class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<!-- INPUT -->
<div class="glass rounded-3xl border border-white/10 p-3 flex flex-col gap-3">

<img id="imagePreview">

<div class="flex gap-3 items-end">

<label for="imageUpload"
class="w-14 h-14 rounded-2xl bg-[#101844] flex items-center justify-center cursor-pointer text-xl">
📎
</label>

<input type="file" id="imageUpload" hidden accept="image/*" onchange="previewImage(event)">

<textarea
id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl px-5 py-4 resize-none"></textarea>

<button onclick="sendMsg()" class="w-20 h-14 rounded-2xl bg-violet-500 text-xl">
➤
</button>

</div>
</div>

</div>
</div>

<script>
let mode="fast";
let toolsOpen=true;
let loggedUser=null;

/* MODE */
function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(x=>x.classList.remove("modeActive"));
document.getElementById(m+"Btn").classList.add("modeActive");
}

/* MOBILE */
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("show");
}

/* TOOLS TOGGLE */
function toggleTools(){

const wrap=document.getElementById("toolsWrap");
const btn=document.getElementById("toolsToggleBtn");

toolsOpen=!toolsOpen;

if(toolsOpen){
wrap.style.height="290px";
btn.innerText="HIDE";
}else{
wrap.style.height="0px";
btn.innerText="SHOW";
}
}

/* ACCOUNT MENU */
function toggleMenu(){

const menu=document.getElementById("menu");

menu.style.display=menu.style.display==="block"?"none":"block";

if(loggedUser){

menu.innerHTML=`
<div class="menuItem">Profile</div>
<div class="menuItem">Settings</div>
<div class="menuItem">Personalization</div>
<div class="sep"></div>
<div class="menuItem text-red-300" onclick="logoutUser()">Logout</div>
`;

}else{

menu.innerHTML=`
<div class="menuItem" onclick="loginUser()">Login</div>
<div class="menuItem" onclick="signupUser()">Sign Up</div>
<div class="sep"></div>
<div class="menuItem">Help</div>
`;

}
}

/* LOGIN DEMO */
function loginUser(){
loggedUser={name:"Prasanna",email:"user@mail.com"};
updateUserUI();
document.getElementById("menu").style.display="none";
}

function signupUser(){
loginUser();
}

function logoutUser(){
loggedUser=null;
updateUserUI();
document.getElementById("menu").style.display="none";
}

function updateUserUI(){

if(loggedUser){
avatar.innerText=loggedUser.name.slice(0,2).toUpperCase();
username.innerText=loggedUser.name;
memberType.innerText="Member";
}else{
avatar.innerText="GU";
username.innerText="Guest User";
memberType.innerText="Guest";
}
}

/* IMAGE PREVIEW */
function previewImage(e){

let file=e.target.files[0];
if(!file)return;

let reader=new FileReader();

reader.onload=function(x){
imagePreview.src=x.target.result;
imagePreview.style.display="block";
}

reader.readAsDataURL(file);
}

/* CHAT */
async function sendMsg(){

let box=document.getElementById("prompt");
let text=box.value.trim();

if(!text)return;

chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${text}</div>
</div>`;

saveHistory(text);

box.value="";

chatBox.innerHTML+=`
<div id="typingBox" class="msgbox">Thinking...</div>`;

chatBox.scrollTop=chatBox.scrollHeight;

try{

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
mode:mode
})
});

let data=await res.json();

document.getElementById("typingBox")?.remove();

chatBox.innerHTML+=`
<div class="msgbox">${(data.response || "No response").replace(/\n/g,"<br>")}</div>`;

}catch{

document.getElementById("typingBox")?.remove();

chatBox.innerHTML+=`
<div class="msgbox text-red-300">Server Error</div>`;
}

chatBox.scrollTop=chatBox.scrollHeight;
}

/* NEW CHAT */
function newChat(){
chatBox.innerHTML="";
}

/* TOOLS */
function openTool(name){
chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-violet-300">Tool Opened: ${name.toUpperCase()}</div>
</div>`;
chatBox.scrollTop=chatBox.scrollHeight;
}

/* HISTORY */
function saveHistory(text){

let box=document.getElementById("historyBox");

let div=document.createElement("div");
div.className="bg-[#101844] rounded-xl px-3 py-2 text-sm cursor-pointer";
div.innerText=text.slice(0,28);

div.onclick=function(){
prompt.value=text;
}

box.prepend(div);
}

updateUserUI();
</script>

</body>
</html>
