<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
*{box-sizing:border-box}
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}
body{user-select:none}
input,textarea,button{font-family:inherit}

.glass{
background:rgba(8,12,35,.72);
backdrop-filter:blur(18px);
}

.scrollbar::-webkit-scrollbar{width:5px;height:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:20px;
}

.inputbox,.authInput{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
outline:none;
}

.inputbox:focus,.authInput:focus{
border-color:#8b5cf6;
box-shadow:0 0 0 1px #8b5cf6;
}

.modeBtn{
border:1px solid rgba(255,255,255,.08);
transition:.2s;
}

.modeBtn:hover{
border-color:#8b5cf6;
}

.modeActive{
background:rgba(124,58,237,.18);
border-color:#8b5cf6!important;
}

.userBubble{
background:#101844;
padding:14px 16px;
border-radius:18px;
display:inline-block;
max-width:75%;
word-break:break-word;
}

.msgbox{
background:rgba(72,55,170,.12);
border-left:2px solid #8b5cf6;
padding:16px;
border-radius:18px;
}

.toolCard{
padding:12px 14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.06);
background:rgba(255,255,255,.02);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:.2s;
}

.toolCard:hover{
border-color:#8b5cf6;
background:rgba(124,58,237,.08);
}

#menu{
display:none;
position:absolute;
left:0;
bottom:72px;
width:290px;
background:#11162f;
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:8px;
z-index:99999;
}

.menuItem{
padding:12px 14px;
border-radius:14px;
cursor:pointer;
transition:.2s;
}

.menuItem:hover{
background:rgba(255,255,255,.08);
}

.sep{
height:1px;
background:rgba(255,255,255,.08);
margin:8px 0;
}

#chatBox pre{
margin:0;
white-space:pre;
overflow:auto;
}

@media(max-width:900px){
#layout{
flex-direction:column;
height:auto;
}
#sidebar{
display:none;
position:fixed;
left:0;
top:0;
bottom:0;
width:290px;
z-index:99999;
border-radius:0;
}
#sidebar.show{display:flex}
#chatBox{height:58vh}
}
</style>
</head>

<body>

<div id="layout" class="h-screen flex gap-3 p-3">

<!-- SIDEBAR -->
<div id="sidebar" class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<div class="flex gap-3 items-center mb-4">
<img src="/static/logo.png" class="w-12 h-12 rounded-xl">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()" class="w-full py-3 rounded-2xl border border-violet-500 mb-4">
+ NEW CHAT
</button>

<div id="historyBox" class="flex-1 overflow-y-auto scrollbar space-y-2 mb-3"></div>

<div class="mb-2 flex justify-between items-center px-1">
<div class="text-[11px] tracking-[4px] text-white/40">SECURITY TOOLS</div>
<button onclick="toggleTools()" id="toolBtn" class="text-xs text-violet-300">HIDE</button>
</div>

<div id="toolsPanel" class="space-y-2 overflow-y-auto scrollbar h-[250px]">
<div class="toolCard"><span>🔐 Hash Tool</span><span>i</span></div>
<div class="toolCard"><span>📦 Base64 Tool</span><span>i</span></div>
<div class="toolCard"><span>🔑 Password Check</span><span>i</span></div>
<div class="toolCard"><span>🪪 JWT Decoder</span><span>i</span></div>
<div class="toolCard"><span>🛡 Header Scan</span><span>i</span></div>
<div class="toolCard"><span>📜 Log Analyzer</span><span>i</span></div>
</div>

<div class="relative mt-3">

<div onclick="toggleMenu()" class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer">
<div class="flex gap-3 items-center">
<div class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold">GU</div>
<div class="flex-1">
<div>Guest User</div>
<div class="text-xs text-white/45">Guest</div>
</div>
<div>›</div>
</div>
</div>

<div id="menu">
<div class="menuItem">Login</div>
<div class="menuItem">Sign Up</div>
<div class="sep"></div>
<div class="menuItem">Settings</div>
</div>

</div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col gap-3 min-w-0">

<!-- TOP -->
<div class="glass rounded-3xl border border-white/10 px-6 py-5 flex justify-between items-center">

<div class="text-violet-300 tracking-widest text-lg">⚡ AI SECURITY CORE</div>

<div class="flex gap-2">
<button id="thinkingBtn" onclick="setMode('thinking')" class="modeBtn px-5 py-3 rounded-full">THINK</button>
<button id="fastBtn" onclick="setMode('fast')" class="modeBtn modeActive px-5 py-3 rounded-full">FAST</button>
<button id="codeBtn" onclick="setMode('code')" class="modeBtn px-5 py-3 rounded-full">CODE</button>
</div>

</div>

<!-- CHAT -->
<div id="chatBox" class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<!-- INPUT -->
<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3 relative z-50">

<textarea
id="prompt"
rows="2"
placeholder="Ask anything..."
autocomplete="off"
spellcheck="false"
class="inputbox flex-1 rounded-2xl px-5 py-4 resize-none"
style="
min-height:60px;
max-height:160px;
overflow-y:auto;
pointer-events:auto;
position:relative;
z-index:9999;
user-select:text;
-webkit-user-select:text;
"
></textarea>

<button
type="button"
onclick="sendMsg()"
class="w-24 rounded-2xl bg-violet-500 text-xl shrink-0 relative z-50">
➤
</button>

</div>

</div>
</div>

<script>
let mode="fast";
let chats=[];
let currentChat=null;

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{

const box=document.getElementById("prompt");

box.disabled=false;
box.readOnly=false;
box.style.pointerEvents="auto";

setTimeout(()=>box.focus(),300);

box.addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendMsg();
}

setTimeout(()=>{
this.style.height="auto";
this.style.height=this.scrollHeight+"px";
},0);

});

box.addEventListener("input",function(){
this.style.height="auto";
this.style.height=this.scrollHeight+"px";
});

loadChats();
});

/* MODES
THINK = GPT
FAST  = GROQ
CODE  = CLAUDE
*/
function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(x=>x.classList.remove("modeActive"));
document.getElementById(m+"Btn").classList.add("modeActive");
}

function modelLabel(){
if(mode==="thinking") return "🧠 GPT";
if(mode==="code") return "💻 Claude";
return "⚡ Groq";
}

/* MENU */
function toggleMenu(){
menu.style.display = menu.style.display==="block" ? "none":"block";
}

/* TOOLS */
function toggleTools(){
if(toolsPanel.style.display==="none"){
toolsPanel.style.display="block";
toolBtn.innerText="HIDE";
}else{
toolsPanel.style.display="none";
toolBtn.innerText="SHOW";
}
}

/* HISTORY */
function newChat(){
currentChat={
id:Date.now(),
title:"New Chat",
messages:[]
};
chats.unshift(currentChat);
renderHistory();
chatBox.innerHTML="";
saveChats();
prompt.focus();
}

function renderHistory(){
historyBox.innerHTML="";

chats.forEach(chat=>{
let div=document.createElement("div");
div.className="bg-[#101844] rounded-xl px-3 py-2 text-sm cursor-pointer";
div.textContent=chat.title;
div.onclick=()=>loadChat(chat.id);
historyBox.appendChild(div);
});
}

function loadChat(id){
currentChat=chats.find(x=>x.id===id);
chatBox.innerHTML="";

currentChat.messages.forEach(m=>{
if(m.role==="user"){
chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${m.text}</div>
</div>`;
}else{
chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-xs text-violet-300 mb-2">${m.model}</div>
${m.text}
</div>`;
}
});

chatBox.scrollTop=chatBox.scrollHeight;
}

function saveChats(){
localStorage.setItem("cipher_chats",JSON.stringify(chats));
}

function loadChats(){
let d=localStorage.getItem("cipher_chats");
if(d){
chats=JSON.parse(d);
renderHistory();
}
}

/* CODE BLOCK */
function copyCode(id){
navigator.clipboard.writeText(document.getElementById(id).innerText);
}

function formatReply(text){

const regex=/```([\s\S]*?)```/g;

if(!regex.test(text)){
return text.replace(/\n/g,"<br>");
}

regex.lastIndex=0;

return text.replace(regex,(match,code)=>{

let clean=code
.replace(/^python/i,"")
.replace(/^java/i,"")
.replace(/^javascript/i,"")
.replace(/^js/i,"")
.trim();

clean=clean.replace(/</g,"&lt;").replace(/>/g,"&gt;");

let id="code_"+Date.now()+Math.floor(Math.random()*9999);

return `
<div class="mt-4 border border-white/10 rounded-2xl overflow-hidden bg-[#05091f]">
<div class="flex justify-between items-center px-4 py-2 bg-[#0c1438] text-sm text-violet-300">
<span>Code</span>
<button onclick="copyCode('${id}')" class="text-xs px-3 py-1 rounded-lg bg-violet-600">Copy</button>
</div>
<pre id="${id}" class="p-4 scrollbar">${clean}</pre>
</div>
`;

}).replace(/\n/g,"<br>");
}

/* SEND */
async function sendMsg(){

const box=document.getElementById("prompt");
let text=box.value.trim();

if(!text)return;

if(!currentChat)newChat();

/* user bubble */
chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${text}</div>
</div>`;

currentChat.messages.push({
role:"user",
text:text
});

if(currentChat.title==="New Chat"){
currentChat.title=text.slice(0,30);
renderHistory();
}

box.value="";
box.style.height="60px";
box.focus();

/* typing */
chatBox.innerHTML+=`
<div id="typingBox" class="msgbox">
<div class="text-xs text-violet-300 mb-2">${modelLabel()}</div>
Thinking...
</div>`;

chatBox.scrollTop=chatBox.scrollHeight;

try{

const res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
mode:mode
})
});

const data=await res.json();

document.getElementById("typingBox")?.remove();

let reply=formatReply(data.response || "No response");

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-xs text-violet-300 mb-2">${modelLabel()}</div>
${reply}
</div>`;

currentChat.messages.push({
role:"ai",
text:reply,
model:modelLabel()
});

saveChats();

}catch(err){

document.getElementById("typingBox")?.remove();

chatBox.innerHTML+=`
<div class="msgbox text-red-300">
Backend /chat route not responding
</div>`;
}

chatBox.scrollTop=chatBox.scrollHeight;
}
</script>

</body>
</html>
