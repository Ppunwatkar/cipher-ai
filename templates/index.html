<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER AI</title>

<link rel="icon" href="/static/logo.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
    margin:0;
    font-family:monospace;
    color:white;
    background:radial-gradient(circle at top left,#1e1b4b,#020617 55%);
    height:100vh;
    overflow:hidden;
}

.glass{
    background:rgba(10,20,60,.45);
    border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(18px);
    border-radius:22px;
}

.btn{
    border:1px solid #8b5cf6;
    color:#c4b5fd;
    padding:12px;
    border-radius:14px;
    transition:.25s;
}

.btn:hover{
    background:#8b5cf6;
    color:white;
}

.mode{
    padding:10px 18px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.08);
    cursor:pointer;
    transition:.2s;
}

.active{
    border-color:#8b5cf6;
    background:rgba(139,92,246,.18);
}

/* CHAT BUBBLES */
.bot{
    background:rgba(99,102,241,.13);
    border-left:3px solid #8b5cf6;
    padding:18px;
    border-radius:16px;
    margin-bottom:16px;
    font-size:20px;
    line-height:1.7;
}

.user{
    text-align:right;
    color:#ddd6fe;
    margin:14px 0;
    font-size:20px;
}

.small{
    font-size:13px;
    opacity:.65;
    margin-bottom:8px;
}

/* PREMIUM INPUT */
input, textarea{
    background:linear-gradient(145deg,#020617,#0b1120);
    border:1px solid rgba(139,92,246,.25);
    color:white;
    border-radius:18px;
    padding:18px 20px;
    width:100%;
    outline:none;
    font-size:20px;
    line-height:1.5;
    transition:.25s ease;
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        0 0 18px rgba(139,92,246,.05);
}

input:focus,
textarea:focus{
    border-color:#8b5cf6;
    box-shadow:
        0 0 0 3px rgba(139,92,246,.12),
        0 0 25px rgba(139,92,246,.18);
}

input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,.35);
    font-size:20px;
}

textarea{
    resize:none;
    min-height:78px;
    max-height:220px;
}

/* LOGIN MODAL */
#authModal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.auth-box{
    width:420px;
    padding:34px;
}

.link{
    color:#a78bfa;
    cursor:pointer;
    font-size:16px;
}

.link:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<!-- LOGIN / SIGNUP MODAL -->
<div id="authModal">

    <div class="glass auth-box">

        <h1 class="text-3xl mb-2 text-purple-300">CIPHER</h1>
        <p class="opacity-70 text-sm mb-6">Secure AI Access</p>

        <div id="signupFields" style="display:none;">
            <input id="name" placeholder="Full Name" class="mb-3">
        </div>

        <input id="email" placeholder="Email" class="mb-3">
        <input id="password" type="password" placeholder="Password" class="mb-4">

        <button onclick="submitAuth()" class="btn w-full mb-3 text-lg" id="authBtn">
            Login
        </button>

        <div class="text-center">
            <span id="switchText" class="link" onclick="toggleAuth()">
                Create account
            </span>
        </div>

        <p id="authMsg" class="text-red-300 text-sm mt-4"></p>

    </div>

</div>

<!-- APP -->
<div class="flex h-screen p-4 gap-4">

    <!-- SIDEBAR -->
    <div class="glass w-[290px] p-5 flex flex-col justify-between">

        <div>
            <div class="flex items-center gap-3">
                <img src="/static/logo.png" class="w-11 h-11 rounded-xl">
                <div>
                    <div class="text-xl text-purple-300">CIPHER</div>
                    <div class="text-xs opacity-60">AI Cyber Assistant</div>
                </div>
            </div>

            <button onclick="newChat()" class="btn w-full mt-6">
                + NEW CHAT
            </button>

            <div id="history" class="mt-5 space-y-2"></div>
        </div>

        <div>
            <div class="text-sm opacity-80 mb-2" id="username">Guest</div>

            <button onclick="logout()" class="btn w-full">
                Logout
            </button>
        </div>

    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col gap-4">

        <!-- TOP -->
        <div class="glass p-5 flex justify-between items-center">

            <div>⚡ AI SECURITY CORE</div>

            <div class="flex gap-2">
                <div class="mode active" data-mode="thinking">THINK</div>
                <div class="mode" data-mode="fast">FAST</div>
                <div class="mode" data-mode="code">CODE</div>
            </div>

        </div>

        <!-- CHAT -->
        <div id="chat" class="glass flex-1 p-5 overflow-y-auto"></div>

        <!-- INPUT -->
        <div class="glass p-4 flex gap-4 items-end">

            <textarea
                id="prompt"
                rows="3"
                placeholder="Ask anything..."
                class="flex-1"></textarea>

            <button onclick="sendMsg()" class="btn px-8 py-5 text-xl font-bold rounded-2xl">
                ➤
            </button>

        </div>

    </div>

</div>

<script>
let isSignup = false;
let currentMode = "thinking";
let currentChat = "chat_" + Date.now();

/* AUTO GROW */
const observe = setInterval(()=>{
    let box = document.getElementById("prompt");
    if(box){
        clearInterval(observe);
        box.addEventListener("input", function(){
            this.style.height = "auto";
            this.style.height = this.scrollHeight + "px";
        });
    }
},100);

/* LOAD */
window.onload = async ()=>{
    await checkLogin();

    document.querySelectorAll(".mode").forEach(btn=>{
        btn.onclick = ()=>{
            document.querySelectorAll(".mode")
            .forEach(x=>x.classList.remove("active"));

            btn.classList.add("active");
            currentMode = btn.dataset.mode;
        };
    });
};

/* CHECK LOGIN */
async function checkLogin(){
    let res = await fetch("/me");
    let data = await res.json();

    if(data.logged_in){
        document.getElementById("authModal").style.display="none";
        document.getElementById("username").innerText="👤 " + data.name;
        loadHistory();
    }
}

/* TOGGLE */
function toggleAuth(){

    isSignup = !isSignup;

    document.getElementById("signupFields").style.display =
        isSignup ? "block" : "none";

    document.getElementById("authBtn").innerText =
        isSignup ? "Sign Up" : "Login";

    document.getElementById("switchText").innerText =
        isSignup ? "Already have account? Login" : "Create account";

    document.getElementById("authMsg").innerText="";
}

/* LOGIN / SIGNUP */
async function submitAuth(){

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let name = document.getElementById("name").value.trim();

    let url = isSignup ? "/signup" : "/login";

    let body = isSignup ?
        {name,email,password} :
        {email,password};

    let res = await fetch(url,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(body)
    });

    let data = await res.json();

    if(data.ok){
        checkLogin();
    }else{
        document.getElementById("authMsg").innerText =
        data.msg || "Failed.";
    }
}

/* LOGOUT */
function logout(){
    window.location="/logout";
}

/* NEW CHAT */
function newChat(){
    currentChat = "chat_" + Date.now();
    document.getElementById("chat").innerHTML="";
}

/* SEND */
async function sendMsg(){

    let prompt = document.getElementById("prompt");
    let msg = prompt.value.trim();

    if(!msg) return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="user">${msg}</div>
    `;

    prompt.value="";
    prompt.style.height="78px";

    let res = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:msg,
            mode:currentMode,
            chat_id:currentChat
        })
    });

    let data = await res.json();

    chat.innerHTML += `
        <div class="bot">
            <div class="small">${data.label || "AI MODEL"}</div>
            ${marked.parse(data.response || "No response")}
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    loadHistory();
}

/* HISTORY */
async function loadHistory(){

    let res = await fetch("/history");
    let data = await res.json();

    let box = document.getElementById("history");
    box.innerHTML="";

    data.forEach(chat=>{

        box.innerHTML += `
            <div onclick="openChat('${chat.id}')"
            class="glass p-3 cursor-pointer text-sm hover:border-purple-400">
                ${chat.title}
            </div>
        `;
    });
}

/* OPEN CHAT */
async function openChat(id){

    currentChat = id;

    let res = await fetch("/chat/" + id);
    let data = await res.json();

    let box = document.getElementById("chat");
    box.innerHTML="";

    data.forEach(msg=>{

        if(msg.role==="user"){
            box.innerHTML += `
                <div class="user">${msg.content}</div>
            `;
        }else{
            box.innerHTML += `
                <div class="bot">
                    ${marked.parse(msg.content)}
                </div>
            `;
        }
    });
}
</script>

</body>
</html>
