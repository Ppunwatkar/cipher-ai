<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
*{box-sizing:border-box}
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}
.glass{
background:rgba(8,12,35,.72);
backdrop-filter:blur(18px);
}
.scrollbar::-webkit-scrollbar{width:5px;height:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:20px;
}
.inputbox{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
outline:none;
}
.inputbox:focus{
border-color:#8b5cf6;
box-shadow:0 0 0 1px #8b5cf6;
}
.modeBtn{
border:1px solid rgba(255,255,255,.08);
transition:.2s;
}
.modeBtn:hover{border-color:#8b5cf6}
.modeActive{
background:rgba(124,58,237,.18);
border-color:#8b5cf6!important;
}
.userBubble{
background:#101844;
padding:14px 16px;
border-radius:18px;
display:inline-block;
max-width:75%;
word-break:break-word;
}
.msgbox{
background:rgba(72,55,170,.12);
border-left:2px solid #8b5cf6;
padding:16px;
border-radius:18px;
}
.toolCard{
padding:12px 14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.06);
background:rgba(255,255,255,.02);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:.2s;
}
.toolCard:hover{
border-color:#8b5cf6;
background:rgba(124,58,237,.08);
}
.toolInfoBtn{
width:24px;
height:24px;
display:flex;
align-items:center;
justify-content:center;
border-radius:999px;
font-size:12px;
background:rgba(255,255,255,.06);
}
.toolInfoBtn:hover{
background:rgba(124,58,237,.35);
}
.chatRow{
background:#101844;
border-radius:14px;
padding:10px;
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
position:relative;
}
.chatRow:hover{background:#162055}
.chatTitle{
flex:1;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
font-size:14px;
}
.chatDots{
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
}
.chatDots:hover{background:rgba(255,255,255,.08)}
.chatMenu{
position:absolute;
right:8px;
top:42px;
width:180px;
background:#11162f;
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
padding:6px;
z-index:999;
display:none;
}
.chatMenuItem{
padding:10px 12px;
border-radius:12px;
font-size:13px;
cursor:pointer;
}
.chatMenuItem:hover{
background:rgba(255,255,255,.08);
}
#menu{
display:none;
position:absolute;
left:0;
bottom:72px;
width:290px;
background:#11162f;
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:8px;
z-index:999;
}
.menuItem{
padding:12px 14px;
border-radius:14px;
cursor:pointer;
}
.menuItem:hover{
background:rgba(255,255,255,.08);
}
.sep{
height:1px;
background:rgba(255,255,255,.08);
margin:8px 0;
}
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
z-index:99999;
align-items:center;
justify-content:center;
padding:16px;
}
.modalCard{
width:520px;
max-width:100%;
background:#070d2c;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:24px;
}
#chatBox pre{
margin:0;
white-space:pre;
overflow:auto;
}
@media(max-width:900px){
#layout{flex-direction:column;height:auto}
#sidebar{
display:none;
position:fixed;
left:0;top:0;bottom:0;
width:290px;
z-index:99999;
border-radius:0;
}
#sidebar.show{display:flex}
#chatBox{height:58vh}
}
</style>
</head>

<body>

<!-- TOOL MODAL -->
<div id="toolModal" class="modal">
<div class="modalCard">
<div class="flex justify-between items-center mb-4">
<div id="toolTitle" class="text-2xl text-violet-300">Tool</div>
<button onclick="closeTool()">✕</button>
</div>

<textarea id="toolInput" rows="5"
placeholder="Enter input..."
class="inputbox w-full rounded-2xl px-4 py-4 resize-none mb-4"></textarea>

<button onclick="runTool()" class="w-full py-3 rounded-2xl bg-violet-500 mb-4">
Run Tool
</button>

<div id="toolResult" class="msgbox hidden"></div>
</div>
</div>

<div id="layout" class="h-screen flex gap-3 p-3">

<!-- SIDEBAR -->
<div id="sidebar" class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<div class="flex gap-3 items-center mb-4">
<img src="/static/logo.png" class="w-12 h-12 rounded-xl">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()" class="w-full py-3 rounded-2xl border border-violet-500 mb-4">
+ NEW CHAT
</button>

<input id="historySearch"
placeholder="Search chats..."
class="inputbox rounded-xl px-3 py-2 mb-3 text-sm">

<div id="historyBox" class="flex-1 overflow-y-auto scrollbar space-y-2 mb-3"></div>

<div class="mb-2 flex justify-between items-center px-1">
<div class="text-[11px] tracking-[4px] text-white/40">SECURITY TOOLS</div>
<button onclick="toggleTools()" id="toolBtn" class="text-xs text-violet-300">HIDE</button>
</div>

<div id="toolsPanel" class="space-y-2 overflow-y-auto scrollbar h-[250px]">

<div class="toolCard" onclick="openTool('hash')">
<span>🔐 Hash Tool</span>
<span class="toolInfoBtn" onclick="event.stopPropagation();toolInfo('hash')">i</span>
</div>

<div class="toolCard" onclick="openTool('base64')">
<span>📦 Base64 Tool</span>
<span class="toolInfoBtn" onclick="event.stopPropagation();toolInfo('base64')">i</span>
</div>

<div class="toolCard" onclick="openTool('password')">
<span>🔑 Password Check</span>
<span class="toolInfoBtn" onclick="event.stopPropagation();toolInfo('password')">i</span>
</div>

<div class="toolCard" onclick="openTool('jwt')">
<span>🪪 JWT Decoder</span>
<span class="toolInfoBtn" onclick="event.stopPropagation();toolInfo('jwt')">i</span>
</div>

<div class="toolCard" onclick="openTool('headers')">
<span>🛡 Header Scan</span>
<span class="toolInfoBtn" onclick="event.stopPropagation();toolInfo('headers')">i</span>
</div>

<div class="toolCard" onclick="openTool('logs')">
<span>📜 Log Analyzer</span>
<span class="toolInfoBtn" onclick="event.stopPropagation();toolInfo('logs')">i</span>
</div>

</div>

<div class="relative mt-3">
<div onclick="toggleMenu()" class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer">
<div class="flex gap-3 items-center">
<div class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold">GU</div>
<div class="flex-1">
<div>Guest User</div>
<div class="text-xs text-white/45">Guest</div>
</div>
<div>›</div>
</div>
</div>

<div id="menu">
<div class="menuItem">Login</div>
<div class="menuItem">Sign Up</div>
<div class="sep"></div>
<div class="menuItem">Settings</div>
</div>
</div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col gap-3 min-w-0">

<div class="glass rounded-3xl border border-white/10 px-6 py-5 flex justify-between items-center">
<div class="text-violet-300 tracking-widest text-lg">⚡ AI SECURITY CORE</div>

<div class="flex gap-2">
<button id="thinkingBtn" onclick="setMode('thinking')" class="modeBtn px-5 py-3 rounded-full">THINK</button>
<button id="fastBtn" onclick="setMode('fast')" class="modeBtn modeActive px-5 py-3 rounded-full">FAST</button>
<button id="codeBtn" onclick="setMode('code')" class="modeBtn px-5 py-3 rounded-full">CODE</button>
</div>
</div>

<div id="chatBox" class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3">
<textarea id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl px-5 py-4 resize-none"
style="min-height:60px;max-height:160px;"></textarea>

<button onclick="sendMsg()" class="w-24 rounded-2xl bg-violet-500 text-xl">
➤
</button>
</div>

</div>
</div>

<script>
let mode="fast";
let chats=[];
let currentChat=null;
let activeTool="";

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{

prompt.focus();

prompt.addEventListener("keydown",(e)=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendMsg();
}
});

historySearch.addEventListener("input",renderHistory);

loadChats();
});

/* MODE */
function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(x=>x.classList.remove("modeActive"));
document.getElementById(m+"Btn").classList.add("modeActive");
}

/* THINK=GPT FAST=GROQ CODE=CLAUDE */
function modelLabel(){
if(mode==="thinking") return "🧠 GPT";
if(mode==="code") return "💻 Claude";
return "⚡ Groq";
}

/* ACCOUNT MENU */
function toggleMenu(){
menu.style.display = menu.style.display==="block" ? "none":"block";
}

/* TOOLS COLLAPSE */
function toggleTools(){
if(toolsPanel.style.display==="none"){
toolsPanel.style.display="block";
toolBtn.innerText="HIDE";
}else{
toolsPanel.style.display="none";
toolBtn.innerText="SHOW";
}
}

/* TOOL INFO */
function toolInfo(name){
const info={
hash:"Generate MD5 / SHA1 / SHA256 / SHA512 hashes from text.",
base64:"Encode plain text to Base64 or decode Base64 to text.",
password:"Checks password strength using length and complexity.",
jwt:"Decode JWT token header and payload instantly.",
headers:"Analyze website security headers like CSP, HSTS, XFO.",
logs:"Analyze logs for suspicious patterns or failed attempts."
};
alert(info[name] || "Tool information unavailable.");
}

/* TOOL MODAL */
function openTool(name){
activeTool=name;
toolModal.style.display="flex";
toolInput.value="";
toolResult.classList.add("hidden");
toolResult.innerHTML="";

const titles={
hash:"🔐 Hash Tool",
base64:"📦 Base64 Tool",
password:"🔑 Password Checker",
jwt:"🪪 JWT Decoder",
headers:"🛡 Header Scanner",
logs:"📜 Log Analyzer"
};

toolTitle.innerText=titles[name] || "Tool";
toolInput.focus();
}

function closeTool(){
toolModal.style.display="none";
}

toolModal.onclick=function(e){
if(e.target===toolModal) closeTool();
};

async function runTool(){

let text=toolInput.value.trim();
if(!text)return;

toolResult.classList.remove("hidden");
toolResult.innerHTML="Running...";

try{
const res=await fetch("/tool/"+activeTool,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({input:text})
});

const data=await res.json();
toolResult.innerHTML=(data.result || "No result").replace(/\n/g,"<br>");

}catch(err){
toolResult.innerHTML=localToolFallback(activeTool,text).replace(/\n/g,"<br>");
}
}

function localToolFallback(tool,text){

if(tool==="base64"){
try{
return "Encoded:\n"+btoa(text);
}catch{
return "Unable to encode.";
}
}

if(tool==="password"){
let score=0;
if(text.length>=8)score++;
if(/[A-Z]/.test(text))score++;
if(/[0-9]/.test(text))score++;
if(/[^A-Za-z0-9]/.test(text))score++;
const lvl=["Weak","Weak","Medium","Strong","Very Strong"];
return "Password Strength: "+lvl[score];
}

if(tool==="jwt"){
return "JWT Decoder ready. Add backend route for full payload decode.";
}

if(tool==="headers"){
return "Enter URL. Backend scanner required.";
}

if(tool==="logs"){
return "Log scan complete. Suspicious keyword check finished.";
}

if(tool==="hash"){
return "Hash backend route required.";
}

return "Tool ready.";
}

/* CHAT HISTORY */
function newChat(){
currentChat={
id:Date.now(),
title:"New Chat",
messages:[],
pinned:false,
archived:false
};
chats.unshift(currentChat);
renderHistory();
chatBox.innerHTML="";
saveChats();
prompt.focus();
}

function renderHistory(){

historyBox.innerHTML="";
let search=historySearch.value.toLowerCase();

let visible=chats
.filter(x=>!x.archived)
.filter(x=>x.title.toLowerCase().includes(search))
.sort((a,b)=>(b.pinned-a.pinned));

visible.forEach(chat=>{

let row=document.createElement("div");
row.className="chatRow";

row.innerHTML=`
<div class="chatTitle">${chat.pinned?'📌 ':''}${chat.title}</div>
<div class="chatDots">⋯</div>
<div class="chatMenu">
<div class="chatMenuItem" onclick="shareChat(${chat.id})">Share</div>
<div class="chatMenuItem" onclick="renameChat(${chat.id})">Rename</div>
<div class="chatMenuItem" onclick="pinChat(${chat.id})">${chat.pinned?'Unpin':'Pin'} Chat</div>
<div class="chatMenuItem" onclick="archiveChat(${chat.id})">Archive</div>
<div class="chatMenuItem text-red-300" onclick="deleteChat(${chat.id})">Delete</div>
</div>
`;

row.onclick=(e)=>{
if(!e.target.closest(".chatDots") && !e.target.closest(".chatMenu")){
loadChat(chat.id);
}
};

row.querySelector(".chatDots").onclick=(e)=>{
e.stopPropagation();
document.querySelectorAll(".chatMenu").forEach(m=>m.style.display="none");
row.querySelector(".chatMenu").style.display="block";
};

historyBox.appendChild(row);
});
}

document.addEventListener("click",()=>{
document.querySelectorAll(".chatMenu").forEach(m=>m.style.display="none");
});

function loadChat(id){
currentChat=chats.find(x=>x.id===id);
chatBox.innerHTML="";

currentChat.messages.forEach(m=>{
if(m.role==="user"){
chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${m.text}</div>
</div>`;
}else{
chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-xs text-violet-300 mb-2">${m.model}</div>
${m.text}
</div>`;
}
});
chatBox.scrollTop=chatBox.scrollHeight;
}

function renameChat(id){
let c=chats.find(x=>x.id===id);
let name=prompt("Rename chat:",c.title);
if(name){
c.title=name;
saveChats();
renderHistory();
}
}

function pinChat(id){
let c=chats.find(x=>x.id===id);
c.pinned=!c.pinned;
saveChats();
renderHistory();
}

function archiveChat(id){
let c=chats.find(x=>x.id===id);
c.archived=true;
saveChats();
renderHistory();
}

function deleteChat(id){
if(confirm("Delete chat?")){
chats=chats.filter(x=>x.id!==id);
saveChats();
renderHistory();
chatBox.innerHTML="";
}
}

function shareChat(id){
let c=chats.find(x=>x.id===id);
navigator.clipboard.writeText(c.title);
alert("Chat title copied.");
}

function saveChats(){
localStorage.setItem("cipher_chats",JSON.stringify(chats));
}

function loadChats(){
let d=localStorage.getItem("cipher_chats");
if(d){
chats=JSON.parse(d);
renderHistory();
}
}

/* CODE BLOCK */
function copyCode(id){
navigator.clipboard.writeText(document.getElementById(id).innerText);
}

function formatReply(text){

const regex=/```([\s\S]*?)```/g;

if(!regex.test(text)){
return text.replace(/\n/g,"<br>");
}

regex.lastIndex=0;

return text.replace(regex,(match,code)=>{

let clean=code.trim()
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

let id="code_"+Date.now()+Math.floor(Math.random()*9999);

return `
<div class="mt-4 border border-white/10 rounded-2xl overflow-hidden bg-[#05091f]">
<div class="flex justify-between items-center px-4 py-2 bg-[#0c1438] text-sm text-violet-300">
<span>Code</span>
<button onclick="copyCode('${id}')" class="text-xs px-3 py-1 rounded-lg bg-violet-600">
Copy
</button>
</div>
<pre id="${id}" class="p-4 scrollbar">${clean}</pre>
</div>
`;

}).replace(/\n/g,"<br>");
}

/* SEND */
async function sendMsg(){

let text=prompt.value.trim();
if(!text)return;

if(!currentChat)newChat();

chatBox.innerHTML+=`
<div class="text-right">
<div class="userBubble">${text}</div>
</div>`;

currentChat.messages.push({
role:"user",
text:text
});

if(currentChat.title==="New Chat"){
currentChat.title=text.slice(0,30);
renderHistory();
}

prompt.value="";
prompt.focus();

chatBox.innerHTML+=`
<div id="typingBox" class="msgbox">
<div class="text-xs text-violet-300 mb-2">${modelLabel()}</div>
Thinking...
</div>`;

chatBox.scrollTop=chatBox.scrollHeight;

try{

const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
mode:mode
})
});

const data=await res.json();

document.getElementById("typingBox")?.remove();

let reply=formatReply(data.response || "No response");

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-xs text-violet-300 mb-2">${modelLabel()}</div>
${reply}
</div>`;

currentChat.messages.push({
role:"ai",
text:reply,
model:modelLabel()
});

saveChats();

}catch(err){

document.getElementById("typingBox")?.remove();

chatBox.innerHTML+=`
<div class="msgbox text-red-300">
Backend /chat route not responding
</div>`;
}

chatBox.scrollTop=chatBox.scrollHeight;
}
</script>

</body>
</html>
