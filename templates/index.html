<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
padding:0;
overflow:hidden;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}
.glass{
background:rgba(8,12,35,.68);
backdrop-filter:blur(18px);
}
.scrollbar::-webkit-scrollbar{width:5px;height:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:10px;
}

.inputbox,.toolInput{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
outline:none;
}

.inputbox:focus,.toolInput:focus{
border-color:#8b5cf6;
}

.msgbox{
background:rgba(72,55,170,.15);
border-left:2px solid #8b5cf6;
border-radius:16px;
padding:14px;
}

.toolInput{
width:100%;
padding:12px;
border-radius:14px;
margin-bottom:10px;
}

.toolBtn{
padding:10px 16px;
border-radius:14px;
background:#7c3aed;
transition:.2s;
}

.toolBtn:hover{
background:#6d28d9;
}

pre{
white-space:pre-wrap;
word-wrap:break-word;
background:#020617;
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,.06);
}

.typing span{
animation:blink 1.1s infinite;
font-size:24px;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}

/* TOOLS */
#toolsPanel{
max-height:230px;
overflow-y:auto;
overflow-x:hidden;
padding-right:6px;
}

.toolCard{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:12px 14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.02);
transition:.25s;
}

.toolCard:hover{
border-color:#8b5cf6;
background:rgba(124,58,237,.08);
}

.toolName{
flex:1;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

.infoBtn{
width:24px;
height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
background:#111938;
border:1px solid rgba(255,255,255,.08);
color:#c4b5fd;
cursor:pointer;
flex-shrink:0;
}

/* POPUP */
#toolPopup{
position:fixed;
width:280px;
background:#090f25;
border:1px solid rgba(139,92,246,.55);
box-shadow:0 20px 45px rgba(0,0,0,.55);
border-radius:18px;
padding:14px;
z-index:99999;
display:none;
}

.popupTitle{
font-size:14px;
font-weight:700;
color:#c4b5fd;
margin-bottom:8px;
}

.popupExample{
margin-top:10px;
padding:8px;
border-radius:12px;
background:rgba(255,255,255,.03);
font-size:11px;
color:#a5f3fc;
}

.popupTimer{
margin-top:10px;
font-size:11px;
color:#fca5a5;
text-align:right;
}
</style>
</head>

<body>

<!-- TOOL POPUP -->
<div id="toolPopup"></div>

<div class="h-screen flex gap-3 p-3">

<!-- LEFT -->
<div class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<!-- LOGO -->
<div class="flex items-center gap-3 mb-4">
<img src="/static/logo.png" class="w-12 h-12 object-contain rounded-xl">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55 mt-1">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()"
class="w-full rounded-2xl border border-violet-500 py-3 mb-4 hover:bg-violet-500/10 transition">
+ NEW CHAT
</button>

<div id="historyBox"
class="flex-1 overflow-y-auto scrollbar pr-1 space-y-2 min-h-0 mb-4"></div>

<!-- TOOLS -->
<div class="mb-4">

<div class="flex justify-between items-center mb-2 px-1">
<div class="text-[11px] tracking-[4px] text-white/40">SECURITY TOOLS</div>
<button onclick="toggleTools()" class="text-xs text-violet-300">Hide</button>
</div>

<div id="toolsPanel" class="space-y-2 scrollbar">

<button onclick="openTool('hash')" class="toolCard">
<div class="toolName">🔐 Hash Tool</div>
<div class="infoBtn" onclick="showInfo(event,'Hash Tool','Creates MD5 / SHA1 / SHA256 hashes.','cipher123')">i</div>
</button>

<button onclick="openTool('base64')" class="toolCard">
<div class="toolName">📦 Base64 Tool</div>
<div class="infoBtn" onclick="showInfo(event,'Base64 Tool','Encode / Decode text safely.','hello → aGVsbG8=')">i</div>
</button>

<button onclick="openTool('password')" class="toolCard">
<div class="toolName">🔑 Password Check</div>
<div class="infoBtn" onclick="showInfo(event,'Password Checker','Checks password strength.','Cipher@2026')">i</div>
</button>

<button onclick="openTool('jwt')" class="toolCard">
<div class="toolName">🪪 JWT Decoder</div>
<div class="infoBtn" onclick="showInfo(event,'JWT Decoder','Reads JWT token claims.','Paste token')">i</div>
</button>

<button onclick="openTool('whois')" class="toolCard">
<div class="toolName">🌐 WHOIS Lookup</div>
<div class="infoBtn" onclick="showInfo(event,'WHOIS Lookup','Shows registrar / expiry / owner.','google.com')">i</div>
</button>

<button onclick="openTool('dns')" class="toolCard">
<div class="toolName">📡 DNS Lookup</div>
<div class="infoBtn" onclick="showInfo(event,'DNS Lookup','A / AAAA / MX / TXT / NS / CNAME records.','google.com MX')">i</div>
</button>

</div>
</div>

<!-- USER -->
<div class="mt-auto bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center text-sm font-bold">GU</div>
<div class="flex-1">
<div class="text-sm">Guest User</div>
<div class="text-[11px] text-white/45">Guest</div>
</div>
</div>
</div>

</div>

<!-- RIGHT -->
<div class="flex-1 flex flex-col gap-3">

<div class="glass rounded-3xl border border-white/10 px-8 py-5 flex justify-between items-center">
<div class="text-violet-300 tracking-widest text-lg">⚡ AI SECURITY CORE</div>

<div class="flex gap-2">
<button class="px-5 py-3 rounded-full border border-white/10">THINK</button>
<button class="px-5 py-3 rounded-full border border-violet-500 bg-violet-500/20">FAST</button>
<button class="px-5 py-3 rounded-full border border-white/10">CODE</button>
</div>
</div>

<div id="chatBox"
class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3 items-end">

<textarea id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl resize-none px-5 py-4 text-base placeholder-white/25"></textarea>

<button class="w-24 h-16 rounded-2xl bg-violet-500 hover:bg-violet-600 text-xl">➤</button>

</div>

</div>
</div>

<script>
let popupTimer=null;
let popupCount=10;
let paused=false;
let toolCounter=0;

/* INFO POPUP */
function showInfo(e,title,text,example){

e.stopPropagation();

const popup=document.getElementById("toolPopup");

popup.innerHTML=`
<div class="popupTitle">${title}</div>
<div>${text}</div>
<div class="popupExample">${example}</div>
<div class="popupTimer">Closes in <span id="timerNum">10</span>s</div>
`;

popup.style.display="block";

let rect=e.target.getBoundingClientRect();

popup.style.left=(rect.right+12)+"px";
popup.style.top=(rect.top-4)+"px";

popupCount=10;
clearInterval(popupTimer);

popupTimer=setInterval(()=>{
if(paused)return;

popupCount--;

let t=document.getElementById("timerNum");
if(t)t.innerText=popupCount;

if(popupCount<=0)closePopup();

},1000);

popup.onmouseenter=()=>paused=true;
popup.onmouseleave=()=>paused=false;
}

function closePopup(){
clearInterval(popupTimer);
toolPopup.style.display="none";
}

document.addEventListener("click",function(e){
if(!e.target.classList.contains("infoBtn")) closePopup();
});

function toggleTools(){
let box=document.getElementById("toolsPanel");
box.style.display=box.style.display==="none"?"block":"none";
}

function newChat(){
chatBox.innerHTML="";
}

/* REAL TOOL FORMS */
async function openTool(tool){

toolCounter++;
let uid="tool_"+toolCounter;
let html="";

if(tool==="hash"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter text">
<select id="${uid}_mode" class="toolInput">
<option value="md5">MD5</option>
<option value="sha1">SHA1</option>
<option value="sha256">SHA256</option>
</select>
<button class="toolBtn" onclick="runTool('hash','${uid}')">Generate</button>`;
}

if(tool==="base64"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter text">
<select id="${uid}_mode" class="toolInput">
<option value="encode">Encode</option>
<option value="decode">Decode</option>
</select>
<button class="toolBtn" onclick="runTool('base64','${uid}')">Run</button>`;
}

if(tool==="password"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter password">
<button class="toolBtn" onclick="runTool('password','${uid}')">Check</button>`;
}

if(tool==="jwt"){
html=`
<textarea id="${uid}_text" class="toolInput" placeholder="Paste JWT Token"></textarea>
<button class="toolBtn" onclick="runTool('jwt','${uid}')">Decode</button>`;
}

if(tool==="whois"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter domain">
<button class="toolBtn" onclick="runTool('whois','${uid}')">Lookup</button>`;
}

if(tool==="dns"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter domain">
<select id="${uid}_mode" class="toolInput">
<option value="A">A</option>
<option value="AAAA">AAAA</option>
<option value="MX">MX</option>
<option value="TXT">TXT</option>
<option value="NS">NS</option>
<option value="CNAME">CNAME</option>
</select>
<button class="toolBtn" onclick="runTool('dns','${uid}')">Lookup</button>`;
}

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-violet-300 mb-3">TOOL PANEL • ${tool.toUpperCase()}</div>
${html}
<div id="${uid}_result" class="mt-3 text-sm text-white/80"></div>
</div>`;

chatBox.scrollTop=chatBox.scrollHeight;
}

/* RUN TOOL */
async function runTool(name,uid){

let text=document.getElementById(uid+"_text").value;
let mode=document.getElementById(uid+"_mode")?.value || "";
let result=document.getElementById(uid+"_result");

result.innerHTML="Running...";

let res=await fetch("/tool/"+name,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
text:text,
mode:mode,
rtype:mode
})
});

let data=await res.json();

result.innerHTML=`<pre>${JSON.stringify(data,null,2)}</pre>`;
chatBox.scrollTop=chatBox.scrollHeight;
}
</script>

</body>
</html>
