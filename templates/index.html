<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<!-- FIXED favicon -->
<link rel="icon" href="/static/logo.png">

<script src="https://cdn.tailwindcss.com"></script>

<!-- MARKDOWN + CODE -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body {
    margin:0;
    color:#e5e7eb;
    font-family:'Inter', monospace;
    background:#020617;
}
.glass {
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
}
.sidebar { width:260px; }
.logo { filter: drop-shadow(0 0 8px rgba(139,92,246,0.5)); }
.btn {
    border:1px solid #8b5cf6;
    padding:10px;
    border-radius:12px;
    color:#8b5cf6;
}
.input-box {
    background:#020617;
    border:1px solid rgba(255,255,255,0.1);
    padding:12px;
    border-radius:12px;
    width:100%;
    color:white;
}
.bot {
    background: rgba(139,92,246,0.1);
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}
.user {
    text-align:right;
    padding:12px;
    color:#c4b5fd;
}
</style>
</head>

<body class="flex flex-col h-screen">

<div class="flex flex-1 overflow-hidden">

<!-- SIDEBAR -->
<div class="sidebar glass p-4 flex flex-col justify-between hidden md:flex">
    <div>
        <div class="flex items-center gap-3">
            <!-- FIXED IMAGE -->
            <img src="/static/logo.png" class="w-10 h-10 logo rounded-lg">
            <span class="text-purple-300 text-lg font-bold">CIPHER</span>
        </div>

        <p class="text-xs opacity-60 mt-1">AI Cyber Assistant</p>

        <button onclick="createNewChat()" class="btn mt-4 w-full">+ NEW CHAT</button>
    </div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col p-3 gap-3">

<div class="glass p-4 flex justify-between">
    <span>⚡ AI SECURITY CORE</span>
</div>

<div id="chat" class="flex-1 glass p-4 overflow-y-auto"></div>

<div class="glass p-3 flex gap-2">
    <textarea id="msg" class="input-box flex-1"></textarea>
    <button onclick="send()" class="btn px-6">➤</button>
</div>

</div>
</div>

<script>
let chats = {};
let currentChat = null;

function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = {messages:[]};
    render();
}

function render(){
    const chatBox = document.getElementById("chat");
    chatBox.innerHTML="";

    chats[currentChat].messages.forEach(m=>{
        const div=document.createElement("div");
        div.className = m.role==="user"?"user":"bot";

        div.innerHTML = marked.parse(m.content);
        chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

async function send(){
    const msgBox = document.getElementById("msg");
    const text = msgBox.value;

    if(!text) return;

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    msgBox.value="";

    // ✅ FIXED JSON REQUEST
    const res = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            message:text,
            chat_id:currentChat
        })
    });

    const data = await res.json();

    chats[currentChat].messages.push({
        role:"bot",
        content:data.response || "⚠️ No response"
    });

    render();
}

createNewChat();
</script>

</body>
</html>
