<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
padding:0;
overflow:hidden;
font-family:Consolas,monospace;
color:#fff;
background:linear-gradient(135deg,#020617,#07113b,#020617);
}
.glass{
background:rgba(8,12,35,.68);
backdrop-filter:blur(18px);
}
.scrollbar::-webkit-scrollbar{width:5px;height:5px}
.scrollbar::-webkit-scrollbar-thumb{
background:#7c3aed;border-radius:10px;
}

.inputbox,.toolInput,.authInput{
background:#020617;
border:1px solid rgba(255,255,255,.08);
color:#fff;
outline:none;
}
.inputbox:focus,.toolInput:focus,.authInput:focus{
border-color:#8b5cf6;
}

.msgbox{
background:rgba(72,55,170,.15);
border-left:2px solid #8b5cf6;
border-radius:16px;
padding:14px;
}

.toolInput,.authInput{
width:100%;
padding:12px;
border-radius:14px;
margin-bottom:10px;
}

.toolBtn,.authBtn{
padding:10px 16px;
border-radius:14px;
background:#7c3aed;
transition:.2s;
}
.toolBtn:hover,.authBtn:hover{
background:#6d28d9;
}

pre{
white-space:pre-wrap;
word-wrap:break-word;
background:#020617;
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,.06);
}

/* MODE BUTTONS */
.modeBtn{
transition:.2s;
}
.modeActive{
background:rgba(124,58,237,.18);
border-color:#8b5cf6 !important;
}

/* TOOLS */
#toolsPanel{
max-height:230px;
overflow-y:auto;
overflow-x:hidden;
padding-right:6px;
}

.toolCard{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:12px 14px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.02);
transition:.25s;
}
.toolCard:hover{
border-color:#8b5cf6;
background:rgba(124,58,237,.08);
}
.toolName{
flex:1;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}
.infoBtn{
width:24px;height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
background:#111938;
border:1px solid rgba(255,255,255,.08);
color:#c4b5fd;
cursor:pointer;
}

/* POPUP */
#toolPopup{
position:fixed;
width:280px;
background:#090f25;
border:1px solid rgba(139,92,246,.55);
box-shadow:0 20px 45px rgba(0,0,0,.55);
border-radius:18px;
padding:14px;
z-index:99999;
display:none;
}
.popupTitle{
font-size:14px;
font-weight:700;
color:#c4b5fd;
margin-bottom:8px;
}
.popupExample{
margin-top:10px;
padding:8px;
border-radius:12px;
background:rgba(255,255,255,.03);
font-size:11px;
color:#a5f3fc;
}
.popupTimer{
margin-top:10px;
font-size:11px;
color:#fca5a5;
text-align:right;
}

/* ACCOUNT MENU */
#menu{
position:absolute;
left:0;
bottom:64px;
width:240px;
background:#171717;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:8px;
display:none;
z-index:999;
}
.menuBtn{
width:100%;
text-align:left;
padding:10px 12px;
border-radius:12px;
transition:.2s;
}
.menuBtn:hover{
background:rgba(255,255,255,.08);
}

/* AUTH MODAL */
.modalBg{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
}
.modalCard{
width:380px;
background:#070d2c;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:24px;
}
</style>
</head>

<body>

<div id="toolPopup"></div>

<!-- AUTH MODAL -->
<div id="authModal" class="modalBg">
<div class="modalCard">

<div class="flex justify-between items-center mb-4">
<div id="authTitle" class="text-2xl text-violet-300">Login</div>
<button onclick="closeAuth()">✕</button>
</div>

<input id="authName" class="authInput hidden" placeholder="Full Name">
<input id="authEmail" class="authInput" placeholder="Email">
<input id="authPass" type="password" class="authInput" placeholder="Password">

<button id="authBtn" onclick="submitAuth()" class="authBtn w-full mt-2">
Login
</button>

<div class="text-center text-sm text-white/55 mt-4">
<span id="switchText">Don't have an account?</span>
<button onclick="switchAuth()" class="text-violet-300 ml-1">
Sign Up
</button>
</div>

<div id="authMsg" class="text-red-300 text-sm mt-3"></div>

</div>
</div>

<div class="h-screen flex gap-3 p-3">

<!-- LEFT -->
<div class="w-[300px] glass rounded-3xl border border-white/10 p-4 flex flex-col h-full overflow-hidden">

<!-- LOGO -->
<div class="flex items-center gap-3 mb-4">
<img src="/static/logo.png" class="w-12 h-12 rounded-xl object-contain">
<div>
<div class="text-3xl tracking-[6px] text-violet-300">CIPHER</div>
<div class="text-xs text-white/55">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()"
class="w-full rounded-2xl border border-violet-500 py-3 mb-4 hover:bg-violet-500/10">
+ NEW CHAT
</button>

<div id="historyBox"
class="flex-1 overflow-y-auto scrollbar pr-1 space-y-2 min-h-0 mb-4"></div>

<!-- TOOLS -->
<div class="mb-4">

<div class="flex justify-between items-center mb-2 px-1">
<div class="text-[11px] tracking-[4px] text-white/40">SECURITY TOOLS</div>
<button onclick="toggleTools()" class="text-xs text-violet-300">Hide</button>
</div>

<div id="toolsPanel" class="space-y-2 scrollbar">

<button onclick="openTool('hash')" class="toolCard">
<div class="toolName">🔐 Hash Tool</div>
<div class="infoBtn" onclick="showInfo(event,'Hash Tool','Creates MD5 / SHA1 / SHA256 hashes.','cipher123')">i</div>
</button>

<button onclick="openTool('base64')" class="toolCard">
<div class="toolName">📦 Base64 Tool</div>
<div class="infoBtn" onclick="showInfo(event,'Base64 Tool','Encode / Decode text safely.','hello → aGVsbG8=')">i</div>
</button>

<button onclick="openTool('password')" class="toolCard">
<div class="toolName">🔑 Password Check</div>
<div class="infoBtn" onclick="showInfo(event,'Password Checker','Checks password strength.','Cipher@2026')">i</div>
</button>

<button onclick="openTool('jwt')" class="toolCard">
<div class="toolName">🪪 JWT Decoder</div>
<div class="infoBtn" onclick="showInfo(event,'JWT Decoder','Reads JWT claims.','Paste token')">i</div>
</button>

<button onclick="openTool('whois')" class="toolCard">
<div class="toolName">🌐 WHOIS Lookup</div>
<div class="infoBtn" onclick="showInfo(event,'WHOIS Lookup','Shows registrar / expiry / owner.','google.com')">i</div>
</button>

<button onclick="openTool('dns')" class="toolCard">
<div class="toolName">📡 DNS Lookup</div>
<div class="infoBtn" onclick="showInfo(event,'DNS Lookup','A / MX / TXT / NS / CNAME records.','google.com MX')">i</div>
</button>

</div>
</div>

<!-- ACCOUNT -->
<div class="relative mt-auto">

<div onclick="toggleMenu()"
class="bg-[#0d153d] rounded-2xl border border-white/10 px-4 py-3 cursor-pointer">

<div class="flex items-center gap-3">
<div id="avatar"
class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center text-sm font-bold">
GU
</div>

<div class="flex-1">
<div id="username" class="text-sm truncate">Guest User</div>
<div id="memberType" class="text-[11px] text-white/45">Guest</div>
</div>
</div>
</div>

<div id="menu">

<div id="guestMenu">
<button class="menuBtn" onclick="openAuth('login')">Login</button>
<button class="menuBtn" onclick="openAuth('signup')">Sign Up</button>
</div>

<div id="userMenu" style="display:none">
<button class="menuBtn">Profile</button>
<button class="menuBtn">Settings</button>
<button class="menuBtn text-red-300" onclick="logoutUser()">Logout</button>
</div>

</div>

</div>

</div>

<!-- RIGHT -->
<div class="flex-1 flex flex-col gap-3">

<!-- TOP -->
<div class="glass rounded-3xl border border-white/10 px-8 py-5 flex justify-between items-center">

<div class="text-violet-300 tracking-widest text-lg">
⚡ AI SECURITY CORE
</div>

<div class="flex gap-2">

<button id="thinkingBtn"
onclick="setMode('thinking')"
class="modeBtn px-5 py-3 rounded-full border border-white/10">
THINK
</button>

<button id="fastBtn"
onclick="setMode('fast')"
class="modeBtn modeActive px-5 py-3 rounded-full border border-white/10">
FAST
</button>

<button id="codeBtn"
onclick="setMode('code')"
class="modeBtn px-5 py-3 rounded-full border border-white/10">
CODE
</button>

</div>

</div>

<!-- CHAT -->
<div id="chatBox"
class="flex-1 glass rounded-3xl border border-white/10 p-5 overflow-y-auto scrollbar space-y-4"></div>

<!-- INPUT -->
<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3 items-end">

<textarea id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl resize-none px-5 py-4 text-base placeholder-white/25"></textarea>

<button onclick="sendMsg()"
class="w-24 h-16 rounded-2xl bg-violet-500 hover:bg-violet-600 text-xl">
➤
</button>

</div>

</div>
</div>

<script>
let mode="fast";
let authMode="login";
let popupTimer=null;
let popupCount=10;
let paused=false;
let toolCounter=0;
let loggedUser=null;
let currentChatId=null;

/* ---------- MODE ---------- */
function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(btn=>{
btn.classList.remove("modeActive");
});
document.getElementById(m+"Btn").classList.add("modeActive");
}

/* ---------- MENU ---------- */
function toggleMenu(){
menu.style.display = menu.style.display==="block" ? "none" : "block";
}

/* ---------- AUTH ---------- */
function openAuth(type){
authMode=type;
authModal.style.display="flex";
menu.style.display="none";

if(type==="login"){
authTitle.innerText="Login";
authBtn.innerText="Login";
authName.classList.add("hidden");
switchText.innerText="Don't have an account?";
}else{
authTitle.innerText="Sign Up";
authBtn.innerText="Create Account";
authName.classList.remove("hidden");
switchText.innerText="Already have an account?";
}
authMsg.innerText="";
}

function closeAuth(){
authModal.style.display="none";
}

function switchAuth(){
openAuth(authMode==="login"?"signup":"login");
}

async function submitAuth(){

let payload={
email:authEmail.value,
password:authPass.value
};

if(authMode==="signup"){
payload.name=authName.value;
}

let endpoint = authMode==="login" ? "/login" : "/signup";

let res=await fetch(endpoint,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.ok){

loggedUser=data.user || {
name:payload.name || payload.email.split("@")[0],
email:payload.email
};

updateUserUI();
closeAuth();
loadHistory();

}else{
authMsg.innerText=data.message || "Failed";
}
}

function logoutUser(){
loggedUser=null;
updateUserUI();
menu.style.display="none";
historyBox.innerHTML="";
chatBox.innerHTML="";
}

function updateUserUI(){

if(loggedUser){

let name=loggedUser.name || loggedUser.email.split("@")[0];
let initials=name.split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();

avatar.innerText=initials;
username.innerText=name;
memberType.innerText="Member";

guestMenu.style.display="none";
userMenu.style.display="block";

}else{

avatar.innerText="GU";
username.innerText="Guest User";
memberType.innerText="Guest";

guestMenu.style.display="block";
userMenu.style.display="none";
}
}

/* ---------- CHAT ---------- */
function newChat(){
chatBox.innerHTML="";
currentChatId=null;
}

async function sendMsg(){

let text=prompt.value.trim();
if(!text)return;

chatBox.innerHTML+=`
<div class="text-right">
<div class="inline-block bg-[#101844] px-4 py-3 rounded-2xl max-w-[75%]">${text}</div>
</div>`;

prompt.value="";

chatBox.innerHTML+=`
<div id="typingBox" class="msgbox">
Generating...
</div>`;

chatBox.scrollTop=chatBox.scrollHeight;

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
mode:mode,
chat_id:currentChatId
})
});

let data=await res.json();

typingBox?.remove();

if(data.ok){

currentChatId=data.chat_id;

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-[11px] text-white/50 mb-2">${data.label || mode.toUpperCase()}</div>
${data.response.replace(/\n/g,"<br>")}
</div>`;

loadHistory();
}

chatBox.scrollTop=chatBox.scrollHeight;
}

/* ---------- HISTORY ---------- */
async function loadHistory(){

let res=await fetch("/history");
let data=await res.json();

historyBox.innerHTML="";

(data.items||[]).forEach(c=>{
historyBox.innerHTML+=`
<div onclick="loadChat('${c.id}')"
class="p-3 rounded-2xl border border-white/10 hover:border-violet-500 cursor-pointer text-sm">
${c.title}
</div>`;
});
}

async function loadChat(id){

let res=await fetch("/chat/"+id);
let data=await res.json();

chatBox.innerHTML="";
currentChatId=id;

(data.items||[]).forEach(m=>{

if(m.role==="user"){
chatBox.innerHTML+=`
<div class="text-right">
<div class="inline-block bg-[#101844] px-4 py-3 rounded-2xl max-w-[75%]">${m.content}</div>
</div>`;
}else{
chatBox.innerHTML+=`
<div class="msgbox">${m.content}</div>`;
}

});

chatBox.scrollTop=chatBox.scrollHeight;
}

/* ---------- TOOL POPUP ---------- */
function showInfo(e,title,text,example){

e.stopPropagation();

toolPopup.innerHTML=`
<div class="popupTitle">${title}</div>
<div>${text}</div>
<div class="popupExample">${example}</div>
<div class="popupTimer">Closes in <span id="timerNum">10</span>s</div>
`;

toolPopup.style.display="block";

let rect=e.target.getBoundingClientRect();
toolPopup.style.left=(rect.right+10)+"px";
toolPopup.style.top=(rect.top-4)+"px";

popupCount=10;
clearInterval(popupTimer);

popupTimer=setInterval(()=>{
if(paused)return;

popupCount--;
timerNum.innerText=popupCount;

if(popupCount<=0){
closePopup();
}
},1000);

toolPopup.onmouseenter=()=>paused=true;
toolPopup.onmouseleave=()=>paused=false;
}

function closePopup(){
clearInterval(popupTimer);
toolPopup.style.display="none";
}

document.addEventListener("click",(e)=>{
if(!e.target.classList.contains("infoBtn")){
closePopup();
menu.style.display="none";
}
});

/* ---------- TOOLS ---------- */
function toggleTools(){
toolsPanel.style.display = toolsPanel.style.display==="none" ? "block":"none";
}

async function openTool(tool){

toolCounter++;
let uid="tool_"+toolCounter;
let html="";

if(tool==="hash"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter text">
<select id="${uid}_mode" class="toolInput">
<option value="md5">MD5</option>
<option value="sha1">SHA1</option>
<option value="sha256">SHA256</option>
</select>
<button class="toolBtn" onclick="runTool('hash','${uid}')">Generate</button>`;
}

if(tool==="base64"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter text">
<select id="${uid}_mode" class="toolInput">
<option value="encode">Encode</option>
<option value="decode">Decode</option>
</select>
<button class="toolBtn" onclick="runTool('base64','${uid}')">Run</button>`;
}

if(tool==="password"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter password">
<button class="toolBtn" onclick="runTool('password','${uid}')">Check</button>`;
}

if(tool==="jwt"){
html=`
<textarea id="${uid}_text" class="toolInput" placeholder="Paste JWT Token"></textarea>
<button class="toolBtn" onclick="runTool('jwt','${uid}')">Decode</button>`;
}

if(tool==="whois"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter domain">
<button class="toolBtn" onclick="runTool('whois','${uid}')">Lookup</button>`;
}

if(tool==="dns"){
html=`
<input id="${uid}_text" class="toolInput" placeholder="Enter domain">
<select id="${uid}_mode" class="toolInput">
<option value="A">A</option>
<option value="AAAA">AAAA</option>
<option value="MX">MX</option>
<option value="TXT">TXT</option>
<option value="NS">NS</option>
<option value="CNAME">CNAME</option>
</select>
<button class="toolBtn" onclick="runTool('dns','${uid}')">Lookup</button>`;
}

chatBox.innerHTML+=`
<div class="msgbox">
<div class="text-violet-300 mb-3">TOOL PANEL • ${tool.toUpperCase()}</div>
${html}
<div id="${uid}_result" class="mt-3 text-sm text-white/80"></div>
</div>`;

chatBox.scrollTop=chatBox.scrollHeight;
}

async function runTool(name,uid){

let text=document.getElementById(uid+"_text").value;
let mode=document.getElementById(uid+"_mode")?.value || "";
let result=document.getElementById(uid+"_result");

result.innerHTML="Running...";

let res=await fetch("/tool/"+name,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
text:text,
mode:mode,
rtype:mode
})
});

let data=await res.json();

result.innerHTML=`<pre>${JSON.stringify(data,null,2)}</pre>`;
chatBox.scrollTop=chatBox.scrollHeight;
}

/* ---------- INIT ---------- */
window.onload=()=>{
updateUserUI();
loadHistory();
}
</script>

</body>
</html>
