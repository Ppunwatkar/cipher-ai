<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER AI</title>

<link rel="icon" href="/static/logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
    margin:0;
    font-family:monospace;
    color:white;
    background:radial-gradient(circle at top left,#1e1b4b,#020617 55%);
    height:100vh;
    overflow:hidden;
}

.glass{
    background:rgba(10,20,60,.45);
    border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(18px);
    border-radius:22px;
}

.btn{
    border:1px solid #8b5cf6;
    color:#c4b5fd;
    padding:12px;
    border-radius:14px;
    transition:.25s;
}

.btn:hover{
    background:#8b5cf6;
    color:white;
}

.mode{
    padding:10px 18px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.08);
    cursor:pointer;
}

.active{
    border-color:#8b5cf6;
    background:rgba(139,92,246,.18);
}

.bot{
    background:rgba(99,102,241,.13);
    border-left:3px solid #8b5cf6;
    padding:16px;
    border-radius:14px;
    margin-bottom:14px;
    font-size:17px;
    line-height:1.7;
}

.user{
    text-align:right;
    color:#ddd6fe;
    margin:12px 0;
    font-size:17px;
}

.small{
    font-size:12px;
    opacity:.65;
    margin-bottom:8px;
}

/* INPUT FIX */
input, textarea{
    background:#020617;
    border:1px solid rgba(139,92,246,.25);
    color:white;
    border-radius:16px;
    width:100%;
    outline:none;
    font-size:16px;
    transition:.2s;
    line-height:1.4;
    box-sizing:border-box;
    padding:14px 18px 14px 22px;
}

input{
    height:52px;
}

textarea{
    resize:none;
    min-height:68px;
    max-height:220px;
    padding:18px 18px 18px 24px;
}

input:focus,
textarea:focus{
    border-color:#8b5cf6;
    box-shadow:0 0 0 3px rgba(139,92,246,.12);
}

input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,.38);
}

/* AUTH */
#authModal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.auth-box{
    width:380px;
    padding:30px;
    position:relative;
}

.close-btn{
    position:absolute;
    top:12px;
    right:16px;
    cursor:pointer;
    font-size:24px;
    opacity:.7;
}

.close-btn:hover{
    opacity:1;
    color:#c4b5fd;
}

.link{
    color:#a78bfa;
    cursor:pointer;
    font-size:14px;
}

.link:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<!-- LOGIN / SIGNUP -->
<div id="authModal">

<div class="glass auth-box">

<div class="close-btn" onclick="closeModal()">✕</div>

<h1 class="text-2xl text-purple-300 mb-2">CIPHER</h1>
<p class="opacity-70 mb-5">Secure AI Access</p>

<div id="signupFields" style="display:none;">
<input id="name" placeholder="Full Name" class="mb-3">
</div>

<input id="email" placeholder="Email" class="mb-3">
<input id="password" type="password" placeholder="Password" class="mb-4">

<button onclick="submitAuth()" class="btn w-full mb-4" id="authBtn">
Login
</button>

<div class="text-center">
<span class="link" onclick="toggleAuth()" id="switchText">
Create account
</span>
</div>

<p id="authMsg" class="text-red-300 text-sm mt-4"></p>

</div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal"
style="display:none"
class="fixed inset-0 bg-black/50 flex justify-center items-center z-[999]">

<div class="glass w-[360px] p-6 relative">

<div onclick="closeSettings()"
class="absolute top-3 right-4 cursor-pointer text-xl opacity-70">✕</div>

<h2 class="text-xl text-purple-300 mb-5">Settings</h2>

<div class="space-y-3">
<button class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5">🌙 Theme Mode</button>
<button class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5">🔔 Notifications</button>
<button class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5">🧠 AI Preferences</button>
<button class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5">🔒 Privacy</button>
</div>

</div>
</div>

<!-- APP -->
<div class="flex h-screen p-4 gap-4">

<!-- SIDEBAR -->
<div class="glass w-[290px] p-5 flex flex-col justify-between">

<div>
<div class="flex items-center gap-3">
<img src="/static/logo.png" class="w-11 h-11 rounded-xl">

<div>
<div class="text-xl text-purple-300">CIPHER</div>
<div class="text-xs opacity-60">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()" class="btn w-full mt-6">
+ NEW CHAT
</button>

<div id="history" class="mt-5 space-y-2"></div>
</div>

<!-- USER CARD -->
<div class="relative">

<div onclick="toggleMenu()"
class="glass p-3 cursor-pointer hover:border-purple-400 transition">

<div class="flex items-center gap-3">

<div class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center text-sm">
PP
</div>

<div class="flex-1">
<div class="text-sm text-white" id="username">Guest User</div>
<div class="text-xs opacity-60" id="userplan">Free</div>
</div>

<div class="text-lg opacity-70">›</div>

</div>
</div>

<!-- MENU -->
<div id="userMenu"
class="hidden absolute bottom-16 left-0 w-full glass p-3 space-y-2 z-50">

<button onclick="showSettings()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/5">
⚙ Settings
</button>

<button onclick="showProfile()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/5">
👤 Profile
</button>

<button onclick="showModal()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/5">
🔐 Login / Signup
</button>

<button onclick="logoutUser()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-red-500/10 text-red-300">
↩ Logout
</button>

</div>
</div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col gap-4">

<!-- TOP -->
<div class="glass p-5 flex justify-between items-center">

<div>⚡ AI SECURITY CORE</div>

<div class="flex gap-2">
<div class="mode active" data-mode="thinking">THINK</div>
<div class="mode" data-mode="fast">FAST</div>
<div class="mode" data-mode="code">CODE</div>
</div>

</div>

<!-- CHAT -->
<div id="chat" class="glass flex-1 p-5 overflow-y-auto"></div>

<!-- INPUT -->
<div class="glass p-3 flex gap-3 items-end">

<textarea
id="prompt"
rows="2"
placeholder="Ask anything..."
class="flex-1"></textarea>

<button onclick="sendMsg()" class="btn px-7 py-4 text-lg">
➤
</button>

</div>

</div>
</div>

<script>
let isSignup = false;
let currentMode = "thinking";
let currentChat = "chat_" + Date.now();
let loggedIn = false;

/* LOAD */
window.onload = async ()=>{

await checkLogin();

document.querySelectorAll(".mode").forEach(btn=>{
btn.onclick = ()=>{
document.querySelectorAll(".mode")
.forEach(x=>x.classList.remove("active"));

btn.classList.add("active");
currentMode = btn.dataset.mode;
};
});

autoGrow();
};

/* AUTO TEXTAREA */
function autoGrow(){
const t = document.getElementById("prompt");

t.addEventListener("input", function(){
this.style.height="auto";
this.style.height=this.scrollHeight+"px";
});
}

/* MODAL */
function showModal(){
document.getElementById("authModal").style.display="flex";
}

function closeModal(){
document.getElementById("authModal").style.display="none";
}

/* SETTINGS */
function showSettings(){
document.getElementById("settingsModal").style.display="flex";
}

function closeSettings(){
document.getElementById("settingsModal").style.display="none";
}

/* USER MENU */
function toggleMenu(){
document.getElementById("userMenu").classList.toggle("hidden");
}

/* LOGIN CHECK */
async function checkLogin(){

let res = await fetch("/me");
let data = await res.json();

if(data.logged_in){
loggedIn = true;
closeModal();

document.getElementById("username").innerText = data.name;
document.getElementById("userplan").innerText = "Member";

loadHistory();
}else{
loggedIn = false;
}
}

/* TOGGLE LOGIN SIGNUP */
function toggleAuth(){

isSignup = !isSignup;

document.getElementById("signupFields").style.display =
isSignup ? "block" : "none";

document.getElementById("authBtn").innerText =
isSignup ? "Sign Up" : "Login";

document.getElementById("switchText").innerText =
isSignup ? "Already have account? Login" : "Create account";
}

/* AUTH */
async function submitAuth(){

let body = {
name:val("name"),
email:val("email"),
password:val("password")
};

let url = isSignup ? "/signup" : "/login";

if(!isSignup){
body = {
email:val("email"),
password:val("password")
};
}

let res = await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)
});

let data = await res.json();

if(data.ok){
closeModal();
setTimeout(()=>location.reload(),300);
}else{
document.getElementById("authMsg").innerText =
data.msg || "Failed.";
}
}

function val(id){
return document.getElementById(id).value.trim();
}

/* CHAT */
function newChat(){
currentChat = "chat_" + Date.now();
document.getElementById("chat").innerHTML="";
}

async function sendMsg(){

let prompt = document.getElementById("prompt");
let msg = prompt.value.trim();

if(!msg) return;

let box = document.getElementById("chat");

box.innerHTML += `<div class="user">${msg}</div>`;

prompt.value="";
prompt.style.height="68px";

let res = await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:msg,
mode:currentMode,
chat_id:currentChat
})
});

let data = await res.json();

box.innerHTML += `
<div class="bot">
<div class="small">${data.label || "AI MODEL"}</div>
${marked.parse(data.response || "No response")}
</div>
`;

box.scrollTop = box.scrollHeight;

if(loggedIn){
loadHistory();
}else{
setTimeout(()=>showModal(),1500);
}
}

/* HISTORY */
async function loadHistory(){

let res = await fetch("/history");
let data = await res.json();

let side = document.getElementById("history");
side.innerHTML="";

data.forEach(chat=>{
side.innerHTML += `
<div onclick="openChat('${chat.id}')"
class="glass p-3 cursor-pointer text-sm hover:border-purple-400">
${chat.title}
</div>
`;
});
}

/* OPEN CHAT */
async function openChat(id){

currentChat = id;

let res = await fetch("/chat/" + id);
let data = await res.json();

let box = document.getElementById("chat");
box.innerHTML="";

data.forEach(msg=>{

if(msg.role=="user"){
box.innerHTML += `<div class="user">${msg.content}</div>`;
}else{
box.innerHTML += `
<div class="bot">
${marked.parse(msg.content)}
</div>`;
}
});
}

/* PROFILE */
function showProfile(){
alert("Profile coming next update.");
}

/* LOGOUT */
async function logoutUser(){
await fetch("/logout");
location.reload();
}

/* OUTSIDE CLICK */
document.addEventListener("click", function(e){

let menu = document.getElementById("userMenu");

if(!e.target.closest(".relative")){
menu.classList.add("hidden");
}
});
</script>

</body>
</html>
