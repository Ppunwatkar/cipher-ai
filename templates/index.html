<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:linear-gradient(135deg,#020617,#07113b,#020617);
    color:white;
    overflow:hidden;
    font-family:Consolas, monospace;
}
.scrollbar::-webkit-scrollbar{width:6px}
.scrollbar::-webkit-scrollbar-thumb{background:#6d28d9;border-radius:10px}

.glass{
    background:rgba(10,15,40,.65);
    backdrop-filter:blur(18px);
}

.msgbox{
    background:rgba(80,60,180,.18);
    border-left:3px solid #8b5cf6;
}

.inputbox{
    background:#030712;
    border:1px solid rgba(255,255,255,.08);
}
.inputbox:focus{
    border:1px solid #8b5cf6;
    outline:none;
}

.copyBtn{
    font-size:12px;
    padding:4px 10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.04);
}

.typingDots span{
    animation:blink 1.2s infinite;
}
.typingDots span:nth-child(2){animation-delay:.2s}
.typingDots span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}

pre{
    background:#030712;
    padding:16px;
    border-radius:14px;
    overflow:auto;
    margin-top:10px;
    white-space:pre-wrap;
}
code{
    color:#c4b5fd;
}
</style>
</head>

<body>

<div class="h-screen flex p-3 gap-3">

<!-- SIDEBAR -->
<div class="w-[330px] glass rounded-3xl border border-white/10 flex flex-col p-4">

<div class="flex items-center gap-3 mb-4">
<img src="/static/logo.png" class="w-12 h-12 rounded-xl">
<div>
<div class="text-3xl tracking-wider text-violet-300">CIPHER</div>
<div class="text-xs text-white/60">AI Cyber Assistant</div>
</div>
</div>

<button onclick="newChat()"
class="w-full mb-4 rounded-2xl border border-violet-500 py-3 hover:bg-violet-500/10 transition">
+ NEW CHAT
</button>

<div id="historyBox"
class="flex-1 overflow-y-auto space-y-2 scrollbar pr-1"></div>

<!-- USER -->
<div class="relative mt-4">

<div id="userCard"
onclick="toggleAccountMenu()"
class="bg-[#0a1035] border border-white/10 rounded-3xl px-4 py-4 cursor-pointer hover:border-violet-500">

<div class="flex items-center gap-3">

<div id="userAvatar"
class="w-12 h-12 rounded-full bg-slate-600 flex items-center justify-center text-lg font-bold">
GU
</div>

<div class="flex-1 min-w-0">
<div id="userName" class="truncate text-[15px]">Guest User</div>
<div class="text-xs text-white/50">Member</div>
</div>

<div>›</div>

</div>
</div>

<!-- MENU -->
<div id="accountMenu"
class="hidden absolute left-0 bottom-20 w-72 rounded-3xl bg-[#1e1e1e] border border-white/10 p-3 z-50">

<div class="flex items-center gap-3 px-2 py-2">
<div id="menuAvatar"
class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold">GU</div>

<div class="flex-1">
<div id="menuName">Guest User</div>
<div class="text-xs text-white/50">Free</div>
</div>
</div>

<div class="border-t border-white/10 my-2"></div>

<button onclick="openProfile()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Profile</button>

<button onclick="openSettings()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10">Settings</button>

<button onclick="logoutUser()"
class="w-full text-left px-3 py-2 rounded-xl hover:bg-red-500/10 text-red-300">Logout</button>

</div>
</div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col gap-3">

<!-- TOP -->
<div class="glass rounded-3xl border border-white/10 p-5 flex justify-between items-center">

<div class="text-lg tracking-widest text-violet-300">
⚡ AI SECURITY CORE
</div>

<div class="flex gap-2">

<button id="thinkingBtn"
onclick="setMode('thinking')"
class="modeBtn px-6 py-3 rounded-full border border-white/10">
THINK
</button>

<button id="fastBtn"
onclick="setMode('fast')"
class="modeBtn px-6 py-3 rounded-full border border-violet-500 bg-violet-500/20">
FAST
</button>

<button id="codeBtn"
onclick="setMode('code')"
class="modeBtn px-6 py-3 rounded-full border border-white/10">
CODE
</button>

</div>
</div>

<!-- CHAT -->
<div id="chatBox"
class="flex-1 glass rounded-3xl border border-white/10 p-6 overflow-y-auto scrollbar space-y-6"></div>

<!-- INPUT -->
<div class="glass rounded-3xl border border-white/10 p-3 flex gap-3 items-end">

<textarea id="prompt"
rows="2"
placeholder="Ask anything..."
class="inputbox flex-1 rounded-2xl resize-none px-5 py-4 text-lg placeholder-white/30"></textarea>

<button onclick="sendMsg()"
class="w-24 h-20 rounded-2xl bg-violet-500 hover:bg-violet-600 text-xl">
➤
</button>

</div>

</div>
</div>

<script>
let mode="fast";
let currentChatId=null;
let loaderId=null;

window.onload=async()=>{
await loadUser();
await loadHistory();
}

function setMode(m){
mode=m;
document.querySelectorAll(".modeBtn").forEach(btn=>{
btn.classList.remove("bg-violet-500/20","border-violet-500");
btn.classList.add("border-white/10");
});
document.getElementById(m+"Btn").classList.add("bg-violet-500/20","border-violet-500");
}

async function sendMsg(){

let prompt=document.getElementById("prompt").value.trim();
if(!prompt)return;

appendUser(prompt);
document.getElementById("prompt").value="";

showLoader();

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:prompt,
mode:mode,
chat_id:currentChatId
})
});

let data=await res.json();

hideLoader();

if(data.ok){
currentChatId=data.chat_id;
appendAI(data.label,data.response);
await loadHistory();
}else{
appendAI("SYSTEM",data.msg||"Failed");
}
}

function appendUser(txt){
document.getElementById("chatBox").innerHTML+=`
<div class="text-right">
<div class="inline-block px-4 py-3 rounded-2xl bg-[#0e153f] max-w-[75%] text-left">${escapeHtml(txt)}</div>
</div>`;
scrollBottom();
}

function appendAI(label,txt){

txt=formatReply(txt);

document.getElementById("chatBox").innerHTML+=`
<div class="msgbox rounded-2xl p-5">
<div class="flex justify-between items-center mb-3">
<div class="text-xs text-white/60">${label}</div>
<button onclick="copyText(this)" data-copy="${encodeURIComponent(stripHtml(txt))}" class="copyBtn">Copy</button>
</div>
<div class="leading-8 text-[17px]">${txt}</div>
</div>`;

scrollBottom();
}

function showLoader(){

loaderId="loader_"+Date.now();

document.getElementById("chatBox").innerHTML+=`
<div id="${loaderId}" class="msgbox rounded-2xl p-5">
<div class="text-xs text-white/60 mb-3">AI MODEL</div>
<div class="typingDots text-2xl text-violet-300">
<span>.</span><span>.</span><span>.</span>
</div>
</div>`;

scrollBottom();
}

function hideLoader(){
let el=document.getElementById(loaderId);
if(el)el.remove();
}

function formatReply(text){

text=escapeHtml(text);

text=text.replace(/```([\s\S]*?)```/g,function(m,p1){
return `
<div class="relative">
<button onclick="copyCode(this)" data-code="${encodeURIComponent(p1)}"
class="copyBtn absolute right-2 top-2">Copy Code</button>
<pre><code>${p1}</code></pre>
</div>`;
});

text=text.replace(/\n/g,"<br>");
return text;
}

function copyCode(btn){
let txt=decodeURIComponent(btn.dataset.code);
navigator.clipboard.writeText(txt);
btn.innerText="Copied!";
setTimeout(()=>btn.innerText="Copy Code",1200);
}

function copyText(btn){
let txt=decodeURIComponent(btn.dataset.copy);
navigator.clipboard.writeText(txt);
btn.innerText="Copied!";
setTimeout(()=>btn.innerText="Copy",1200);
}

function stripHtml(html){
let div=document.createElement("div");
div.innerHTML=html;
return div.innerText;
}

function escapeHtml(text){
return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

function scrollBottom(){
let box=document.getElementById("chatBox");
box.scrollTop=box.scrollHeight;
}

function newChat(){
currentChatId=null;
document.getElementById("chatBox").innerHTML="";
}

async function loadHistory(){
let res=await fetch("/history");
let data=await res.json();

let html="";
data.items.forEach(c=>{
html+=`
<div onclick="loadChat('${c.id}')"
class="p-4 rounded-2xl border border-white/10 hover:border-violet-500 cursor-pointer">
${c.title}
</div>`;
});

document.getElementById("historyBox").innerHTML=html;
}

async function loadChat(id){
currentChatId=id;

let res=await fetch("/chat/"+id);
let data=await res.json();

document.getElementById("chatBox").innerHTML="";

data.items.forEach(m=>{
if(m.role==="user"){
appendUser(m.content);
}else{
appendAI("AI MODEL",m.content);
}
});
}

async function loadUser(){
try{
let res=await fetch("/me");
let data=await res.json();

if(data.logged_in){
let email=data.email;
let name=email.split("@")[0];

document.getElementById("userName").innerText=name;
document.getElementById("menuName").innerText=name;

let initials=name.substring(0,2).toUpperCase();

document.getElementById("userAvatar").innerText=initials;
document.getElementById("menuAvatar").innerText=initials;
}
}catch(e){}
}

function toggleAccountMenu(){
document.getElementById("accountMenu").classList.toggle("hidden");
}

function openProfile(){}
function openSettings(){}

async function logoutUser(){
await fetch("/logout");
location.reload();
}
</script>

</body>
</html>
