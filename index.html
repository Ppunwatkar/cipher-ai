<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cypher AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: #fff;
}

/* Container */
.container {
    max-width: 900px;
    margin: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Header */
.header {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    padding: 10px;
}

/* Mode Buttons */
.modes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}

.mode-btn {
    padding: 8px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #21262d;
    color: #fff;
    font-size: 14px;
}

.mode-btn.active {
    background: #2f81f7;
}

/* Chat Box */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
    background: #161b22;
}

/* Messages */
.message {
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 85%;
    word-wrap: break-word;
}

.user {
    background: #2f81f7;
    align-self: flex-end;
}

.bot {
    background: #30363d;
    align-self: flex-start;
}

/* Input Area */
.input-area {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button.send {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: #2f81f7;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Mobile Optimization */
@media (max-width: 600px) {
    .header {
        font-size: 20px;
    }

    input {
        font-size: 14px;
    }

    .mode-btn {
        font-size: 12px;
        padding: 6px 10px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">⚡ Cypher AI</div>

    <!-- Modes -->
    <div class="modes">
        <button class="mode-btn active" onclick="setMode(this, 'thinking')">🧠 Thinking</button>
        <button class="mode-btn" onclick="setMode(this, 'programming')">💻 Programming</button>
        <button class="mode-btn" onclick="setMode(this, 'fast')">⚡ Fast</button>
    </div>

    <!-- Chat -->
    <div id="chat" class="chat-box"></div>

    <!-- Input -->
    <div class="input-area">
        <input id="input" placeholder="Ask anything..." />
        <button class="send" onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
let mode = "thinking";
let chat_id = localStorage.getItem("chat_id") || Date.now().toString();
localStorage.setItem("chat_id", chat_id);

function setMode(btn, selectedMode) {
    mode = selectedMode;

    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function addMessage(text, sender) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "message " + sender;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const formData = new FormData();
    formData.append("message", text);
    formData.append("chat_id", chat_id);
    formData.append("mode", mode);

    try {
        const res = await fetch("/chat", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        addMessage(data.response, "bot");

    } catch (err) {
        addMessage("❌ Error connecting to server", "bot");
    }
}

/* Enter key support */
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
