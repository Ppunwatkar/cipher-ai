<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#04070d;
    color:#e6edf3;
    font-family: monospace;
}

body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:-1;
}

.sidebar { width:260px; background:#0b0f17; border-right:1px solid #1f2937; }
.header { background:#0b0f17; border-bottom:1px solid #1f2937; }

.badge { padding:8px 16px; border:1px solid #00f2ff; cursor:pointer; }

.input-box {
    background:#020617;
    border:1px solid #00f2ff;
    padding:12px;
    color:white;
    width:100%;
}

.btn {
    border:1px solid #00f2ff;
    padding:12px;
    color:#00f2ff;
    cursor:pointer;
}

.btn:hover {
    background:#00f2ff;
    color:black;
}

.bot { background:#0d1117; border-left:3px solid #00f2ff; padding:10px; }
.user { text-align:right; padding:10px; }

#authModal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#0b0f17;
    border:1px solid #00f2ff;
    padding:20px;
    width:300px;
}
</style>
</head>

<body class="flex h-screen">

<!-- SIDEBAR -->
<div class="sidebar p-4 flex flex-col justify-between">
<div>
<h1 class="text-cyan-400">CIPHER</h1>
<button onclick="createNewChat()" class="btn mt-2">+ NEW CHAT</button>
</div>

<div>
<button class="btn w-full" onclick="openAuth('login')">Login</button>
<button class="btn w-full mt-2" onclick="openAuth('signup')">Sign Up</button>
</div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<div class="header p-4 flex justify-between">
<span>RESEARCH TERMINAL</span>
<div>
<span class="badge bg-cyan-400" data-mode="thinking">THINKING</span>
<span class="badge" data-mode="fast">FAST</span>
<span class="badge" data-mode="programming">PROGRAMMING</span>
</div>
</div>

<div id="chat" class="flex-1 overflow-y-auto p-4"></div>

<div class="p-4">
<textarea id="msg" class="input-box"></textarea>
<button onclick="send()" class="btn w-full mt-2">SEND</button>
</div>

</div>

<!-- AUTH MODAL -->
<div id="authModal">
<div class="modal-box">

<div class="flex justify-between">
<span id="authTitle">LOGIN</span>
<button onclick="closeAuth()">✕</button>
</div>

<input id="authUser" class="input-box mt-2" placeholder="Username">
<input id="authPass" type="password" class="input-box mt-2" placeholder="Password">

<button onclick="submitAuth()" class="btn w-full mt-2">Submit</button>
<button onclick="toggleAuth()" class="btn w-full mt-2">Switch</button>

</div>
</div>

<script>

let chats = {};
let currentChat = null;
let currentMode = "thinking";
let authMode = "login";

/* ================= TOKEN FIX ================= */
(function () {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (token) {
        localStorage.setItem("token", token);
        window.history.replaceState({}, document.title, "/");
    }
})();

/* ================= AUTH ================= */
function openAuth(mode){
    authMode = mode;
    authTitle.innerText = mode.toUpperCase();
    authModal.style.display="flex";
}

function closeAuth(){
    authModal.style.display="none";
}

function toggleAuth(){
    authMode = authMode === "login" ? "signup" : "login";
    authTitle.innerText = authMode.toUpperCase();
}

async function submitAuth(){
    const username = authUser.value;
    const password = authPass.value;

    const res = await fetch("/" + authMode,{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:new URLSearchParams({username,password})
    });

    const data = await res.json();

    if(data.success && data.token){
        localStorage.setItem("token", data.token);
        closeAuth();
        alert("Login successful ✅");

    } else if(data.success){
        alert("Signup done. Please login.");

    } else {
        alert(data.msg || "Error");
    }
}

/* ================= CHAT ================= */
function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = {messages:[]};
    render();
}

function render(){
    chat.innerHTML = "";

    chats[currentChat].messages.forEach(m=>{
        const div = document.createElement("div");
        div.className = m.role === "user" ? "user" : "bot";
        div.innerText = m.content;
        chat.appendChild(div);
    });
}

async function send(){
    const text = msg.value;
    if(!text) return;

    const token = localStorage.getItem("token");

    if(!token){
        alert("Login first ⚠️");
        return;
    }

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    msg.value="";

    try{
        const res = await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded",
                "Authorization": "Bearer " + token
            },
            body:new URLSearchParams({
                message:text,
                chat_id:currentChat,
                mode:currentMode
            })
        });

        const data = await res.json();

        chats[currentChat].messages.push({
            role:"bot",
            content:data.response
        });

    } catch(e){
        chats[currentChat].messages.push({
            role:"bot",
            content:"❌ Server error"
        });
    }

    render();
}

/* ================= INIT ================= */
createNewChat();

</script>

</body>
</html>
