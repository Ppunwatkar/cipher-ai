```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
    --glass-bg: rgba(15, 23, 42, 0.6);
    --border-glass: rgba(255,255,255,0.08);
    --primary: #00f2ff;
}

body {
    margin:0;
    background: radial-gradient(circle at top, #0a0f1f, #020617);
    color:#e6edf3;
    font-family: 'Inter', monospace;
}

/* GRID BACKGROUND */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

/* GLASS PANEL */
.glass {
    background: var(--glass-bg);
    backdrop-filter: blur(14px);
    border:1px solid var(--border-glass);
    border-radius:16px;
}

/* SIDEBAR */
.sidebar {
    width:260px;
}

/* BUTTON */
.btn {
    border:1px solid var(--primary);
    padding:10px;
    border-radius:10px;
    color:var(--primary);
    transition:0.3s;
}

.btn:hover {
    background:var(--primary);
    color:black;
    box-shadow:0 0 15px var(--primary);
}

/* INPUT */
.input-box {
    background: rgba(2,6,23,0.7);
    border:1px solid var(--primary);
    padding:10px;
    border-radius:10px;
    width:100%;
    resize:none;
}

/* CHAT */
.bot {
    background: rgba(13,17,23,0.6);
    border-left:3px solid var(--primary);
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.user {
    text-align:right;
    padding:10px;
}

/* BADGE */
.badge {
    padding:6px 14px;
    border-radius:999px;
    border:1px solid var(--primary);
    cursor:pointer;
    transition:0.3s;
}

/* MODAL */
#authModal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
}

.modal-box {
    width:300px;
    padding:20px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar {
        display:none;
    }

    .mobile-nav {
        display:flex;
    }
}
</style>
</head>

<body class="flex flex-col h-screen">

<!-- MOBILE NAV -->
<div class="mobile-nav hidden p-3 glass justify-between items-center">
    <span class="text-cyan-400">CIPHER</span>
    <button onclick="createNewChat()" class="btn">+</button>
</div>

<div class="flex flex-1 overflow-hidden">

    <!-- SIDEBAR -->
    <div class="sidebar glass p-4 flex flex-col justify-between hidden md:flex">
        <div>
            <h1 class="text-cyan-400 text-xl">CIPHER</h1>
            <button onclick="createNewChat()" class="btn mt-3 w-full">+ NEW CHAT</button>
        </div>

        <div>
            <button class="btn w-full" onclick="openAuth('login')">Login</button>
            <button class="btn w-full mt-2" onclick="openAuth('signup')">Sign Up</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col p-3 gap-3">

        <!-- HEADER -->
        <div class="glass p-4 flex justify-between items-center">
            <span>AI SECURITY TERMINAL</span>

            <div class="flex gap-2">
                <span class="badge" data-mode="thinking">THINKING</span>
                <span class="badge" data-mode="fast">FAST</span>
                <span class="badge" data-mode="programming">CODE</span>
            </div>
        </div>

        <!-- CHAT -->
        <div id="chat" class="flex-1 glass p-4 overflow-y-auto"></div>

        <!-- INPUT -->
        <div class="glass p-3 flex gap-2">
            <textarea id="msg" class="input-box flex-1" placeholder="Ask something..."></textarea>
            <button onclick="send()" class="btn px-6">➤</button>
        </div>

    </div>
</div>

<!-- AUTH MODAL -->
<div id="authModal">
<div class="modal-box glass">

<div class="flex justify-between">
<span id="authTitle">LOGIN</span>
<button onclick="closeAuth()">✕</button>
</div>

<input id="authUser" class="input-box mt-2" placeholder="Username">
<input id="authPass" type="password" class="input-box mt-2" placeholder="Password">

<button onclick="submitAuth()" class="btn w-full mt-2">Submit</button>
<button onclick="toggleAuth()" class="btn w-full mt-2">Switch</button>

<hr class="my-3">

<button onclick="googleLogin()" class="btn w-full">
Continue with Google
</button>

</div>
</div>

<script>
let chats = {};
let currentChat = null;
let currentMode = "thinking";
let authMode = "login";

/* TOKEN HANDLER */
(function () {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (token) {
        localStorage.setItem("token", token);
        window.history.replaceState({}, document.title, "/");
    }
})();

/* AUTH */
function openAuth(mode){
    authMode = mode;
    authTitle.innerText = mode.toUpperCase();
    authModal.style.display="flex";
}

function closeAuth(){
    authModal.style.display="none";
}

function toggleAuth(){
    authMode = authMode === "login" ? "signup" : "login";
    authTitle.innerText = authMode.toUpperCase();
}

async function submitAuth(){
    const username = authUser.value;
    const password = authPass.value;

    const res = await fetch("/" + authMode,{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:new URLSearchParams({username,password})
    });

    const data = await res.json();

    if(data.success && data.token){
        localStorage.setItem("token", data.token);
        closeAuth();
        alert("Login success ✅");
    } else if(data.success){
        alert("Signup successful. Now login.");
    } else {
        alert(data.msg || "Error");
    }
}

function googleLogin(){
    window.location.href = "/auth/google";
}

/* CHAT */
function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = {messages:[]};
    render();
}

function render(){
    chat.innerHTML = "";

    chats[currentChat].messages.forEach(m=>{
        const div = document.createElement("div");
        div.className = m.role === "user" ? "user" : "bot";
        div.innerText = m.content;
        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

async function send(){
    const text = msg.value;
    if(!text) return;

    const token = localStorage.getItem("token");

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    msg.value="";

    try{
        const res = await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded",
                ...(token && { "Authorization": "Bearer " + token })
            },
            body:new URLSearchParams({
                message:text,
                chat_id:currentChat,
                mode:currentMode
            })
        });

        const data = await res.json();

        chats[currentChat].messages.push({
            role:"bot",
            content:data.response || "⚠️ No response"
        });

    } catch(e){
        chats[currentChat].messages.push({
            role:"bot",
            content:"❌ Server error"
        });
    }

    render();
}

/* MODE SWITCH */
document.querySelectorAll('.badge').forEach(b=>{
  b.onclick = ()=>{
    currentMode = b.dataset.mode;
    document.querySelectorAll('.badge').forEach(x=>x.style.background="transparent");
    b.style.background="#00f2ff33";
  }
});

/* INIT */
createNewChat();
</script>

</body>
</html>
