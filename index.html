<script>
let chats = {};
let currentChat = null;
let currentMode = "thinking";

document.addEventListener("DOMContentLoaded", async () => {

    try {
        await loadChats();   // safe call
    } catch(e){
        console.log("⚠️ No chats yet");
    }

    document.querySelectorAll(".badge").forEach(el=>{
        el.onclick = () => {
            currentMode = el.dataset.mode;
            document.querySelectorAll(".badge").forEach(b=>b.classList.remove("bg-cyan-400"));
            el.classList.add("bg-cyan-400");
        }
    });

    createNewChat(); // ALWAYS create fallback chat
});

function getModelLabel(model){
    if(model === "programming") return "DOLPHIN";
    if(model === "fast" || model === "thinking") return "GROQ";
    return "CIPHER";
}

/* 🔥 SAFE LOAD CHATS */
async function loadChats(){
    const token = localStorage.getItem("token");

    if(!token) return; // ✅ prevents crash

    const res = await fetch("/chats", {
        headers:{ token }
    });

    if(!res.ok) return;

    const data = await res.json();

    if(!Array.isArray(data)) return;

    data.forEach(c=>{
        chats[c.id] = { title:"Chat", messages:[] };
    });

    renderList();
}

/* 🔥 SAFE CHAT CLICK */
async function loadChatMessages(id){
    try{
        const res = await fetch(`/chat/${id}`, {
            headers:{ token: localStorage.getItem("token") }
        });

        const data = await res.json();

        chats[id].messages = (data.messages || []).map(m=>({
            role:m.role,
            content:m.content,
            model:"thinking"
        }));

        render();
    }catch(e){
        console.log("Error loading chat");
    }
}

function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = { title:"New Chat", messages:[] };
    renderList();
    render();
}

function renderList(){
    const list = document.getElementById("chatList");
    list.innerHTML="";

    Object.keys(chats).forEach(id=>{
        const div = document.createElement("div");
        div.className="chat-item";
        div.innerText=chats[id].title;

        div.onclick = ()=>{
            currentChat=id;
            loadChatMessages(id);
        };

        list.appendChild(div);
    });
}

/* 🔥 SAFE FORMAT */
function formatMessage(content){
    if(!content) return "";

    const parts = content.split("```");

    return parts.map((p,i)=>{
        if(i%2===1){
            return `<div class="code-block">
                <button class="copy-btn" onclick="copyCode(this)">COPY</button>
                <pre>${p}</pre>
            </div>`;
        }
        return `<div>${p}</div>`;
    }).join("");
}

function copyCode(btn){
    const code = btn.parentElement.querySelector("pre").innerText;
    navigator.clipboard.writeText(code);
    btn.innerText="COPIED";
    setTimeout(()=>btn.innerText="COPY",1000);
}

/* 🔥 SAFE RENDER */
function render(){
    const chat = document.getElementById("chat");

    if(!currentChat || !chats[currentChat]){
        chat.innerHTML = "<div>No chat selected</div>";
        return;
    }

    chat.innerHTML="";

    chats[currentChat].messages.forEach(m=>{
        const div=document.createElement("div");
        div.className=m.role==="user"?"user":"bot";

        if(m.role==="bot"){
            const tag=document.createElement("div");
            tag.className="model-tag";
            tag.innerText=getModelLabel(m.model);
            div.appendChild(tag);
        }

        const text=document.createElement("div");
        text.innerHTML=formatMessage(m.content);

        div.appendChild(text);
        chat.appendChild(div);
    });

    chat.scrollTop=chat.scrollHeight;
}

async function send(){
    const input=document.getElementById("msg");
    if(!input.value.trim()) return;

    const text=input.value;

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    input.value="";

    try{
        const res=await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded",
                token: localStorage.getItem("token") || ""
            },
            body:new URLSearchParams({
                message:text,
                chat_id:currentChat,
                mode:currentMode
            })
        });

        const data=await res.json();

        chats[currentChat].messages.push({
            role:"bot",
            content:data.response,
            model:data.model
        });

    }catch{
        chats[currentChat].messages.push({
            role:"bot",
            content:"❌ Backend error",
            model:"error"
        });
    }

    render();
}
</script>
