<script>

let chats = {};
let currentChat = null;
let currentMode = "live";

// INIT
function init(){
    createNewChat();
}

// MODE SWITCH
document.querySelectorAll(".badge").forEach(el=>{
    el.onclick = () => {
        currentMode = el.innerText.toLowerCase();
        document.querySelectorAll(".badge").forEach(b=>b.classList.remove("bg-cyan-400"));
        el.classList.add("bg-cyan-400");
    }
});

// NEW CHAT
function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = [];
    renderList();
    render();
}

// LIST
function renderList(){
    const list = document.getElementById("chatList");
    list.innerHTML = "";

    Object.keys(chats).forEach(id=>{
        const d = document.createElement("div");
        d.className="chat-item cursor-pointer hover:text-cyan-400";
        d.innerText=id;
        d.onclick=()=>{currentChat=id; render();}
        list.appendChild(d);
    });
}

// RENDER
function render(){
    const chat = document.getElementById("chat");
    chat.innerHTML="";

    (chats[currentChat]||[]).forEach(m=>{
        const d=document.createElement("div");
        d.className = m.role==="user"?"user":"bot";
        d.innerText = m.content;
        chat.appendChild(d);
    });

    chat.scrollTop = chat.scrollHeight;
}

// SEND
async function send(){
    const input = document.getElementById("msg");
    if(!input.value.trim()) return;

    const text = input.value.trim();

    chats[currentChat].push({role:"user",content:text});
    render();

    input.value="";

    const botDiv = document.createElement("div");
    botDiv.className="bot";
    botDiv.innerText=">> Processing...";
    document.getElementById("chat").appendChild(botDiv);

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({
                message: text,
                chat_id: currentChat,
                mode: currentMode
            })
        });

        const data = await res.json();

        botDiv.innerText = data.response;

        chats[currentChat].push({
            role:"bot",
            content:data.response
        });

    } catch(e){
        botDiv.innerText = "❌ Backend error";
    }
}

init();

</script>
