```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
    --cyan:#00f2ff;
    --purple:#8b5cf6;
    --blue:#3b82f6;
}

/* BASE */
body {
    margin:0;
    color:#e6edf3;
    font-family:'Inter', monospace;
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617 70%);
    overflow:hidden;
}

/* CYBER GRID + NOISE */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,0.04) 1px, transparent 1px);
    background-size:60px 60px;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 80% 20%, rgba(139,92,246,0.15), transparent 40%);
    z-index:-1;
}

/* GLASS */
.glass {
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

/* SIDEBAR */
.sidebar {
    width:260px;
}

/* BUTTON */
.btn {
    border:1px solid var(--cyan);
    padding:10px;
    border-radius:12px;
    color:var(--cyan);
    transition:0.3s;
}

.btn:hover {
    background:linear-gradient(45deg,var(--cyan),var(--purple));
    color:black;
    box-shadow:0 0 20px var(--cyan);
}

/* INPUT */
.input-box {
    background: rgba(2,6,23,0.8);
    border:1px solid rgba(255,255,255,0.1);
    padding:12px;
    border-radius:12px;
    width:100%;
    color:white;
}

/* CHAT */
.bot {
    background: linear-gradient(135deg, rgba(0,242,255,0.1), rgba(139,92,246,0.1));
    border-left:3px solid var(--cyan);
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    animation:fadeIn 0.3s ease;
}

.user {
    text-align:right;
    padding:12px;
    color:#93c5fd;
    animation:fadeIn 0.3s ease;
}

/* BADGES */
.badge {
    padding:6px 14px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.2);
    cursor:pointer;
    transition:0.3s;
}

.badge:hover {
    background:rgba(255,255,255,0.1);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* MODAL */
#authModal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    justify-content:center;
    align-items:center;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar {display:none;}
    .mobile-nav {display:flex;}
}
</style>
</head>

<body class="flex flex-col h-screen">

<!-- MOBILE NAV -->
<div class="mobile-nav hidden p-3 glass justify-between items-center">
    <span class="text-cyan-400 font-bold">CIPHER</span>
    <button onclick="createNewChat()" class="btn">+</button>
</div>

<div class="flex flex-1 overflow-hidden">

    <!-- SIDEBAR -->
    <div class="sidebar glass p-4 flex flex-col justify-between hidden md:flex">
        <div>
            <h1 class="text-cyan-400 text-xl font-bold">CIPHER</h1>
            <p class="text-xs opacity-60">AI Cyber Assistant</p>

            <button onclick="createNewChat()" class="btn mt-4 w-full">+ NEW CHAT</button>
        </div>

        <div>
            <button class="btn w-full" onclick="openAuth('login')">Login</button>
            <button class="btn w-full mt-2" onclick="openAuth('signup')">Sign Up</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col p-3 gap-3">

        <!-- HEADER -->
        <div class="glass p-4 flex justify-between items-center">
            <span class="font-semibold tracking-wide">
                ⚡ AI SECURITY CORE
            </span>

            <div class="flex gap-2">
                <span class="badge" data-mode="thinking">THINK</span>
                <span class="badge" data-mode="fast">FAST</span>
                <span class="badge" data-mode="programming">CODE</span>
            </div>
        </div>

        <!-- CHAT -->
        <div id="chat" class="flex-1 glass p-4 overflow-y-auto"></div>

        <!-- INPUT -->
        <div class="glass p-3 flex gap-2">
            <textarea id="msg" class="input-box flex-1" placeholder="Ask about security, exploits, tools..."></textarea>
            <button onclick="send()" class="btn px-6">➤</button>
        </div>

    </div>
</div>

<!-- AUTH MODAL -->
<div id="authModal">
<div class="glass p-6 w-80">

<div class="flex justify-between">
<span id="authTitle">LOGIN</span>
<button onclick="closeAuth()">✕</button>
</div>

<input id="authUser" class="input-box mt-3" placeholder="Username">
<input id="authPass" type="password" class="input-box mt-2" placeholder="Password">

<button onclick="submitAuth()" class="btn w-full mt-3">Submit</button>
<button onclick="toggleAuth()" class="btn w-full mt-2">Switch</button>

<hr class="my-3">

<button onclick="googleLogin()" class="btn w-full">
Continue with Google
</button>

</div>
</div>

<script>
let chats = {};
let currentChat = null;
let currentMode = "thinking";
let authMode = "login";

(function () {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    if (token) {
        localStorage.setItem("token", token);
        window.history.replaceState({}, document.title, "/");
    }
})();

function openAuth(mode){
    authMode = mode;
    authTitle.innerText = mode.toUpperCase();
    authModal.style.display="flex";
}

function closeAuth(){ authModal.style.display="none"; }

function toggleAuth(){
    authMode = authMode === "login" ? "signup" : "login";
    authTitle.innerText = authMode.toUpperCase();
}

async function submitAuth(){
    const res = await fetch("/" + authMode,{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:new URLSearchParams({username:authUser.value,password:authPass.value})
    });

    const data = await res.json();

    if(data.success && data.token){
        localStorage.setItem("token", data.token);
        closeAuth();
        alert("Login success ✅");
    } else if(data.success){
        alert("Signup successful");
    } else alert("Error");
}

function googleLogin(){ window.location.href="/auth/google"; }

function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = {messages:[]};
    render();
}

function render(){
    chat.innerHTML="";
    chats[currentChat].messages.forEach(m=>{
        const div=document.createElement("div");
        div.className = m.role==="user"?"user":"bot";
        div.innerText=m.content;
        chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
}

async function send(){
    const text = msg.value;
    if(!text) return;

    const token = localStorage.getItem("token");

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    msg.value="";

    try{
        const res = await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded",
                ...(token && {"Authorization":"Bearer "+token})
            },
            body:new URLSearchParams({
                message:text,
                chat_id:currentChat,
                mode:currentMode
            })
        });

        const data = await res.json();

        chats[currentChat].messages.push({
            role:"bot",
            content:data.response || "⚠️ No response"
        });

    }catch{
        chats[currentChat].messages.push({
            role:"bot",
            content:"❌ Server error"
        });
    }

    render();
}

document.querySelectorAll('.badge').forEach(b=>{
    b.onclick=()=>{
        currentMode=b.dataset.mode;
        document.querySelectorAll('.badge').forEach(x=>x.style.background="transparent");
        b.style.background="linear-gradient(45deg,#00f2ff,#8b5cf6)";
    }
});

createNewChat();
</script>

</body>
</html>
