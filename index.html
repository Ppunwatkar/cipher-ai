<script>
let chats = {};
let currentChat = null;
let currentMode = "thinking";

let token = localStorage.getItem("token");

// =====================
// USER NAME DISPLAY
// =====================
function getUser(){
    try{
        const data = JSON.parse(atob(token.split('.')[1]));
        return data.username;
    }catch{
        return "Guest";
    }
}

document.addEventListener("DOMContentLoaded", () => {

    const urlParams = new URLSearchParams(window.location.search);
    const newToken = urlParams.get("token");

    if(newToken){
        localStorage.setItem("token", newToken);
        window.location.href="/";
    }

    document.getElementById("userName").innerText = getUser();

    createNewChat();

    document.querySelectorAll(".badge").forEach(el=>{
        el.onclick = ()=>{
            currentMode = el.dataset.mode;
            document.querySelectorAll(".badge").forEach(b=>b.classList.remove("bg-cyan-400"));
            el.classList.add("bg-cyan-400");
        }
    });
});

// =====================
// CHAT FUNCTIONS
// =====================
function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = {title:"New Chat", messages:[], pinned:false};
    renderList();
    render();
}

function renderList(){
    const list = document.getElementById("chatList");
    list.innerHTML = "";

    Object.keys(chats)
    .sort((a,b)=>chats[b].pinned - chats[a].pinned)
    .forEach(id=>{
        const div = document.createElement("div");
        div.className="chat-item";
        div.innerText = chats[id].title;

        div.onclick = ()=>{
            currentChat=id;
            render();
        };

        list.appendChild(div);
    });
}

function send(){
    const input = document.getElementById("msg");
    if(!input.value.trim()) return;

    const text = input.value;

    chats[currentChat].messages.push({role:"user",content:text});
    
    if(chats[currentChat].title==="New Chat"){
        chats[currentChat].title = text.substring(0,25);
    }

    render();
    input.value="";

    fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded",
            token:localStorage.getItem("token")
        },
        body:new URLSearchParams({
            message:text,
            chat_id:currentChat,
            mode:currentMode
        })
    })
    .then(res=>res.json())
    .then(data=>{
        chats[currentChat].messages.push({
            role:"bot",
            content:data.response,
            model:data.model
        });
        render();
    });
}

// =====================
// SEARCH
// =====================
function searchChat(val){
    document.querySelectorAll(".chat-item").forEach(item=>{
        item.style.display = item.innerText.toLowerCase().includes(val.toLowerCase()) ? "block":"none";
    });
}

// =====================
// RENDER
// =====================
function render(){
    const chat=document.getElementById("chat");
    chat.innerHTML="";

    chats[currentChat].messages.forEach(m=>{
        const div=document.createElement("div");
        div.className = m.role==="user"?"user":"bot";

        if(m.role==="bot"){
            const tag=document.createElement("div");
            tag.className="model-tag";
            tag.innerText = m.model==="programming"?"DOLPHIN":"GROQ";
            div.appendChild(tag);
        }

        const text=document.createElement("div");
        text.innerText=m.content;

        div.appendChild(text);
        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}
</script>
