<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#04070d;
    color:#e6edf3;
    font-family: 'Inter', monospace;
}

/* GRID BACKGROUND */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index:-1;
}

/* CHAT LAYOUT FIX */
#chat {
    display:flex;
    flex-direction:column;
    gap:16px;
    max-width:900px;
    margin:auto;
    width:100%;
}

/* MESSAGE STYLING */
.bot, .user {
    padding:16px;
    border-radius:12px;
    max-width:70%;
    animation: fadeIn 0.2s ease-in;
}

/* LEFT ALIGN BOT */
.bot {
    background:#0d1117;
    border-left:4px solid #00f2ff;
    align-self:flex-start;
}

/* RIGHT ALIGN USER */
.user {
    background:#020617;
    align-self:flex-end;
}

/* MODEL TAG */
.model-tag {
    font-size:12px;
    color:#00f2ff;
    margin-bottom:6px;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(6px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body class="flex h-screen overflow-hidden">

<div class="flex-1 flex flex-col">

<div class="p-4 border-b border-gray-800 flex justify-between">
<span class="text-cyan-400 text-lg">RESEARCH TERMINAL</span>

<div class="flex gap-3">
<span class="badge bg-cyan-400 px-3 py-1 cursor-pointer" data-mode="thinking">THINKING</span>
<span class="badge px-3 py-1 border border-cyan-400 cursor-pointer" data-mode="fast">FAST</span>
<span class="badge px-3 py-1 border border-cyan-400 cursor-pointer" data-mode="programming">PROGRAMMING</span>
</div>
</div>

<div id="chat" class="flex-1 p-8 overflow-y-auto"></div>

<div class="p-6">
<textarea id="msg" class="w-full p-4 bg-black border border-cyan-400" placeholder="Ask..." rows="2"></textarea>
<button onclick="send()" class="w-full mt-3 border border-cyan-400 p-3">SEND ▶</button>
</div>

</div>

<script>
let chats = {};
let currentChat = "chat1";
let currentMode = "thinking";

chats[currentChat] = {messages: []};

/* MODE SWITCH */
document.querySelectorAll(".badge").forEach(el=>{
    el.onclick = () => {
        currentMode = el.dataset.mode;
        document.querySelectorAll(".badge").forEach(b=>b.classList.remove("bg-cyan-400"));
        el.classList.add("bg-cyan-400");
    }
});

/* MODEL NAME LOGIC */
function getModelName(){
    if(currentMode === "programming") return "DOLPHIN";
    return "GROQ";
}

/* RENDER CHAT */
function render(){
    const chat = document.getElementById("chat");
    chat.innerHTML="";

    chats[currentChat].messages.forEach(m=>{
        const div = document.createElement("div");
        div.className = m.role==="user" ? "user" : "bot";

        if(m.role === "bot"){
            const model = document.createElement("div");
            model.className = "model-tag";
            model.innerText = getModelName();
            div.appendChild(model);
        }

        const text = document.createElement("div");
        text.innerText = m.content;
        div.appendChild(text);

        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

/* SEND */
async function send(){
    const input = document.getElementById("msg");
    if(!input.value.trim()) return;

    const text = input.value;

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    input.value="";

    try {
        const res = await fetch("https://cipher-ai-production.up.railway.app/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body:new URLSearchParams({
                message:text,
                chat_id:currentChat,
                mode:currentMode
            })
        });

        const data = await res.json();

        chats[currentChat].messages.push({
            role:"bot",
            content:data.response
        });

    } catch(err){
        chats[currentChat].messages.push({
            role:"bot",
            content:"❌ Backend error"
        });
    }

    render();
}
</script>

</body>
</html>
