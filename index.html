<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cypher AI</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #020617;
    color: #00ffff;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: #020617;
    border-right: 1px solid #0ff;
    padding: 20px;
}

.sidebar h2 {
    color: #00ffff;
}

.new-chat {
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #0ff;
    cursor: pointer;
    text-align: center;
}

/* Main */
.main {
    flex: 1;
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    padding: 10px;
    border-bottom: 1px solid #0ff;
    display: flex;
    justify-content: space-between;
}

/* Modes */
.modes button {
    margin-left: 10px;
    padding: 5px 10px;
    border: 1px solid #0ff;
    background: transparent;
    color: #0ff;
    cursor: pointer;
}

.modes .active {
    background: #0ff;
    color: black;
}

/* Chat Area */
.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* Input */
.input-area {
    padding: 10px;
    border-top: 1px solid #0ff;
}

textarea {
    width: 100%;
    padding: 10px;
    background: #020617;
    color: #0ff;
    border: 1px solid #0ff;
}

button.send {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: #0ff;
    color: black;
    border: none;
}

/* Grid background */
.main::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(#0ff 1px, transparent 1px),
                      linear-gradient(90deg, #0ff 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.05;
    z-index: 0;
}

.chat, .header, .input-area {
    position: relative;
    z-index: 1;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>CYPHER</h2>
    <p>CYBERSECURITY AI</p>

    <div class="new-chat">+ NEW CHAT</div>
</div>

<div class="main">

    <div class="header">
        <div>RESEARCH TERMINAL</div>

        <div class="modes">
            <button class="active" onclick="setMode(event, 'thinking')">THINKING</button>
            <button onclick="setMode(event, 'fast')">FAST</button>
            <button onclick="setMode(event, 'programming')">PROGRAMMING</button>
        </div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Ask about exploits, recon, CTFs..."></textarea>
        <button class="send" onclick="sendMessage()">SEND ▶</button>
    </div>

</div>

<script>
let mode = "thinking";
let chat_id = localStorage.getItem("chat_id") || Date.now().toString();
localStorage.setItem("chat_id", chat_id);

function setMode(event, selectedMode) {
    mode = selectedMode;

    document.querySelectorAll(".modes button").forEach(btn => {
        btn.classList.remove("active");
    });

    event.target.classList.add("active");
}

function addMessage(text) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.textContent = text;
    chat.appendChild(div);
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text) return;

    addMessage("You: " + text);
    input.value = "";

    const formData = new FormData();
    formData.append("message", text);
    formData.append("chat_id", chat_id);
    formData.append("mode", mode);

    const res = await fetch("/chat", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    addMessage("AI: " + data.response);
}
</script>

</body>
</html>
