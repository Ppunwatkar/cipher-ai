<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
    --primary:#8b5cf6;
    --accent:#6366f1;
    --bg:#020617;
}

/* BASE */
body {
    margin:0;
    color:#e5e7eb;
    font-family:'Inter', monospace;
    background:
        radial-gradient(circle at 20% 20%, rgba(139,92,246,0.15), transparent 40%),
        radial-gradient(circle at 80% 10%, rgba(99,102,241,0.12), transparent 40%),
        #020617;
    overflow:hidden;
}

/* GRID TEXTURE */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(139,92,246,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
    background-size:60px 60px;
    z-index:-1;
}

/* GLASS */
.glass {
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* SIDEBAR */
.sidebar {
    width:260px;
}

/* BUTTON */
.btn {
    border:1px solid var(--primary);
    padding:10px;
    border-radius:12px;
    color:var(--primary);
    transition:0.25s ease;
}

.btn:hover {
    background:linear-gradient(45deg,var(--primary),var(--accent));
    color:white;
    box-shadow:0 0 12px rgba(139,92,246,0.35);
}

/* INPUT */
.input-box {
    background: rgba(2,6,23,0.8);
    border:1px solid rgba(255,255,255,0.08);
    padding:12px;
    border-radius:12px;
    width:100%;
    color:white;
}

/* CHAT */
.bot {
    background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(99,102,241,0.08));
    border-left:3px solid var(--primary);
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    animation:fadeIn 0.3s ease;
}

.user {
    text-align:right;
    padding:12px;
    color:#c4b5fd;
    animation:fadeIn 0.3s ease;
}

/* BADGE */
.badge {
    padding:6px 14px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.12);
    cursor:pointer;
    transition:0.2s;
}

.badge.active {
    background: rgba(139,92,246,0.2);
    border-color: var(--primary);
}

/* HEADER */
.header-title {
    letter-spacing:1px;
    font-weight:600;
    color:#ddd6fe;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(8px);}
    to {opacity:1; transform:translateY(0);}
}

/* MODAL */
#authModal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    justify-content:center;
    align-items:center;
}

/* RESPONSIVE */
@media (max-width:768px){
    .sidebar{display:none;}
    .mobile-nav{display:flex;}
}
</style>
</head>

<body class="flex flex-col h-screen">

<!-- MOBILE NAV -->
<div class="mobile-nav hidden p-3 glass justify-between items-center">
    <span class="text-purple-300 font-bold">CIPHER</span>
    <button onclick="createNewChat()" class="btn">+</button>
</div>

<div class="flex flex-1 overflow-hidden">

    <!-- SIDEBAR -->
    <div class="sidebar glass p-4 flex flex-col justify-between hidden md:flex">
        <div>
            <h1 class="text-purple-300 text-xl font-bold">CIPHER</h1>
            <p class="text-xs opacity-60">AI Cyber Assistant</p>

            <button onclick="createNewChat()" class="btn mt-4 w-full">+ NEW CHAT</button>
        </div>

        <div>
            <button class="btn w-full" onclick="openAuth('login')">Login</button>
            <button class="btn w-full mt-2" onclick="openAuth('signup')">Sign Up</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col p-3 gap-3">

        <!-- HEADER -->
        <div class="glass p-4 flex justify-between items-center">
            <span class="header-title">⚡ AI SECURITY CORE</span>

            <div class="flex gap-2">
                <span class="badge active" data-mode="thinking">THINK</span>
                <span class="badge" data-mode="fast">FAST</span>
                <span class="badge" data-mode="programming">CODE</span>
            </div>
        </div>

        <!-- CHAT -->
        <div id="chat" class="flex-1 glass p-4 overflow-y-auto"></div>

        <!-- INPUT -->
        <div class="glass p-3 flex gap-2">
            <textarea id="msg" class="input-box flex-1" placeholder="Ask about cybersecurity, tools, exploits..."></textarea>
            <button onclick="send()" class="btn px-6">➤</button>
        </div>

    </div>
</div>

<!-- AUTH MODAL -->
<div id="authModal">
<div class="glass p-6 w-80">

<div class="flex justify-between">
<span id="authTitle">LOGIN</span>
<button onclick="closeAuth()">✕</button>
</div>

<input id="authUser" class="input-box mt-3" placeholder="Username">
<input id="authPass" type="password" class="input-box mt-2" placeholder="Password">

<button onclick="submitAuth()" class="btn w-full mt-3">Submit</button>
<button onclick="toggleAuth()" class="btn w-full mt-2">Switch</button>

<hr class="my-3">

<button onclick="googleLogin()" class="btn w-full">
Continue with Google
</button>

</div>
</div>

<script>
let chats = {};
let currentChat = null;
let currentMode = "thinking";
let authMode = "login";

/* TOKEN */
(function () {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    if (token) {
        localStorage.setItem("token", token);
        window.history.replaceState({}, document.title, "/");
    }
})();

/* AUTH */
function openAuth(mode){
    authMode = mode;
    authTitle.innerText = mode.toUpperCase();
    authModal.style.display="flex";
}

function closeAuth(){ authModal.style.display="none"; }

function toggleAuth(){
    authMode = authMode === "login" ? "signup" : "login";
    authTitle.innerText = authMode.toUpperCase();
}

async function submitAuth(){
    const res = await fetch("/" + authMode,{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:new URLSearchParams({
            username:authUser.value,
            password:authPass.value
        })
    });

    const data = await res.json();

    if(data.success && data.token){
        localStorage.setItem("token", data.token);
        closeAuth();
        alert("Login success ✅");
    } else if(data.success){
        alert("Signup successful");
    } else alert("Error");
}

function googleLogin(){ window.location.href="/auth/google"; }

/* CHAT */
function createNewChat(){
    currentChat = "chat_" + Date.now();
    chats[currentChat] = {messages:[]};
    render();
}

function render(){
    chat.innerHTML="";
    chats[currentChat].messages.forEach(m=>{
        const div=document.createElement("div");
        div.className = m.role==="user"?"user":"bot";
        div.innerText=m.content;
        chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
}

async function send(){
    const text = msg.value;
    if(!text) return;

    const token = localStorage.getItem("token");

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    msg.value="";

    try{
        const res = await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded",
                ...(token && {"Authorization":"Bearer "+token})
            },
            body:new URLSearchParams({
                message:text,
                chat_id:currentChat,
                mode:currentMode
            })
        });

        const data = await res.json();

        chats[currentChat].messages.push({
            role:"bot",
            content:data.response || "⚠️ No response"
        });

    }catch{
        chats[currentChat].messages.push({
            role:"bot",
            content:"❌ Server error"
        });
    }

    render();
}

/* MODE SWITCH */
document.querySelectorAll('.badge').forEach(b=>{
    b.onclick=()=>{
        currentMode=b.dataset.mode;
        document.querySelectorAll('.badge').forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
    }
});

createNewChat();
</script>

</body>
</html>
