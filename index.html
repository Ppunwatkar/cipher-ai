<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#04070d;
    color:#c9d1d9;
    font-family: 'Courier New', monospace;
}

body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index:-1;
}

.sidebar { width:260px; background:#0b0f17; border-right:1px solid #1f2937; }
.header { background:#0b0f17; border-bottom:1px solid #1f2937; }

.badge { padding:2px 8px; font-size:10px; border:1px solid; cursor:pointer; }

.bot {
    border-left:3px solid #00f2ff;
    background:#0d1117;
    padding:12px;
    margin-top:10px;
    white-space: pre-wrap;
}

.user {
    text-align:right;
    margin-top:10px;
    white-space: pre-wrap;
}

.input-box {
    background:#04070d;
    border:1px solid #00f2ff;
    box-shadow:0 0 10px rgba(0,255,255,0.2);
}

.btn { border:1px solid #00f2ff; padding:10px; }

/* CHAT LIST */
.chat-item {
    display:flex;
    justify-content:space-between;
    padding:4px;
    cursor:pointer;
}

.chat-actions {
    display:none;
    gap:5px;
}

.chat-item:hover .chat-actions {
    display:flex;
}

.chat-actions span {
    font-size:10px;
    cursor:pointer;
}

/* CODE BLOCK */
.code-block {
    background:#020617;
    border:1px solid #1f2937;
    border-radius:8px;
    padding:12px;
    margin-top:10px;
    position:relative;
}

.copy-btn {
    position:absolute;
    top:6px;
    right:6px;
    background:#0b0f17;
    border:1px solid #374151;
    border-radius:6px;
    padding:4px;
    cursor:pointer;
    opacity:0;
}

.code-block:hover .copy-btn {
    opacity:1;
}
</style>
</head>

<body class="flex h-screen overflow-hidden">

<div class="sidebar p-5 flex flex-col">
<h1 class="text-cyan-400 text-xl font-bold">CIPHER</h1>
<p class="text-xs text-gray-500 mb-6">CYBERSECURITY AI</p>

<button onclick="createNewChat()" class="btn text-xs">+ NEW CHAT</button>
<div id="chatList" class="mt-4 text-xs overflow-y-auto"></div>
</div>

<div class="flex-1 flex flex-col">

<div class="header p-3 flex justify-between text-xs">
<span class="text-cyan-400">RESEARCH TERMINAL</span>

<div class="flex gap-2">
<span class="badge" data-mode="live">LIVE</span>
<span class="badge" data-mode="llama">LLAMA</span>
<span class="badge" data-mode="unrestricted">UNRESTRICTED</span>
</div>
</div>

<div id="chat" class="flex-1 p-6 overflow-y-auto"></div>

<div class="p-4 flex gap-2">
<input id="msg" class="flex-1 input-box px-3 py-2 text-sm"
placeholder="Ask something..."
onkeypress="if(event.key==='Enter') send()">

<button onclick="send()" class="btn">SEND ▶</button>
</div>

</div>

<script>

let chats = {};
let currentChat = null;
let currentMode = "live";

document.addEventListener("DOMContentLoaded", () => {

    document.querySelectorAll(".badge").forEach(el=>{
        el.onclick = () => {
            currentMode = el.dataset.mode;
        }
    });

    createNewChat();
});

// NEW CHAT
function createNewChat(){
    currentChat = "chat_" + Date.now();

    chats[currentChat] = {
        title: "New Chat",
        messages: []
    };

    renderList();
    render();
}

// CHAT LIST
function renderList(){
    const list = document.getElementById("chatList");
    list.innerHTML = "";

    Object.keys(chats).forEach(id=>{
        const wrapper = document.createElement("div");
        wrapper.className = "chat-item";

        const name = document.createElement("span");
        name.innerText = chats[id].title;

        name.onclick = ()=>{
            currentChat = id;
            render();
        };

        const actions = document.createElement("div");
        actions.className = "chat-actions";

        // rename
        const r = document.createElement("span");
        r.innerText = "✏️";
        r.onclick = (e)=>{
            e.stopPropagation();
            const n = prompt("Rename chat", chats[id].title);
            if(n){
                chats[id].title = n;
                renderList();
            }
        };

        // delete
        const d = document.createElement("span");
        d.innerText = "🗑";
        d.onclick = (e)=>{
            e.stopPropagation();
            delete chats[id];
            currentChat = Object.keys(chats)[0];
            renderList();
            render();
        };

        // share
        const s = document.createElement("span");
        s.innerText = "🔗";
        s.onclick = (e)=>{
            e.stopPropagation();

            const text = chats[id].messages
                .map(m=>`${m.role}: ${m.content}`)
                .join("\n\n");

            navigator.clipboard.writeText(text);
            alert("Copied!");
        };

        actions.appendChild(r);
        actions.appendChild(d);
        actions.appendChild(s);

        wrapper.appendChild(name);
        wrapper.appendChild(actions);

        list.appendChild(wrapper);
    });
}

// RENDER CHAT
function render(){
    const chat = document.getElementById("chat");
    chat.innerHTML="";

    (chats[currentChat]?.messages || []).forEach(m=>{
        const div = document.createElement("div");
        div.className = m.role==="user"?"user":"bot";
        div.innerText = m.content;
        chat.appendChild(div);
    });
}

// SEND
async function send(){
    const input = document.getElementById("msg");
    if(!input.value.trim()) return;

    const text = input.value;

    chats[currentChat].messages.push({role:"user",content:text});

    // auto title
    if(chats[currentChat].messages.length === 1){
        chats[currentChat].title = text.slice(0,20);
        renderList();
    }

    render();
    input.value="";

    const res = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:new URLSearchParams({
            message:text,
            chat_id:currentChat,
            mode:currentMode
        })
    });

    const data = await res.json();

    chats[currentChat].messages.push({
        role:"bot",
        content:data.response
    });

    render();
}

</script>

</body>
</html>
