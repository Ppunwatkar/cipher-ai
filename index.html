\<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#04070d;
    color:#e6edf3;
    font-family: 'Inter', monospace;
}

/* EXISTING STYLES KEEP SAME */
#chat {
    display:flex;
    flex-direction:column;
    gap:14px;
    max-width:900px;
    margin:auto;
}

.bot, .user {
    padding:18px;
    border-radius:10px;
    max-width:75%;
}

.bot {
    background:#0d1117;
    border-left:4px solid #00f2ff;
    align-self:flex-start;
}

.user {
    background:#020617;
    align-self:flex-end;
}

/* 🔥 CODE BLOCK STYLE */
.code-block {
    background:#020617;
    border:1px solid #00f2ff;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    position:relative;
    font-size:14px;
    overflow-x:auto;
}

/* 🔥 COPY BUTTON */
.copy-btn {
    position:absolute;
    top:6px;
    right:6px;
    background:#00f2ff;
    color:#000;
    font-size:12px;
    padding:4px 8px;
    border-radius:4px;
    cursor:pointer;
}
</style>
</head>

<body class="flex h-screen overflow-hidden">

<div class="flex-1 flex flex-col">

<div class="p-4 border-b border-gray-800 flex justify-between">
<span class="text-cyan-400">RESEARCH TERMINAL</span>

<div class="flex gap-3">
<span class="badge bg-cyan-400" data-mode="thinking">THINKING</span>
<span class="badge" data-mode="fast">FAST</span>
<span class="badge" data-mode="programming">PROGRAMMING</span>
</div>
</div>

<div id="chat" class="flex-1 p-8 overflow-y-auto"></div>

<div class="p-6">
<textarea id="msg" class="w-full p-4 bg-black border border-cyan-400" rows="2"></textarea>
<button onclick="send()" class="w-full mt-3 border border-cyan-400 p-3">SEND ▶</button>
</div>

</div>

<script>
let chats = {};
let currentChat = "chat1";
let currentMode = "thinking";

chats[currentChat] = {messages: []};

function getModelLabel(model){
    if(model === "programming") return "DOLPHIN";
    if(model === "fast" || model === "thinking") return "GROQ";
    return "CIPHER";
}

/* 🔥 PARSE CODE BLOCKS */
function formatMessage(content){
    const parts = content.split("```");

    return parts.map((part, i)=>{
        if(i % 2 === 1){
            return `
            <div class="code-block">
                <button class="copy-btn" onclick="copyCode(this)">COPY</button>
                <pre>${part}</pre>
            </div>
            `;
        } else {
            return `<div>${part}</div>`;
        }
    }).join("");
}

/* 🔥 COPY FUNCTION */
function copyCode(btn){
    const code = btn.parentElement.querySelector("pre").innerText;
    navigator.clipboard.writeText(code);
    btn.innerText = "COPIED";
    setTimeout(()=>btn.innerText="COPY",1000);
}

function render(){
    const chat = document.getElementById("chat");
    chat.innerHTML="";

    chats[currentChat].messages.forEach(m=>{
        const div = document.createElement("div");
        div.className = m.role==="user"?"user":"bot";

        if(m.role === "bot"){
            const tag = document.createElement("div");
            tag.className = "text-xs text-cyan-400 mb-2";
            tag.innerText = getModelLabel(m.model);
            div.appendChild(tag);
        }

        const text = document.createElement("div");
        text.innerHTML = formatMessage(m.content); // 🔥 IMPORTANT
        div.appendChild(text);

        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

async function send(){
    const input = document.getElementById("msg");
    if(!input.value.trim()) return;

    const text = input.value;

    chats[currentChat].messages.push({
        role:"user",
        content:text
    });

    render();
    input.value="";

    try {
        const res = await fetch("https://cipher-ai-production.up.railway.app/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body:new URLSearchParams({
                message:text,
                chat_id:currentChat,
                mode:currentMode
            })
        });

        const data = await res.json();

        chats[currentChat].messages.push({
            role:"bot",
            content:data.response,
            model:data.model
        });

    } catch(err){
        chats[currentChat].messages.push({
            role:"bot",
            content:"❌ Backend error",
            model:"error"
        });
    }

    render();
}
</script>

</body>
</html>
