<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cypher AI</title>

<style>
body {
    margin: 0;
    background: #0b1220;
    color: white;
    font-family: Arial, sans-serif;
}

/* Header */
.header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
}

/* Mode Buttons */
.modes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
}

.mode-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #1f2937;
    color: white;
}

.mode-btn.active {
    background: #3b82f6;
}

/* Chat Container */
.chat-container {
    width: 90%;
    max-width: 900px;
    height: 70vh;
    margin: auto;
    background: #111827;
    border-radius: 10px;
    padding: 15px;
    overflow-y: auto;
}

/* Messages */
.message {
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    max-width: 80%;
}

.user {
    background: #3b82f6;
    margin-left: auto;
}

.bot {
    background: #1f2937;
}

/* Input Area */
.input-area {
    display: flex;
    width: 90%;
    max-width: 900px;
    margin: 10px auto;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 6px;
    border: none;
}

button.send {
    padding: 12px 16px;
    background: #3b82f6;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

/* Mobile */
@media (max-width: 600px) {
    .chat-container {
        height: 65vh;
    }
}
</style>
</head>

<body>

<div class="header">⚡ Cypher AI</div>

<div class="modes">
    <button class="mode-btn active" onclick="setMode(event, 'thinking')">🧠 Thinking</button>
    <button class="mode-btn" onclick="setMode(event, 'programming')">💻 Programming</button>
    <button class="mode-btn" onclick="setMode(event, 'fast')">⚡ Fast</button>
</div>

<div id="chat" class="chat-container"></div>

<div class="input-area">
    <input id="input" placeholder="Ask anything..." />
    <button class="send" onclick="sendMessage()">Send</button>
</div>

<script>
let mode = "thinking";
let chat_id = localStorage.getItem("chat_id") || Date.now().toString();
localStorage.setItem("chat_id", chat_id);

/* Mode switch */
function setMode(event, selectedMode) {
    mode = selectedMode;

    document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.remove("active");
    });

    event.target.classList.add("active");
}

/* Add message */
function addMessage(text, sender) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "message " + sender;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* Send message */
async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const formData = new FormData();
    formData.append("message", text);
    formData.append("chat_id", chat_id);
    formData.append("mode", mode);

    try {
        const res = await fetch("/chat", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        addMessage(data.response, "bot");

    } catch (err) {
        addMessage("❌ Server error", "bot");
    }
}

/* Enter key */
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
