<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIPHER AI</title>

    <style>
        body {
            background: #0b0f17;
            color: white;
            font-family: monospace;
            margin: 0;
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 250px;
            border-right: 1px solid cyan;
            padding: 10px;
        }

        .chat-item {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        /* Main */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user {
            text-align: right;
            margin: 10px;
        }

        .bot {
            text-align: left;
            margin: 10px;
            border-left: 3px solid cyan;
            padding-left: 10px;
        }

        .model-tag {
            font-size: 10px;
            color: cyan;
            margin-bottom: 5px;
        }

        .code-block {
            background: #111;
            padding: 10px;
            margin-top: 5px;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            right: 5px;
            top: 5px;
            font-size: 10px;
            cursor: pointer;
        }

        #inputBox {
            border-top: 1px solid cyan;
            padding: 10px;
        }

        textarea {
            width: 100%;
            height: 60px;
            background: black;
            color: white;
        }

        button {
            width: 100%;
            margin-top: 5px;
        }

        .badge {
            margin-right: 5px;
            cursor: pointer;
        }

        .active {
            background: cyan;
            color: black;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <h3>CIPHER</h3>
    <button onclick="createNewChat()">+ NEW CHAT</button>
    <div id="chatList"></div>
</div>

<!-- MAIN -->
<div id="main">

    <!-- MODE SWITCH -->
    <div style="padding:10px">
        <span class="badge active" data-mode="thinking">THINKING</span>
        <span class="badge" data-mode="fast">FAST</span>
        <span class="badge" data-mode="programming">PROGRAMMING</span>
    </div>

    <!-- CHAT -->
    <div id="chat"></div>

    <!-- INPUT -->
    <div id="inputBox">
        <textarea id="msg" placeholder="Ask something..."></textarea>
        <button onclick="send()">SEND</button>
    </div>

</div>

<!-- 🔥 YOUR SCRIPT (FIXED, NOT CHANGED LOGIC) -->
<script>
let chats = {};
let currentChat = null;
let currentMode = "thinking";

const BASE_URL = window.location.origin;

document.addEventListener("DOMContentLoaded", async () => {
    console.log("✅ UI LOADED");

    try {
        await loadChats();
    } catch(e) {
        console.log("No chats loaded", e);
    }

    if(Object.keys(chats).length === 0){
        createNewChat();
    } else {
        currentChat = Object.keys(chats)[0];
        render();
    }

    document.querySelectorAll(".badge").forEach(el=>{
        el.onclick = () => {
            currentMode = el.dataset.mode;
            document.querySelectorAll(".badge").forEach(b=>b.classList.remove("active"));
            el.classList.add("active");
        }
    });
});

function getModelLabel(model){
    if(model==="programming") return "DOLPHIN";
    if(model==="fast"||model==="thinking") return "GROQ";
    return "CIPHER";
}

async function loadChats(){
    try{
        const res = await fetch(BASE_URL + "/chats", {
            headers:{ token: localStorage.getItem("token") || "" }
        });

        if(!res.ok) return;

        const data = await res.json();
        if(!Array.isArray(data)) return;

        data.forEach(c=>{
            chats[c.id]={title:"Chat",messages:[]};
        });

        renderList();

    }catch(e){
        console.error(e);
    }
}

function createNewChat(){
    currentChat="chat_"+Date.now();
    chats[currentChat]={title:"New Chat",messages:[]};
    renderList();
    render();
}

function renderList(){
    const list=document.getElementById("chatList");
    if(!list) return;

    list.innerHTML="";

    Object.keys(chats).forEach(id=>{
        const div=document.createElement("div");
        div.className="chat-item";
        div.innerText=chats[id].title;

        div.onclick=()=> {
            currentChat=id;
            render();
        };

        list.appendChild(div);
    });
}

function formatMessage(content){
    if(!content) return "";

    const parts=content.split("```");

    return parts.map((p,i)=>{
        if(i%2===1){
            return `<div class="code-block">
                <button class="copy-btn" onclick="copyCode(this)">COPY</button>
                <pre>${p}</pre>
            </div>`;
        }
        return `<div>${p}</div>`;
    }).join("");
}

function copyCode(btn){
    const code=btn.parentElement.querySelector("pre").innerText;
    navigator.clipboard.writeText(code);
    btn.innerText="COPIED";
    setTimeout(()=>btn.innerText="COPY",1000);
}

function render(){
    const chat=document.getElementById("chat");
    if(!chat||!currentChat) return;

    chat.innerHTML="";

    chats[currentChat].messages.forEach(m=>{
        const div=document.createElement("div");
        div.className=m.role==="user"?"user":"bot";

        if(m.role==="bot"){
            const tag=document.createElement("div");
            tag.className="model-tag";
            tag.innerText=getModelLabel(m.model);
            div.appendChild(tag);
        }

        const text=document.createElement("div");
        text.innerHTML=formatMessage(m.content);

        div.appendChild(text);
        chat.appendChild(div);
    });

    chat.scrollTop=chat.scrollHeight;
}

async function send(){
    const input=document.getElementById("msg");
    if(!input||!input.value.trim()) return;

    const text=input.value;

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    input.value="";

    try{
        const res=await fetch(BASE_URL + "/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded",
                token:localStorage.getItem("token")||""
            },
            body:new URLSearchParams({
                message:text,
                chat_id:currentChat,
                mode:currentMode
            })
        });

        const data=await res.json();

        chats[currentChat].messages.push({
            role:"bot",
            content:data.response||"⚠️ No response",
            model:data.model||"thinking"
        });

    }catch{
        chats[currentChat].messages.push({
            role:"bot",
            content:"❌ Backend error",
            model:"error"
        });
    }

    render();
}
</script>

</body>
</html>
