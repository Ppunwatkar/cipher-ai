<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* ================= THEME (UNCHANGED BASE) ================= */
body {
    background:#04070d;
    color:#e6edf3;
    font-family: 'Inter', monospace;
}

body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index:-1;
}

/* ================= LAYOUT ================= */
.sidebar { width:260px; background:#0b0f17; border-right:1px solid #1f2937; }
.header { background:#0b0f17; border-bottom:1px solid #1f2937; }

.badge {
    padding:8px 16px;
    border:1px solid #00f2ff;
    cursor:pointer;
}

/* ================= INPUT ================= */
.input-box {
    background:#020617;
    border:1px solid #00f2ff;
    color:#e6edf3;
    padding:14px;
    border-radius:6px;
    outline:none;
    box-shadow:0 0 10px rgba(0,255,255,0.15);
    transition:0.2s;
}

.input-box:focus {
    box-shadow:0 0 20px rgba(0,255,255,0.6);
}

/* ================= BUTTON ================= */
.btn {
    border:1px solid #00f2ff;
    color:#00f2ff;
    padding:12px;
    background:transparent;
    border-radius:6px;
    transition:0.2s;
}

.btn:hover {
    background:#00f2ff;
    color:black;
    box-shadow:0 0 15px #00f2ff;
}

/* ================= CHAT ================= */
.bot {
    background:#0d1117;
    border-left:3px solid #00f2ff;
    padding:16px;
    box-shadow:0 0 10px rgba(0,255,255,0.1);
}

.user {
    background:#020617;
    padding:16px;
    text-align:right;
    border-right:3px solid #00f2ff;
}

.model-tag {
    font-size:12px;
    color:#00f2ff;
}

/* ================= CODE ================= */
.code-block {
    background:#020617;
    border:1px solid #00f2ff;
    padding:10px;
    margin-top:10px;
    position:relative;
}

.copy-btn {
    position:absolute;
    right:5px;
    top:5px;
    font-size:11px;
    cursor:pointer;
}

/* ================= MODAL ================= */
#authModal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(6px);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:linear-gradient(145deg,#0b0f17,#020617);
    border:1px solid #00f2ff;
    padding:30px;
    width:350px;
    display:flex;
    flex-direction:column;
    gap:12px;
    box-shadow:0 0 25px rgba(0,255,255,0.2);
}
</style>
</head>

<body class="flex h-screen">

<!-- SIDEBAR -->
<div class="sidebar p-6 flex flex-col justify-between">
<div>
<h1 class="text-cyan-400 text-xl">CIPHER</h1>
<button onclick="createNewChat()" class="btn mt-4">+ NEW CHAT</button>
<div id="chatList" class="mt-4"></div>
</div>

<div class="flex flex-col gap-2">
<button class="btn" onclick="openAuth('login')">Login</button>
<button class="btn" onclick="openAuth('signup')">Sign Up</button>
</div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<div class="header p-4 flex justify-between">
<span class="text-cyan-400">RESEARCH TERMINAL</span>

<div>
<span class="badge bg-cyan-400" data-mode="thinking">THINKING</span>
<span class="badge" data-mode="fast">FAST</span>
<span class="badge" data-mode="programming">PROGRAMMING</span>
</div>
</div>

<div id="chat" class="flex-1 p-6 overflow-y-auto"></div>

<div class="p-4">
<textarea id="msg" class="input-box w-full" rows="2"></textarea>
<button onclick="send()" class="btn w-full mt-2">SEND</button>
</div>

</div>

<!-- AUTH MODAL -->
<div id="authModal">
<div class="modal-box">

<div class="flex justify-between">
<span id="authTitle" class="text-cyan-400">LOGIN</span>
<button onclick="closeAuth()">✕</button>
</div>

<input id="authUser" class="input-box" placeholder="Username">
<input id="authPass" class="input-box" type="password" placeholder="Password">

<button onclick="submitAuth()" class="btn">Submit</button>
<button onclick="toggleAuth()" class="btn">Switch</button>

<hr>

<button onclick="googleLogin()" class="btn">Continue with Google</button>

</div>
</div>

<script>

/* TOKEN FIX */
(function () {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    if (token) {
        localStorage.setItem("token", token);
        window.history.replaceState({}, document.title, "/");
    }
})();

let chats = {};
let currentChat = null;
let currentMode = "thinking";
let authMode = "login";

/* MODE SWITCH */
document.querySelectorAll(".badge").forEach(el=>{
    el.onclick = ()=>{
        currentMode = el.dataset.mode;
        document.querySelectorAll(".badge").forEach(b=>b.classList.remove("bg-cyan-400"));
        el.classList.add("bg-cyan-400");
    }
});

/* AUTH */
function openAuth(mode){
    authMode = mode;
    authTitle.innerText = mode.toUpperCase();
    authModal.style.display="flex";
}

function closeAuth(){
    authModal.style.display="none";
}

function toggleAuth(){
    authMode = authMode==="login"?"signup":"login";
    authTitle.innerText = authMode.toUpperCase();
}

async function submitAuth(){
    const username = authUser.value;
    const password = authPass.value;

    const res = await fetch("/"+authMode,{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:new URLSearchParams({username,password})
    });

    const data = await res.json();

    if(data.token){
        localStorage.setItem("token",data.token);
        closeAuth();
    } else alert("Error");
}

function googleLogin(){
    window.location.href="/auth/google";
}

/* CHAT */
function createNewChat(){
    currentChat="chat_"+Date.now();
    chats[currentChat]={messages:[]};
    render();
}

function formatMessage(content){
    const parts=content.split("```");
    return parts.map((p,i)=> i%2 ?
        `<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">COPY</button><pre>${p}</pre></div>`
        : `<div>${p}</div>`
    ).join("");
}

function copyCode(btn){
    navigator.clipboard.writeText(btn.parentElement.innerText);
}

function render(){
    chat.innerHTML="";
    chats[currentChat].messages.forEach(m=>{
        const div=document.createElement("div");
        div.className=m.role==="user"?"user":"bot";

        if(m.role==="bot"){
            const tag=document.createElement("div");
            tag.className="model-tag";
            tag.innerText=currentMode.toUpperCase();
            div.appendChild(tag);
        }

        const text=document.createElement("div");
        text.innerHTML=formatMessage(m.content);
        div.appendChild(text);

        chat.appendChild(div);
    });
}

async function send(){
    const text=msg.value;
    if(!text) return;

    if(!localStorage.getItem("token")){
        alert("Login first ⚠️");
        return;
    }

    chats[currentChat].messages.push({role:"user",content:text});
    render();
    msg.value="";

    const res = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded",
            "token": localStorage.getItem("token") || ""
        },
        body:new URLSearchParams({
            message:text,
            chat_id:currentChat,
            mode:currentMode
        })
    });

    const data = await res.json();

    chats[currentChat].messages.push({
        role:"bot",
        content:data.response,
        model:data.model
    });

    render();
}

createNewChat();

</script>

</body>
</html>
