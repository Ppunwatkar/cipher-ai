<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIPHER AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#04070d;
    color:#e6edf3;
    font-family: 'Inter', 'Courier New', monospace;
    font-size:18px;
    line-height:1.7;
}

/* GRID */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index:-1;
}

/* SIDEBAR */
.sidebar {
    width:260px;
    background:#0b0f17;
    border-right:1px solid #1f2937;
    transition:0.3s;
}

/* HEADER */
.header {
    background:#0b0f17;
    border-bottom:1px solid #1f2937;
}

/* BUTTONS */
.badge {
    padding:8px 16px;
    font-size:13px;
    border:1px solid #00f2ff;
    cursor:pointer;
}

/* CHAT */
#chat {
    display:flex;
    flex-direction:column;
    gap:14px;
    max-width:900px;
    margin:auto;
}

/* MESSAGE */
.bot, .user {
    padding:18px;
    border-radius:10px;
    font-size:16px;
    animation: fadeIn 0.2s ease-in;
    max-width:85%;
}

.bot { background:#0d1117; border-left:4px solid #00f2ff; }
.user { background:#020617; margin-left:auto; }

/* INPUT */
.input-box {
    background:#04070d;
    border:1px solid #00f2ff;
    box-shadow:0 0 12px rgba(0,255,255,0.2);
    font-size:16px;
    padding:14px;
}

/* BUTTON */
.btn {
    border:1px solid #00f2ff;
    padding:14px;
    font-size:14px;
}

/* CHAT LIST */
.chat-item {
    padding:8px;
    cursor:pointer;
    font-size:14px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(6px);}
    to {opacity:1; transform: translateY(0);}
}

/* ================= MOBILE ================= */
@media (max-width:768px){

    body {
        flex-direction:column;
    }

    /* Sidebar hidden */
    .sidebar {
        position:fixed;
        left:-100%;
        top:0;
        height:100%;
        z-index:1000;
    }

    .sidebar.open {
        left:0;
    }

    /* Header layout */
    .header {
        flex-direction:row;
        justify-content:space-between;
        align-items:center;
    }

    .header .flex {
        flex-wrap:wrap;
        gap:6px;
    }

    .badge {
        font-size:11px;
        padding:6px 10px;
    }

    /* Chat full width */
    #chat {
        max-width:100%;
        padding:12px;
    }

    .bot, .user {
        max-width:100%;
        font-size:14px;
        padding:12px;
    }

    .input-box {
        font-size:14px;
    }

    .btn {
        font-size:13px;
        padding:12px;
    }
}

/* ================= TABLET ================= */
@media (min-width:768px) and (max-width:1024px){

    .sidebar {
        width:200px;
    }

    #chat {
        max-width:100%;
    }

    .badge {
        font-size:12px;
        padding:6px 12px;
    }

    .bot, .user {
        max-width:90%;
        font-size:15px;
    }

    .max-w-4xl {
        max-width:90%;
    }
}
</style>
</head>

<body class="flex h-screen overflow-hidden md:flex-row flex-col">

<!-- SIDEBAR -->
<div class="sidebar p-6 flex flex-col">
<h1 class="text-cyan-400 text-2xl font-bold">CIPHER</h1>
<p class="text-sm text-gray-500 mb-6">CYBERSECURITY AI</p>

<button onclick="createNewChat()" class="btn">+ NEW CHAT</button>

<div id="chatList" class="mt-6 overflow-y-auto"></div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<!-- HEADER -->
<div class="header p-4 flex justify-between items-center">

<!-- MOBILE MENU -->
<button onclick="toggleSidebar()" class="md:hidden text-cyan-400 text-xl">☰</button>

<span class="text-cyan-400 text-lg">RESEARCH TERMINAL</span>

<div class="flex gap-3">
<span class="badge bg-cyan-400" data-mode="thinking">THINKING</span>
<span class="badge" data-mode="fast">FAST</span>
<span class="badge" data-mode="programming">PROGRAMMING</span>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 p-8 overflow-y-auto"></div>

<!-- INPUT -->
<div class="p-6 flex flex-col gap-3 max-w-4xl mx-auto w-full">
<textarea id="msg"
class="input-box rounded-md"
placeholder="Ask about exploits, recon, CTFs..."
rows="2"></textarea>

<div class="text-sm text-gray-500">
Try: recon scan | sql injection | xss payload | whois example.com
</div>

<button onclick="send()" class="btn">SEND ▶</button>
</div>

</div>

<script>
let chats = {};
let currentChat = null;
let currentMode = "thinking";

/* SIDEBAR TOGGLE */
function toggleSidebar(){
    document.querySelector(".sidebar").classList.toggle("open");
}

/* INIT */
document.addEventListener("DOMContentLoaded", () => {

    document.querySelectorAll(".badge").forEach(el=>{
        el.onclick = () => {
            currentMode = el.dataset.mode;

            document.querySelectorAll(".badge").forEach(b=>{
                b.classList.remove("bg-cyan-400");
            });

            el.classList.add("bg-cyan-400");
        }
    });

    createNewChat();
});

/* NEW CHAT */
function createNewChat(){
    currentChat = "chat_" + Date.now();

    chats[currentChat] = {
        title: "New Chat",
        messages: []
    };

    renderList();
    render();
}

/* CHAT LIST */
function renderList(){
    const list = document.getElementById("chatList");
    list.innerHTML = "";

    Object.keys(chats).forEach(id=>{
        const div = document.createElement("div");
        div.className = "chat-item";
        div.innerText = chats[id].title;

        div.onclick = ()=>{
            currentChat = id;
            render();
        };

        list.appendChild(div);
    });
}

/* RENDER */
function render(){
    const chat = document.getElementById("chat");
    chat.innerHTML="";

    (chats[currentChat]?.messages || []).forEach(m=>{
        const div = document.createElement("div");
        div.className = m.role==="user"?"user":"bot";
        div.innerText = m.content;
        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

/* SEND */
async function send(){
    const input = document.getElementById("msg");
    if(!input.value.trim()) return;

    const text = input.value;

    chats[currentChat].messages.push({role:"user",content:text});
    render();

    input.value="";

    const res = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:new URLSearchParams({
            message:text,
            chat_id:currentChat,
            mode:currentMode
        })
    });

    const data = await res.json();

    chats[currentChat].messages.push({
        role:"bot",
        content:data.response
    });

    render();
}
</script>

</body>
</html>
